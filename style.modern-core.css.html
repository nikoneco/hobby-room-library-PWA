<style>
/* ===== Modern Dark Library Refresh 2026-05-20 ===== */
:root {
  --lib-bg: #10141b;
  --lib-bg-2: #151a23;
  --lib-panel: rgba(29, 36, 48, 0.86);
  --lib-panel-strong: rgba(35, 43, 56, 0.94);
  --lib-panel-soft: rgba(255, 255, 255, 0.035);
  --lib-line: rgba(255, 255, 255, 0.09);
  --lib-line-strong: rgba(255, 255, 255, 0.16);
  --lib-text: #eef4f7;
  --lib-muted: #aab7c2;
  --lib-subtle: #74828f;
  --lib-accent: #68bfd7;
  --lib-accent-2: #7fb7ff;
  --lib-amber: #d6a45f;
  --lib-amber-2: #f0c37a;
  --lib-mint: #69c6a3;
  --lib-danger: #d9886f;
  --lib-radius-sm: 8px;
  --lib-radius-md: 12px;
  --lib-radius-lg: 18px;
  --lib-shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.22);
  --lib-shadow-md: 0 18px 46px rgba(0, 0, 0, 0.32);
  --lib-ease: 160ms ease;
}

* {
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", "Yu Gothic", "Hiragino Sans", sans-serif;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 18px),
    linear-gradient(180deg, #171c25 0%, var(--lib-bg) 42%, #0c1016 100%);
  color: var(--lib-text);
  letter-spacing: 0;
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(104, 191, 215, 0.055), transparent 28%, transparent 72%, rgba(214, 164, 95, 0.05)),
    linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 34%);
  z-index: -1;
}

.ui-icon {
  display: inline-flex;
  width: 1.12em;
  height: 1.12em;
  flex: 0 0 auto;
  align-items: center;
  justify-content: center;
}

.ui-icon svg {
  width: 100%;
  height: 100%;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.ui-icon-inline {
  margin-right: 0.42em;
}

.search-container {
  padding: clamp(1.5rem, 4vw, 3.5rem) 1rem 1.45rem;
  background: rgba(15, 19, 27, 0.78);
  border-bottom: 1px solid var(--lib-line);
  box-shadow: var(--lib-shadow-sm);
  backdrop-filter: blur(18px) saturate(128%);
}

.search-container.centered {
  top: clamp(38px, 8vh, 72px);
  position: relative;
  isolation: isolate;
  overflow: hidden;
  display: grid;
  grid-template-columns: minmax(230px, 340px) minmax(440px, 690px);
  grid-template-areas:
    "logo status"
    "logo form";
  align-items: center;
  justify-content: center;
  column-gap: clamp(2.4rem, 7vw, 6.5rem);
  row-gap: 1rem;
  min-height: min(640px, calc(100dvh - 86px));
  padding:
    clamp(3.2rem, 7vw, 5.8rem)
    clamp(1rem, 5vw, 4.5rem)
    clamp(2.8rem, 5vw, 4.8rem);
  border-bottom-color: rgba(214, 164, 95, 0.18);
  background:
    linear-gradient(90deg, rgba(214, 164, 95, 0.075), transparent 30%, rgba(104, 191, 215, 0.040)),
    linear-gradient(180deg, rgba(6, 10, 14, 0.22), rgba(15, 19, 27, 0.68));
  text-align: left;
}

.search-container.centered::before {
  content: none;
}

.search-container.centered::after {
  content: "";
  position: absolute;
  inset: auto clamp(1.2rem, 8vw, 7rem) 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(214, 164, 95, 0.22), rgba(104, 191, 215, 0.18), transparent);
  pointer-events: none;
}

.sensitive-toggle {
  position: absolute;
  top: 1.1rem;
  right: clamp(1rem, 5vw, 4.5rem);
  z-index: 2;
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.42rem 0.5rem 0.42rem 0.72rem;
  border: 1px solid rgba(148, 163, 184, 0.20);
  border-radius: 999px;
  background: rgba(15, 19, 27, 0.56);
  color: rgba(220, 232, 238, 0.78);
  box-shadow: none;
  backdrop-filter: blur(12px);
  cursor: pointer;
  user-select: none;
}

.sensitive-toggle-label {
  font-size: 0.78rem;
  font-weight: 750;
  line-height: 1;
  letter-spacing: 0;
}

.sensitive-toggle-input {
  position: absolute;
  inset: 0;
  z-index: 1;
  width: 100%;
  height: 100%;
  margin: 0;
  opacity: 0;
  cursor: pointer;
}

.sensitive-toggle-switch {
  position: relative;
  display: inline-flex;
  width: 2.25rem;
  height: 1.22rem;
  flex: 0 0 auto;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.09);
  border: 1px solid rgba(255, 255, 255, 0.10);
  transition: background var(--lib-ease), border-color var(--lib-ease);
}

.sensitive-toggle-switch::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 0.16rem;
  width: 0.84rem;
  height: 0.84rem;
  border-radius: 50%;
  background: rgba(220, 232, 238, 0.82);
  transform: translateY(-50%);
  transition: transform var(--lib-ease), background var(--lib-ease);
}

.sensitive-toggle-input:checked + .sensitive-toggle-switch {
  background: rgba(214, 164, 95, 0.34);
  border-color: rgba(214, 164, 95, 0.48);
}

.sensitive-toggle-input:checked + .sensitive-toggle-switch::before {
  background: #f7dfba;
  transform: translate(1.02rem, -50%);
}

.sensitive-toggle:focus-within {
  outline: 2px solid rgba(104, 191, 215, 0.70);
  outline-offset: 2px;
}

.search-container.shrink .sensitive-toggle,
.search-container.shrink.compact .sensitive-toggle,
.search-container.shrink.shelf-view-active .sensitive-toggle {
  right: clamp(14rem, 24vw, 18rem);
}

.search-container.shrink,
.search-container.shrink.compact,
.search-container.shrink.shelf-view-active {
  background: rgba(15, 19, 27, 0.86);
  border-bottom-color: var(--lib-line);
  box-shadow: 0 10px 34px rgba(0, 0, 0, 0.30);
  backdrop-filter: blur(18px) saturate(128%);
}

.logo {
  height: clamp(116px, 18vw, 176px);
  margin-bottom: 1.15rem;
  opacity: 0.94;
  filter: drop-shadow(0 14px 28px rgba(0, 0, 0, 0.30));
}

.search-container.centered .logo {
  grid-area: logo;
  justify-self: end;
  width: clamp(188px, 24vw, 286px);
  height: clamp(188px, 24vw, 286px);
  margin: 0;
  padding: clamp(0.9rem, 2vw, 1.35rem);
  border: 1px solid rgba(214, 164, 95, 0.22);
  border-radius: calc(var(--lib-radius-lg) + 4px);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.052), rgba(255, 255, 255, 0.020)),
    rgba(9, 13, 18, 0.42);
  object-fit: contain;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.055),
    0 24px 58px rgba(0, 0, 0, 0.38);
  filter: saturate(0.96) contrast(1.04);
}

.search-container.shrink .logo {
  height: 64px;
}

.search-container.shrink.shelf-view-active .logo {
  height: 48px;
}

.search-form {
  width: min(860px, 94vw);
  margin: 0 auto;
  gap: 0.85rem;
  font-size: 1rem;
}

.search-container.centered .search-form {
  grid-area: form;
  position: relative;
  isolation: isolate;
  overflow: hidden;
  align-items: stretch;
  width: min(690px, 100%);
  margin: 0;
  padding: clamp(1.08rem, 2.4vw, 1.55rem);
  border: 1px solid rgba(214, 164, 95, 0.20);
  border-radius: calc(var(--lib-radius-lg) + 2px);
  background:
    linear-gradient(90deg, rgba(214, 164, 95, 0.090) 0 6px, transparent 6px),
    linear-gradient(180deg, rgba(255, 255, 255, 0.064), rgba(255, 255, 255, 0.026)),
    rgba(10, 15, 21, 0.70);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.060),
    inset 7px 0 0 rgba(214, 164, 95, 0.12),
    0 22px 62px rgba(0, 0, 0, 0.32);
}

.search-container.centered .search-form::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(135deg, rgba(104, 191, 215, 0.08), transparent 38%);
  pointer-events: none;
}

.search-container.shrink .search-form,
.search-container.shrink.compact .search-form,
.search-container.shrink.shelf-view-active .search-form {
  gap: 0.5rem;
}

.search-status-area,
.search-container.shrink .search-status-area,
.search-container.shrink.compact .search-status-area,
.search-container.centered .search-status-area {
  position: relative;
  inset: auto;
  width: fit-content;
  max-width: min(520px, 92vw);
  margin: 0 auto 1.35rem;
  padding: 0.46rem 0.72rem;
  border-radius: 999px;
  background: rgba(24, 31, 42, 0.48);
  border: 1px solid rgba(148, 163, 184, 0.18);
  box-shadow: none;
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.48rem;
  text-align: left;
  overflow: hidden;
}

.search-container.centered .search-status-area {
  grid-area: status;
  justify-self: start;
  margin: 0;
  background: rgba(24, 31, 42, 0.58);
}

.search-status-area.has-librarian-note {
  width: min(520px, 92vw);
  border-radius: 18px;
  flex-wrap: wrap;
  row-gap: 0.34rem;
}

.search-status-area::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  background: rgba(104, 191, 215, 0.48);
  opacity: 0.58;
}

.search-container .search-status-area.is-random {
  border-color: rgba(214, 164, 95, 0.32);
  background:
    linear-gradient(135deg, rgba(214, 164, 95, 0.105), rgba(104, 191, 215, 0.045)),
    rgba(24, 31, 42, 0.48);
}

.search-status-area.is-random::before {
  background:
    linear-gradient(
      to bottom,
      rgba(214, 164, 95, 0.82) 0 28%,
      rgba(104, 191, 215, 0.68) 28% 56%,
      rgba(105, 198, 163, 0.70) 56% 100%
    );
  opacity: 0.82;
}

.search-container .search-status-area.is-shelf {
  border-color: rgba(105, 198, 163, 0.30);
  background:
    linear-gradient(135deg, rgba(105, 198, 163, 0.10), rgba(104, 191, 215, 0.045)),
    rgba(24, 31, 42, 0.48);
}

.search-status-area.is-shelf::before {
  background:
    linear-gradient(
      to bottom,
      rgba(105, 198, 163, 0.76) 0 42%,
      rgba(104, 191, 215, 0.62) 42% 100%
    );
  opacity: 0.78;
}

.search-status-area.is-notice::before {
  background: rgba(214, 164, 95, 0.68);
}

.search-status-count {
  color: var(--lib-text);
  text-shadow: none;
  font-size: 0.82rem;
  line-height: 1.25;
  margin: 0;
  white-space: nowrap;
}

.search-status-chips {
  min-width: 0;
  display: inline-flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.42rem;
}

.search-status-librarian-note {
  flex: 0 0 100%;
  width: 100%;
  margin-top: -0.02rem;
  color: rgba(217, 231, 240, 0.62);
  font-size: 0.72rem;
  letter-spacing: 0;
  line-height: 1.45;
  text-align: center;
}

.search-status-chip {
  max-width: min(100%, 360px);
  padding: 0.3rem 0.46rem 0.3rem 0.6rem;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.052), rgba(255, 255, 255, 0.026)),
    rgba(14, 20, 28, 0.66);
  border-color: rgba(148, 163, 184, 0.17);
  color: #dce8ee;
  box-shadow: none;
  font-size: 0.74rem;
  gap: 0.44rem;
}

.search-status-chip-label {
  gap: 0.38rem;
}

.search-status-chip-key {
  background: rgba(240, 195, 122, 0.12);
  color: rgba(247, 223, 186, 0.92);
  box-shadow: inset 0 0 0 1px rgba(240, 195, 122, 0.11);
}

.search-status-chip-value {
  color: rgba(236, 244, 248, 0.92);
}

.search-status-chip.random {
  background: rgba(214, 164, 95, 0.12);
  border-color: rgba(214, 164, 95, 0.28);
  color: #f7dfba;
}

.search-status-chip.shelf {
  background: rgba(105, 198, 163, 0.11);
  border-color: rgba(105, 198, 163, 0.26);
  color: #cdefdf;
}

.search-status-chip.cache {
  background: rgba(246, 241, 229, 0.08);
  border-color: rgba(246, 241, 229, 0.18);
  color: rgba(246, 241, 229, 0.76);
}

.search-status-chip.sync {
  background: rgba(104, 191, 215, 0.12);
  border-color: rgba(104, 191, 215, 0.28);
  color: #d7f8ff;
}

.search-status-chip.warning {
  background: rgba(214, 164, 95, 0.12);
  border-color: rgba(214, 164, 95, 0.30);
  color: #f7dfba;
}

.search-status-reroll {
  min-height: 0;
  padding: 0.28rem 0.62rem;
  border: 1px solid rgba(104, 191, 215, 0.30);
  border-radius: 999px;
  background: rgba(104, 191, 215, 0.11);
  color: #dff8ff;
  font-size: 0.74rem;
  font-weight: 760;
  line-height: 1.35;
  box-shadow: none;
}

.search-status-reroll .ui-icon,
.search-status-chip-remove .ui-icon {
  width: 0.9em;
  height: 0.9em;
}

.search-status-reroll:hover,
.search-status-reroll:focus-visible {
  border-color: rgba(146, 220, 236, 0.60);
  background: rgba(104, 191, 215, 0.20);
  color: #ffffff;
  transform: none;
}

.search-status-area.is-random .search-status-reroll {
  border-color: rgba(214, 164, 95, 0.34);
  background: rgba(214, 164, 95, 0.10);
  color: #f7dfba;
}

.search-status-area.is-random .search-status-reroll:hover,
.search-status-area.is-random .search-status-reroll:focus-visible {
  border-color: rgba(240, 195, 122, 0.60);
  background: rgba(214, 164, 95, 0.17);
  color: #ffffff;
}

.search-status-reroll:disabled {
  cursor: wait;
  opacity: 0.62;
  border-color: rgba(104, 191, 215, 0.20);
  background: rgba(104, 191, 215, 0.08);
  color: rgba(223, 248, 255, 0.72);
}

.search-status-chip-remove {
  width: 1.45rem;
  min-width: 1.45rem;
  height: 1.45rem;
  min-height: 1.45rem;
  margin: -0.12rem -0.22rem -0.12rem 0;
  padding: 0;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.045);
  color: rgba(220, 232, 238, 0.68);
  font-size: 0.82rem;
}

.search-status-chip-remove:hover,
.search-status-chip-remove:focus-visible {
  background: rgba(217, 136, 111, 0.18);
  color: #ffe0d8;
  transform: none;
}

.input-group {
  width: 100%;
  max-width: 760px;
}

.search-container.centered .input-group {
  max-width: none;
}

.search-container.centered .input-group label {
  color: rgba(240, 195, 122, 0.84);
}

.input-group label,
.released-range-row > label {
  margin-bottom: 0.38rem;
  color: var(--lib-muted);
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0;
}

.input-group input,
.input-group select,
.released-range-controls select {
  min-height: 46px;
  padding: 0.72rem 0.86rem;
  border: 1px solid var(--lib-line);
  border-radius: var(--lib-radius-sm);
  background: rgba(255, 255, 255, 0.045);
  color: var(--lib-text);
  color-scheme: dark;
  font-size: 0.98rem;
  transition: border-color var(--lib-ease), background var(--lib-ease), box-shadow var(--lib-ease);
}

.search-container.centered .input-group input,
.search-container.centered .input-group select {
  min-height: 50px;
  border-color: rgba(148, 163, 184, 0.18);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.052), rgba(255, 255, 255, 0.028)),
    rgba(2, 6, 10, 0.28);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.045);
}

.input-group select option,
.released-range-controls select option {
  background-color: #151b25;
  color: #edf4f8;
}

.input-group select option:checked,
.released-range-controls select option:checked {
  background-color: #244b5b;
  color: #ffffff;
}

.input-group input::placeholder {
  color: rgba(170, 183, 194, 0.66);
}

.input-group input:focus,
.input-group select:focus,
.released-range-controls select:focus {
  border-color: rgba(104, 191, 215, 0.78);
  background: rgba(255, 255, 255, 0.07);
  box-shadow: 0 0 0 3px rgba(104, 191, 215, 0.13);
}

.button-group,
.advanced-actions {
  gap: 0.62rem;
}

.search-container.centered .button-group,
.search-container.centered .advanced-actions {
  justify-content: flex-start;
}

.search-container.centered .button-group {
  display: grid;
  grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr) auto;
  align-items: stretch;
}

button,
.popup-action-btn,
.popup-link-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.42em;
  min-height: 40px;
  padding: 0.62rem 1rem;
  border: 1px solid var(--lib-line);
  border-radius: var(--lib-radius-sm);
  background: rgba(255, 255, 255, 0.055);
  color: var(--lib-text);
  box-shadow: none;
  font-weight: 750;
  letter-spacing: 0;
  transition: transform var(--lib-ease), border-color var(--lib-ease), background var(--lib-ease), color var(--lib-ease), box-shadow var(--lib-ease);
}

button:hover,
.popup-action-btn:hover,
.popup-link-btn:hover {
  transform: translateY(-1px);
  border-color: var(--lib-line-strong);
  background: rgba(255, 255, 255, 0.085);
  color: #ffffff;
  box-shadow: none;
}

button:focus-visible,
.popup-action-btn:focus-visible,
.popup-link-btn:focus-visible {
  outline: 2px solid rgba(104, 191, 215, 0.70);
  outline-offset: 2px;
}

button.primary-action,
.advanced-actions button.primary-action,
.popup-action-btn.primary {
  border-color: rgba(104, 191, 215, 0.40);
  background: linear-gradient(180deg, rgba(104, 191, 215, 0.94), rgba(76, 147, 176, 0.94));
  color: #071116;
  box-shadow: 0 10px 24px rgba(104, 191, 215, 0.14);
}

.search-container.centered .button-group button {
  min-height: 46px;
}

.search-container.centered .button-group button.primary-action {
  border-color: rgba(104, 191, 215, 0.50);
}

.search-container.centered .button-group button.quiet-action {
  border-color: rgba(214, 164, 95, 0.20);
}

button.primary-action:hover,
.popup-action-btn.primary:hover {
  border-color: rgba(146, 220, 236, 0.72);
  background: linear-gradient(180deg, #88d3e6, #5aa7c6);
}

button.quiet-action,
.clear-btn,
.sub-btn {
  background: rgba(255, 255, 255, 0.045);
  border-color: var(--lib-line);
  color: var(--lib-muted);
}

button.quiet-action:hover,
.clear-btn:hover,
.sub-btn:hover {
  background: rgba(255, 255, 255, 0.075);
  color: var(--lib-text);
}

#advancedToggleBtn.active {
  color: #071116;
  border-color: rgba(214, 164, 95, 0.58);
  background: linear-gradient(180deg, var(--lib-amber-2), var(--lib-amber));
}

.bookshelf-cta-wrap {
  margin-top: 0.15rem;
}

.quick-browse-rail {
  width: min(760px, 92vw);
  margin: -0.04rem auto 0.34rem;
  padding: 0.52rem 0.62rem;
  border: 1px solid rgba(148, 163, 184, 0.13);
  border-radius: 14px;
  background:
    linear-gradient(90deg, rgba(104, 191, 215, 0.06), rgba(214, 164, 95, 0.035)),
    rgba(8, 13, 19, 0.28);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.55rem;
  color: var(--lib-muted);
}

.search-container.centered .quick-browse-rail {
  width: 100%;
  margin: 0.04rem 0 0.3rem;
  justify-content: flex-start;
  align-items: flex-start;
}

.search-container.centered .quick-browse-chips {
  justify-content: flex-start;
}

.search-container.centered button.quick-browse-chip {
  max-width: 100%;
}

.quick-browse-rail[hidden],
.search-container.shrink .quick-browse-rail,
.search-container.shrink.compact .quick-browse-rail,
.search-container.shrink.shelf-view-active .quick-browse-rail {
  display: none !important;
}

.quick-browse-kicker {
  flex: 0 0 auto;
  padding: 0.16rem 0.28rem 0;
  font-size: 0.76rem;
  font-weight: 760;
  color: rgba(240, 195, 122, 0.84);
}

.quick-browse-chips {
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.42rem;
  flex-wrap: wrap;
}

button.quick-browse-chip {
  min-height: 34px;
  padding: 0.28rem 0.38rem 0.28rem 0.58rem;
  gap: 0.34rem;
  border-radius: 999px;
  border-color: rgba(148, 163, 184, 0.17);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.050), rgba(255, 255, 255, 0.024)),
    rgba(13, 19, 27, 0.58);
  color: #dce8ee;
  box-shadow: none;
  font-size: 0.78rem;
  line-height: 1.25;
}

  position: relative;
  isolation: isolate;
  overflow: hidden;
  display: flex;
  width: min(380px, 100%);
  min-height: 224px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.78rem;
  padding: 1.35rem 1.2rem 1.18rem;
  border: 1px solid rgba(148, 163, 184, 0.16);
  border-radius: 16px;
  background:

  position: absolute;

  z-index: -1;
  background:
    radial-gradient(circle at 20% 0%, rgba(240, 195, 122, 0.13), transparent 35%),

  content: "";
  position: absolute;
  right: 7px;
  bottom: 2px;
  left: 7px;
  height: 2px;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent, rgba(214, 164, 95, 0.45), transparent);

  min-height: 22px;

  box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
  animation: shelf-wait 1.8s ease-in-out infinite;
}

.spinner-shelf span:nth-child(1) {
  height: 24px;
  background: rgba(104, 191, 215, 0.78);
}

.spinner-shelf span:nth-child(2) {
  height: 31px;
  background: rgba(214, 164, 95, 0.78);
  animation-delay: 0.08s;
}

.spinner-shelf span:nth-child(3) {

  background: rgba(105, 198, 163, 0.72);
  animation-delay: 0.16s;
}

.spinner-shelf span:nth-child(4) {
  height: 34px;
  background: rgba(104, 191, 215, 0.68);
  animation-delay: 0.24s;
}

.spinner-shelf span:nth-child(5) {
  height: 25px;
  background: rgba(214, 164, 95, 0.66);
  animation-delay: 0.32s;
}
