<style>
.shelf-view {
  max-width: 1320px;
  padding-inline: clamp(0.72rem, 2.4vw, 1.65rem);
  padding-bottom: 2rem;
}

.logo[role="button"] {
  cursor: pointer;
}

.logo[role="button"]:focus-visible {
  outline: 3px solid rgba(104, 191, 215, 0.64);
  outline-offset: 5px;
}

.shelf-view-overview {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  display: grid;
  grid-template-columns: minmax(230px, 0.86fr) minmax(340px, 1.36fr);
  align-items: stretch;
  gap: 0.78rem;
  margin: 0 0 1rem;
  padding: 0.92rem 1rem;
  border: 1px solid var(--lib-line);
  border-radius: calc(var(--lib-radius-md) + 6px);
  background:
    radial-gradient(circle at 2% 0%, rgba(214, 164, 95, 0.10), transparent 32%),
    linear-gradient(135deg, rgba(104, 191, 215, 0.060), rgba(214, 164, 95, 0.042)),
    rgba(255, 255, 255, 0.036);
  color: var(--lib-muted);
  box-shadow:
    0 14px 34px rgba(0, 0, 0, 0.14),
    inset 0 1px 0 rgba(255, 255, 255, 0.055);
}

.shelf-view-heading {
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.44rem;
  padding: 0.1rem 0.22rem 0.1rem 0;
}

.shelf-view-mode-badge {
  display: inline-flex;
  width: fit-content;
  min-height: 1.56rem;
  align-items: center;
  justify-content: center;
  padding: 0.16rem 0.52rem;
  border: 1px solid rgba(240, 195, 122, 0.22);
  border-radius: 999px;
  background:
    linear-gradient(180deg, rgba(240, 195, 122, 0.13), rgba(240, 195, 122, 0.040)),
    rgba(8, 13, 19, 0.26);
  color: rgba(247, 223, 186, 0.90);
  font-size: 0.68rem;
  font-weight: 850;
  line-height: 1.15;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.045);
}

.shelf-view-overview.result .shelf-view-mode-badge {
  border-color: rgba(104, 191, 215, 0.24);
  background:
    linear-gradient(180deg, rgba(104, 191, 215, 0.13), rgba(104, 191, 215, 0.040)),
    rgba(8, 13, 19, 0.24);
  color: rgba(215, 248, 255, 0.88);
}

.shelf-view-overview::before {
  content: none;
}

.shelf-view-mode {
  color: var(--lib-text);
  font-size: 1.02rem;
  font-weight: 850;
  line-height: 1.35;
}

.shelf-view-stat-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 0.5rem;
}

.shelf-view-stat {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  min-width: 0;
  padding: 0.62rem 0.66rem;
  border: 1px solid rgba(255, 255, 255, 0.075);
  border-radius: var(--lib-radius-sm);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.040), rgba(255, 255, 255, 0.010)),
    rgba(0, 0, 0, 0.18);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.036);
}

.shelf-view-stat:first-child {
  border-color: rgba(240, 195, 122, 0.20);
  background:
    linear-gradient(180deg, rgba(240, 195, 122, 0.13), rgba(240, 195, 122, 0.034)),
    rgba(0, 0, 0, 0.18);
}

.shelf-view-stat:first-child::after {
  content: "";
  position: absolute;
  inset: auto 0 0;
  z-index: 0;
  height: 2px;
  background: linear-gradient(90deg, rgba(240, 195, 122, 0.42), rgba(104, 191, 215, 0.16));
  pointer-events: none;
}

.shelf-view-stat-label,
.shelf-view-stat-value {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.shelf-view-stat-label {
  color: var(--lib-subtle);
  font-size: 0.72rem;
  font-weight: 800;
  line-height: 1.25;
}

.shelf-view-stat-value {
  margin-top: 0.12rem;
  color: var(--lib-text);
  font-size: 0.96rem;
  font-weight: 850;
  line-height: 1.25;
}

.shelf-view-note {
  max-width: 36em;
  color: rgba(170, 183, 194, 0.78);
  font-size: 0.82rem;
  line-height: 1.55;
}

.shelf-view-librarian-note {
  padding-top: 0.1rem;
  color: rgba(217, 231, 240, 0.66);
  font-size: 0.78rem;
  line-height: 1.55;
}

.shelf-jump-nav,
.shelf-jump-nav.immersive {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  padding: 0.78rem 0.88rem 0.82rem;
  border-color: rgba(255, 255, 255, 0.11);
  border-radius: calc(var(--lib-radius-md) + 6px);
  background:
    radial-gradient(circle at 0% 0%, rgba(214, 164, 95, 0.10), transparent 34%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.072), rgba(255, 255, 255, 0.026)),
    rgba(9, 14, 20, 0.82);
  box-shadow:
    0 16px 38px rgba(0, 0, 0, 0.25),
    inset 0 1px 0 rgba(255, 255, 255, 0.060),
    inset 0 -1px 0 rgba(0, 0, 0, 0.18);
  backdrop-filter: blur(14px);
}

.shelf-jump-nav::before {
  content: none;
}

.shelf-jump-nav-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.72rem;
  margin-bottom: 0.58rem;
  padding-bottom: 0.58rem;
  border-bottom: 1px solid rgba(255, 255, 255, 0.070);
}

.shelf-jump-nav-label {
  display: inline-flex;
  width: fit-content;
  min-height: 1.7rem;
  align-items: center;
  padding: 0.18rem 0.56rem;
  border: 1px solid rgba(148, 163, 184, 0.14);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.030);
  color: var(--lib-muted);
  font-size: 0.74rem;
  font-weight: 840;
  letter-spacing: 0;
}

.shelf-jump-chip-row {
  gap: 0.4rem;
  padding: 0.04rem 0 0.1rem;
  scrollbar-color: rgba(214, 164, 95, 0.54) rgba(255, 255, 255, 0.045);
}

.shelf-jump-top-btn,
.shelf-jump-chip {
  display: inline-grid;
  grid-template-columns: minmax(0, auto) auto;
  align-items: center;
  justify-content: center;
  gap: 0.34rem;
  min-height: 34px;
  padding: 0.32rem 0.68rem;
  border-color: rgba(255, 255, 255, 0.10);
  border-radius: 999px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.052), rgba(255, 255, 255, 0.018)),
    rgba(255, 255, 255, 0.032);
  color: var(--lib-muted);
  font-size: 0.74rem;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.044);
}

.shelf-jump-chip-label {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: inherit;
  font-weight: 850;
  letter-spacing: 0;
}

.shelf-jump-chip-count {
  display: inline-flex;
  min-width: 2.35em;
  min-height: 1.48em;
  align-items: center;
  justify-content: center;
  padding: 0.04rem 0.34rem;
  border: 1px solid rgba(255, 255, 255, 0.070);
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.18);
  color: rgba(232, 242, 247, 0.72);
  font-size: 0.68rem;
  font-weight: 850;
  line-height: 1;
}

.shelf-jump-chip:hover,
.shelf-jump-chip:focus-visible,
.shelf-jump-top-btn:hover,
.shelf-jump-top-btn:focus-visible {
  border-color: rgba(214, 164, 95, 0.34);
  background: rgba(214, 164, 95, 0.095);
  color: var(--lib-text);
}

.shelf-jump-map-chip {
  display: inline-flex;
  border-color: rgba(214, 164, 95, 0.34);
  background:
    linear-gradient(180deg, rgba(214, 164, 95, 0.16), rgba(214, 164, 95, 0.070)),
    rgba(214, 164, 95, 0.12);
  color: #f5ddb7;
}

.shelf-jump-chip.is-active {
  grid-template-columns: minmax(0, auto) auto auto;
  border-color: rgba(214, 164, 95, 0.58);
  background:
    linear-gradient(180deg, rgba(214, 164, 95, 0.22), rgba(214, 164, 95, 0.080)),
    rgba(214, 164, 95, 0.14);
  color: #fff2d6;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.060),
    0 8px 18px rgba(0, 0, 0, 0.16);
}

.shelf-jump-chip.is-active .shelf-jump-chip-count {
  border-color: rgba(255, 242, 214, 0.16);
  background: rgba(214, 164, 95, 0.16);
  color: #fff2d6;
}

.shelf-jump-chip.is-active::after {
  content: '現在';
  margin-left: 0;
  padding: 0.08rem 0.32rem;
  border-radius: 999px;
  background: rgba(214, 164, 95, 0.18);
  color: #fff2d6;
  font-size: 0.68rem;
  font-weight: 800;
  line-height: 1.2;
}

.bookshelf-group {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  border-radius: calc(var(--lib-radius-lg) + 6px);
  border-color: rgba(255, 255, 255, 0.095);
  background:
    radial-gradient(circle at 0% 0%, rgba(214, 164, 95, 0.070), transparent 28%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.062), rgba(255, 255, 255, 0.020)),
    rgba(10, 15, 21, 0.66);
  box-shadow:
    0 18px 46px rgba(0, 0, 0, 0.17),
    0 1px 0 rgba(255, 255, 255, 0.035) inset;
}

.bookshelf-group::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(214, 164, 95, 0.070), transparent 24%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.052), transparent 18%);
}

.bookshelf-group::after {
  content: "";
  position: absolute;
  right: 1rem;
  bottom: 0.92rem;
  left: 1rem;
  z-index: 0;
  height: 1px;
  pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.10), transparent);
}

.bookshelf-group > * {
  position: relative;
  z-index: 1;
}

.bookshelf-group.is-active {
  border-color: rgba(214, 164, 95, 0.34);
  background:
    linear-gradient(180deg, rgba(214, 164, 95, 0.085), rgba(255, 255, 255, 0.030)),
    rgba(11, 16, 22, 0.66);
}

.bookshelf-group.is-unresolved {
  border-style: dashed;
}

.bookshelf-group-title {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.8rem;
  padding-left: 0;
  color: var(--lib-text);
  letter-spacing: 0;
  text-shadow: none;
}

.bookshelf-group-title::before {
  content: none;
}

.bookshelf-group-label,
.bookshelf-group-count,
.bookshelf-level-label,
.bookshelf-level-count {
  min-width: 0;
}

.bookshelf-group-label {
  overflow-wrap: anywhere;
}

.bookshelf-group-count,
.bookshelf-level-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  border: 1px solid rgba(255, 255, 255, 0.070);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.038);
  color: rgba(232, 242, 247, 0.72);
  font-size: 0.78rem;
  font-weight: 800;
  line-height: 1.12;
}

.bookshelf-group-count {
  padding: 0.24rem 0.52rem;
}

.bookshelf-level-count {
  padding: 0.16rem 0.42rem;
}

.bookshelf-section-title {
  color: var(--lib-muted);
  letter-spacing: 0;
}

.bookshelf-level {
  position: relative;
  isolation: isolate;
  overflow: visible;
  border: 0;
  border-top: 1px solid var(--lib-line);
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}

.bookshelf-level::before {
  content: none;
}

.bookshelf-level > * {
  position: relative;
  z-index: 1;
}

.bookshelf-level-title {
  gap: 0.5rem;
  justify-content: space-between;
  width: fit-content;
  max-width: 100%;
  min-height: 30px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.052), rgba(255, 255, 255, 0.020)),
    rgba(255, 255, 255, 0.026);
  border-color: rgba(255, 255, 255, 0.092);
  color: var(--lib-muted);
}

.bookshelf-strip {
  position: relative;
  padding: 0.58rem 0.15rem 0.78rem;
  border-bottom-color: rgba(255, 255, 255, 0.060);
  scrollbar-color: rgba(214, 164, 95, 0.54) rgba(255, 255, 255, 0.045);
  scroll-padding-left: 0.2rem;
}

.shelf-book {
  position: relative;
  isolation: isolate;
  overflow: visible;
  gap: 0.46rem;
  border-radius: calc(var(--lib-radius-sm) + 3px);
  border-color: transparent;
  background: transparent;
  box-shadow: none;
  color: var(--lib-text);
}

.shelf-book::after {
  content: none;
}

.shelf-book:hover,
.shelf-book:focus-visible {
  border-color: rgba(214, 164, 95, 0.34);
  background: rgba(255, 255, 255, 0.035);
  box-shadow: none;
}

.shelf-book:hover::after,
.shelf-book:focus-visible::after {
  background: linear-gradient(90deg, transparent, rgba(240, 195, 122, 0.26), transparent);
}

.shelf-book-cover-wrap {
  position: relative;
  z-index: 1;
  border: 0;
  background: transparent;
  box-shadow: none;
  transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
}

.shelf-book-cover-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  border-radius: inherit;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.085), transparent 18%, transparent 82%, rgba(0, 0, 0, 0.16)),
    linear-gradient(180deg, rgba(255, 255, 255, 0.060), transparent 28%);
  opacity: 0.72;
  pointer-events: none;
}

.shelf-book:hover .shelf-book-cover-wrap,
.shelf-book:focus-visible .shelf-book-cover-wrap {
  border-color: transparent;
  box-shadow: none;
}

.shelf-book-title {
  position: relative;
  z-index: 1;
  display: -webkit-box;
  width: 100%;
  min-height: 2.72em;
  padding: 0.28rem 0.12rem 0.2rem;
  overflow: hidden;
  border: 0;
  border-radius: 0;
  background: transparent;
  color: #dce7ec;
  line-height: 1.32;
  text-align: left;
  word-break: keep-all;
  overflow-wrap: normal;
  text-overflow: ellipsis;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  box-shadow: none;
}

.shelf-book:hover .shelf-book-title,
.shelf-book:focus-visible .shelf-book-title {
  border-color: transparent;
  background: transparent;
  color: #f4edf0;
}

body.shelf-immersive-active {
  background:
    radial-gradient(circle at 18% 12%, rgba(104, 191, 215, 0.052), transparent 34%),
    radial-gradient(circle at 82% 20%, rgba(214, 164, 95, 0.048), transparent 30%),
    linear-gradient(180deg, #111821 0%, #0b1118 48%, #070b10 100%);
}

body.shelf-immersive-active .shelf-view {

}

body.shelf-immersive-active .bookshelf-group {
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.048), rgba(255, 255, 255, 0.024)),

}

body.shelf-immersive-active .shelf-view-overview {
  border-color: rgba(240, 195, 122, 0.18);
  background:
    linear-gradient(135deg, rgba(240, 195, 122, 0.070), rgba(104, 191, 215, 0.032)),
    rgba(9, 14, 20, 0.58);
}

body.shelf-immersive-active .shelf-view-stat {

body.shelf-immersive-active .bookshelf-level {
  border-color: var(--lib-line);

}

body.shelf-immersive-active .shelf-book {

  border-color: transparent;
}

body.shelf-immersive-active .shelf-book:hover,
body.shelf-immersive-active .shelf-book:focus-visible {
  border-color: rgba(240, 195, 122, 0.44);

}

body.shelf-immersive-active .shelf-book-title {
  border-color: rgba(240, 195, 122, 0.11);
  background:
    linear-gradient(180deg, rgba(240, 195, 122, 0.052), rgba(255, 255, 255, 0.012)),
    rgba(4, 3, 3, 0.20);
  color: #fff1dc;
}

.shelf-room-map,
.shelf-room-map-modal-panel {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  border-color: rgba(240, 195, 122, 0.22);
  background:
    radial-gradient(circle at 0% 0%, rgba(240, 195, 122, 0.078), transparent 34%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.054), rgba(255, 255, 255, 0.020)),

}

.shelf-room-map-summary,
.shelf-room-map-modal-header {

  color: #f6ead8;
}

.shelf-room-map-summary {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 0.52rem;
}

.shelf-room-map-summary::before {
  color: var(--lib-amber-2);
  margin-right: 0;
}

.shelf-room-map-summary-label {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.shelf-room-map-summary-meta,
.shelf-room-map-modal-meta,

  justify-content: center;
  padding: 0.14rem 0.46rem;
  border: 1px solid rgba(240, 195, 122, 0.16);
  border-radius: 999px;
  background:
    linear-gradient(180deg, rgba(240, 195, 122, 0.10), rgba(240, 195, 122, 0.032)),
    rgba(0, 0, 0, 0.18);
  color: rgba(255, 242, 214, 0.76);

.shelf-room-map-modal-header {
  align-items: center;
}

.shelf-room-map-modal-title-block {
  display: flex;
  min-width: 0;

  gap: 0.22rem;
}

.shelf-room-map-modal-title {

  white-space: nowrap;
  letter-spacing: 0;
}

.shelf-room-map-modal-meta {
  min-height: 1.42rem;

}

.shelf-room-map-canvas {

  box-shadow: 0 12px 26px rgba(0, 0, 0, 0.36);
}

.room-map-shelf.is-active {

    linear-gradient(180deg, rgba(240, 195, 122, 0.18), rgba(255, 255, 255, 0.026)),

  box-shadow:

}

.room-map-shelf-count {

.room-map-shelf.has-books .room-map-shelf-count {

body.shelf-immersive-active .shelf-room-map-fab {
