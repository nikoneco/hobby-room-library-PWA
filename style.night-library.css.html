html.sandbox-redesign-root {
  background: #0b0f0e;
  color-scheme: dark;
}

body.sandbox-redesign {

  --night-line-strong: rgba(235, 230, 217, 0.25);
  --night-accent: #d6b36e;
  --night-accent-strong: #edce8b;
  --night-accent-ink: #241a08;
  --night-danger: #da8d7f;
  --night-radius-control: 5px;
  --night-radius-panel: 8px;
  --night-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
  --night-max: 1320px;
  --night-ease: 160ms cubic-bezier(0.2, 0, 0, 1);

  --pwa-bg-top: var(--night-bg);
  --pwa-bg: var(--night-bg);
  --pwa-bg-bottom: #070a09;
  --pwa-panel: var(--night-panel);
  --pwa-panel-strong: var(--night-panel-strong);
  --pwa-panel-soft: rgba(255, 255, 255, 0.035);
  --pwa-line: var(--night-line);
  --pwa-line-strong: var(--night-line-strong);
  --pwa-accent: var(--night-accent);
  --pwa-accent-2: var(--night-accent-strong);
  --pwa-accent-rgb: 214, 179, 110;
  --pwa-accent-2-rgb: 237, 206, 139;
  --pwa-accent-text: var(--night-accent-ink);
  --pwa-accent-readable: var(--night-text);
  --pwa-warm: var(--night-accent);
  --pwa-warm-2: var(--night-accent-strong);
  --pwa-warm-rgb: 214, 179, 110;
  --pwa-grid-rgb: 214, 179, 110;

  --lib-bg: var(--night-bg);
  --lib-bg-2: var(--night-bg-raised);
  --lib-panel: var(--night-panel);
  --lib-panel-strong: var(--night-panel-strong);
  --lib-panel-soft: rgba(255, 255, 255, 0.035);
  --lib-line: var(--night-line);
  --lib-line-strong: var(--night-line-strong);
  --lib-text: var(--night-text);
  --lib-muted: var(--night-muted);
  --lib-subtle: var(--night-subtle);
  --lib-accent: var(--night-accent);
  --lib-accent-2: var(--night-accent-strong);
  --lib-amber: var(--night-accent);
  --lib-amber-2: var(--night-accent-strong);
  --lib-radius-sm: 4px;
  --lib-radius-md: 6px;
  --lib-radius-lg: 8px;
  --lib-shadow-sm: 0 10px 34px rgba(0, 0, 0, 0.22);
  --lib-shadow-md: var(--night-shadow);
  --lib-ease: var(--night-ease);

  margin: 0;
  min-height: 100dvh;
  overflow-x: hidden;
  background: var(--night-bg);
  color: var(--night-text);
  font-family: "Yu Gothic UI", "BIZ UDPGothic", Aptos, "Noto Sans JP", system-ui, sans-serif;
  font-feature-settings: "palt" 1;
  letter-spacing: 0.01em;
}

body.sandbox-redesign.pwa-theme-kohi {

  --night-bg-raised: #181213;
  --night-panel: #1e1718;
  --night-panel-strong: #241b1c;
  --night-accent: #d28b7b;
  --night-accent-strong: #e9ad9e;
  --night-accent-ink: #2b0d0b;
  --pwa-accent-rgb: 210, 139, 123;
  --pwa-accent-2-rgb: 233, 173, 158;
  --pwa-warm-rgb: 210, 139, 123;

body.sandbox-redesign.pwa-theme-shikon {

  --night-accent: #b9a6d5;

  --pwa-accent-2-rgb: 208, 192, 230;

  --pwa-accent-2-rgb: 237, 199, 127;

body.sandbox-redesign::before,
body.sandbox-redesign::after,
body.sandbox-redesign .search-container::before,

body.sandbox-redesign button,
body.sandbox-redesign input,
body.sandbox-redesign select,
body.sandbox-redesign textarea {

/* Brand and initial search */

body.sandbox-redesign .search-container,
body.sandbox-redesign .search-container.centered,
body.sandbox-redesign .search-container.shrink,
body.sandbox-redesign .search-container.shrink.compact,
body.sandbox-redesign .search-container.shrink.shelf-view-active {

  width: 100%;
  max-width: none;
  margin: 0;
  border: 0;
  border-bottom: 1px solid var(--night-line);
  border-radius: 0;
  background: var(--night-bg);
  box-shadow: none;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

body.sandbox-redesign .search-container.centered {
  position: relative;
  top: 0;
  display: grid;
  grid-template-columns: minmax(230px, 0.8fr) minmax(480px, 1.35fr);
  grid-template-areas:

    "brand form";

  gap: 1.4rem clamp(3rem, 7vw, 8rem);

  padding: clamp(4.5rem, 8vw, 7rem) max(2rem, calc((100vw - var(--night-max)) / 2));
  overflow: visible;
  text-align: left;
}

body.sandbox-redesign .preview-brand {
  grid-area: brand;
  display: grid;
  grid-template-columns: 64px minmax(0, 1fr);
  align-items: center;
  gap: 1.25rem;
  width: min(100%, 370px);
  min-height: 84px;
  padding: 0;
  border: 0;
  background: transparent;
  color: var(--night-text);
  text-align: left;
  cursor: pointer;
}

body.sandbox-redesign .preview-brand-mark {
  display: grid;
  width: 64px;
  height: 64px;
  place-items: center;
  border: 1px solid var(--night-line-strong);
  border-radius: var(--night-radius-panel);
  color: var(--night-accent);
}

body.sandbox-redesign .preview-brand-mark .ti {
  font-size: 2.05rem;
  font-weight: 400;
}

body.sandbox-redesign .preview-brand-mark svg {
  width: 2.05rem;
  height: 2.05rem;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.7;
  stroke-linecap: round;
  stroke-linejoin: round;
}

body.sandbox-redesign .app-brand-default-mark {
  display: grid;
  width: 100%;
  height: 100%;

}

body.sandbox-redesign .app-brand-librarian-image {

  height: 100%;

}

}

}
