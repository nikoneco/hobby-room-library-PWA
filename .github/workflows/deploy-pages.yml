name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - tools/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Check client JavaScript
        run: node tools/check-client-js.js

      - name: Check client CSS
        run: node tools/check-client-css.js

      - name: Check Pages artifact
        run: node tools/check-pages.js

      - name: Check GAS API surface
        run: node tools/check-server-api.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
