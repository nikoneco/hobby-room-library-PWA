<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a1217">
  <meta name="color-scheme" content="dark light">
  <title>オフライン | 趣味部屋図書館</title>
  <link rel="stylesheet" href="./assets/css/pwa.css">
  <style>
    :root {
      --offline-bg: #0a1217;
      --offline-panel: rgba(13, 22, 29, 0.88);
      --offline-line: rgba(116, 198, 204, 0.22);
      --offline-warm: #f0c37a;
      --offline-accent: #68bfd7;
      --offline-text: #edf5f7;
      --offline-muted: rgba(220, 232, 238, 0.68);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: clamp(20px, 5vw, 44px);
      background:
        radial-gradient(circle at 24% 16%, rgba(240, 195, 122, 0.10), transparent 34%),
        radial-gradient(circle at 78% 20%, rgba(104, 191, 215, 0.10), transparent 36%),
        linear-gradient(180deg, #10171e 0%, var(--offline-bg) 52%, #05070a 100%);
      color: var(--offline-text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      width: min(620px, 100%);
      padding: clamp(1.42rem, 4vw, 2rem);
      border: 1px solid var(--offline-line);
      border-radius: 20px;
      background:
        radial-gradient(circle at 14% 0%, rgba(240, 195, 122, 0.12), transparent 34%),
        linear-gradient(145deg, rgba(104, 191, 215, 0.080), rgba(240, 195, 122, 0.045) 46%, rgba(255, 255, 255, 0.026)),
        var(--offline-panel);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.38),
        0 0 0 1px rgba(255, 255, 255, 0.034) inset,
        inset 0 1px 0 rgba(255, 255, 255, 0.060);
    }

    main::before {
      content: "";
      display: block;
      width: 104px;
      height: 42px;
      margin: 0 0 1.05rem;
      border-bottom: 2px solid rgba(240, 195, 122, 0.34);
      background:
        linear-gradient(90deg, rgba(104, 191, 215, 0.78) 0 10px, transparent 10px 14px),
        linear-gradient(90deg, transparent 14px, rgba(240, 195, 122, 0.74) 14px 28px, transparent 28px 32px),
        linear-gradient(90deg, transparent 32px, rgba(105, 198, 163, 0.68) 32px 44px, transparent 44px 48px),
        linear-gradient(90deg, transparent 48px, rgba(104, 191, 215, 0.60) 48px 62px, transparent 62px 66px),
        linear-gradient(90deg, transparent 66px, rgba(214, 164, 95, 0.62) 66px 84px, transparent 84px);
      background-position: center bottom;
      background-repeat: no-repeat;
      background-size: 100% 82%;
      opacity: 0.86;
    }

    main::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 18% 0%, rgba(240, 195, 122, 0.12), transparent 34%),
        radial-gradient(circle at 86% 8%, rgba(104, 191, 215, 0.10), transparent 36%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.044), transparent 46%);
      pointer-events: none;
    }

    .offline-meta {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      min-height: 30px;
      margin: 0 0 0.8rem;
      padding: 0.22rem 0.62rem;
      border: 1px solid rgba(240, 195, 122, 0.28);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.052), rgba(255, 255, 255, 0.018)),
        rgba(240, 195, 122, 0.070);
      color: #f7ddaf;
      font-size: 0.76rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .offline-meta::before {
      content: "";
      width: 0.48rem;
      height: 0.48rem;
      border-radius: 999px;
      background: var(--offline-warm);
      box-shadow: 0 0 0 4px rgba(240, 195, 122, 0.10);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.48rem, 7vw, 2.2rem);
      line-height: 1.22;
      letter-spacing: 0;
      text-wrap: balance;
    }

    p {
      max-width: 35em;
      margin: 0;
      color: var(--offline-muted);
      line-height: 1.75;
    }

    .offline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 1.2rem;
      padding-top: 1.05rem;
      border-top: 1px solid rgba(116, 198, 204, 0.14);
    }

    button,
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.42rem;
      min-height: 44px;
      padding: 10px 18px;
      border: 1px solid rgba(240, 195, 122, 0.36);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(240, 195, 122, 0.18), rgba(104, 191, 215, 0.070)),
        rgba(255, 255, 255, 0.040);
      color: #fff1d8;
      font: inherit;
      font-weight: 800;
      line-height: 1.2;
      text-decoration: none;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    a {
      border-color: rgba(116, 198, 204, 0.26);
      background: rgba(255, 255, 255, 0.046);
      color: rgba(237, 245, 247, 0.84);
    }

    button:hover,
    button:focus-visible,
    a:hover,
    a:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(240, 195, 122, 0.62);
      background:
        linear-gradient(180deg, rgba(240, 195, 122, 0.24), rgba(104, 191, 215, 0.085)),
        rgba(255, 255, 255, 0.052);
      color: #fff6e6;
      outline: none;
    }

    button:focus-visible,
    a:focus-visible {
      box-shadow: 0 0 0 3px rgba(104, 191, 215, 0.18);
    }

    button:active,
    a:active {
      transform: translateY(1px);
    }

    @media (max-width: 520px) {
      main {
        border-radius: 16px;
      }

      .offline-actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      button,
      a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="offline-meta">オフライン</div>
    <h1>通信が切れています</h1>
    <p>趣味部屋図書館の検索と本棚データ取得には通信が必要です。回線が戻ったら、もう一度開いてください。</p>
    <div class="offline-actions">
      <button type="button" onclick="location.reload()">再読み込み</button>
      <a href="./">入口へ戻る</a>
    </div>
  </main>
</body>
</html>
