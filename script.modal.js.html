<script>
function shouldIgnoreBookOpenSurfaceClick_(target) {
  return !!(
    target &&
    typeof target.closest === 'function' &&
    target.closest('button, a, input, select, textarea, label, .summary-text, .genre-chip')
  );
}

function setupBookOpenSurface_(element, book, idx, data) {
  if (!element) return;
  element.classList.add('book-open-surface');
  element.onclick = function(e) {
    if (shouldIgnoreBookOpenSurfaceClick_(e.target)) return;
    showPopup(book, idx, data);
  };
}

function setupBookKeyboardOpenSurface_(element, book, idx, data) {
  if (!element) return;
  element.classList.add('book-open-keyboard-surface');
  element.tabIndex = 0;
  element.setAttribute('role', 'button');
  element.setAttribute('aria-label', `${book && book.title ? book.title : 'この本'} の詳細を開く`);
  element.onkeydown = function(e) {
    if (shouldIgnoreBookOpenSurfaceClick_(e.target)) return;
    if (e.key !== 'Enter' && e.key !== ' ') return;

    e.preventDefault();
    showPopup(book, idx, data);
  };
}


function shouldShowSeriesButton(book) {
  return !!(
    book &&
    book.seriesKeyAuto &&
    Number(book.seriesCount || 0) >= 2
  );
}

function buildExternalLinksHtml(book) {
  if (!book || !book.links) return '';

  const googleUrl = escapeHtml(book.links.googleUrl || '');
  const bellUrl = escapeHtml(book.links.bellUrl || '');
  const amazonUrl = escapeHtml(book.links.amazonUrl || '');

  return `
    <div class="popup-link-row">
      <a href="${googleUrl}" target="_blank" rel="noopener noreferrer" class="popup-link-btn">${uiIcon_('search', 'ui-icon-inline')}<span>Googleで新刊検索</span></a>
      <a href="${bellUrl}" target="_blank" rel="noopener noreferrer" class="popup-link-btn">${uiIcon_('bell', 'ui-icon-inline')}<span>BellAlert</span></a>
      <a href="${amazonUrl}" target="_blank" rel="noopener noreferrer" class="popup-link-btn">${uiIcon_('store', 'ui-icon-inline')}<span>Amazon</span></a>
    </div>
  `;
}

function buildPopupActionsHtml(book, seriesContext) {
  const parts = [];

  if (seriesContext && Array.isArray(seriesContext.items)) {
    parts.push(`
      <button type="button" id="popup-series-back-btn" class="popup-action-btn">
        ${uiIcon_('back', 'ui-icon-inline')}<span>シリーズ一覧へ戻る</span>
      </button>
    `);
  }

  if (shouldShowSeriesButton(book)) {
    parts.push(`
      <button type="button" id="popup-series-btn" class="popup-action-btn primary">
        ${uiIcon_('collection', 'ui-icon-inline')}<span>このシリーズを見る（${Number(book.seriesCount || 0)}冊）</span>
      </button>
    `);
  }

  const linksHtml = buildExternalLinksHtml(book);
  if (linksHtml) parts.push(linksHtml);

  if (!parts.length) return '';

  return `
    <div class="popup-action-area">
      ${parts.join('')}
    </div>
  `;
}

function attachPopupActionHandlers(book, seriesContext) {
  const seriesBtn = document.getElementById('popup-series-btn');
  if (seriesBtn) {
    seriesBtn.onclick = function(e) {
      e.stopPropagation();
      openSeriesPanel(book);
    };
  }

  const backBtn = document.getElementById('popup-series-back-btn');
  if (backBtn && seriesContext && Array.isArray(seriesContext.items)) {
    backBtn.onclick = function(e) {
      e.stopPropagation();
      showSeriesPanel(seriesContext.sourceBook || book, seriesContext.items, seriesContext.returnContext || null);
    };
  }
}

function getPopupNavBookLabel_(targetIndex) {
  if (!Array.isArray(popupData) || targetIndex < 0 || targetIndex >= popupData.length) return '';
  const targetBook = popupData[targetIndex];
  return targetBook && targetBook.title ? String(targetBook.title) : '';
}

function setupPopupNavButton_(button, targetIndex, directionLabel) {
  if (!button) return;

  const targetTitle = getPopupNavBookLabel_(targetIndex);
  const accessibleLabel = targetTitle ? `${directionLabel}: ${targetTitle}` : directionLabel;
  button.setAttribute('aria-label', accessibleLabel);
  button.removeAttribute('title');

  if (targetTitle) {
    button.classList.add('has-nav-label');
    button.setAttribute('data-nav-label', targetTitle);
  } else {
    button.classList.remove('has-nav-label');
    button.removeAttribute('data-nav-label');
  }
}

function updatePopupNavPlacement_() {
  const popupContent = document.getElementById('image-popup-content');
  const img = document.getElementById('image-popup-img');
  if (!popupContent || !img || img.style.display === 'none') return;

  window.requestAnimationFrame(function() {
    const contentRect = popupContent.getBoundingClientRect();
    const imgRect = img.getBoundingClientRect();
    if (!contentRect.height || !imgRect.height) return;

    const centerY = imgRect.top - contentRect.top + (imgRect.height / 2);
    popupContent.style.setProperty('--popup-nav-y', `${Math.round(centerY)}px`);
  });
}

function clearPopupTouchHandlers_() {
  const overlay = document.getElementById('image-popup-overlay');
  const popupContent = document.getElementById('image-popup-content');
  if (overlay) {
    overlay.ontouchstart = null;
    overlay.ontouchmove = null;
    overlay.ontouchend = null;
    overlay.onpointerdown = null;
    overlay.onpointermove = null;
    overlay.onpointerup = null;
    overlay.onpointercancel = null;
    overlay.onmousedown = null;
    overlay.onmousemove = null;
    overlay.onmouseup = null;
    overlay.onmouseleave = null;
  }
  if (popupContent) {
    clearPopupMotionState_(popupContent);
  }
}

function clearPopupMotionState_(popupContent) {
  if (!popupContent) return;
  popupContent.classList.remove(
    'is-dragging',
    'popup-commit-next',
    'popup-commit-prev',
    'popup-slide-next',
    'popup-slide-prev'
  );
  popupContent.style.removeProperty('--popup-drag-x');
  popupContent.style.removeProperty('--popup-drag-y');
  popupContent.style.removeProperty('--popup-drag-opacity');
}

function isBookPopupOpen_() {
  const overlay = document.getElementById('image-popup-overlay');
  return !!(
    overlay &&
    overlay.style &&
    overlay.style.display !== 'none' &&
    document.body &&
    document.body.classList &&
    document.body.classList.contains('modal-open')
  );
}

function shouldFetchDeferredBookDetails_(book) {
  return !!(
    book &&
    book.detailLoaded === false &&
    book.rowIndex !== undefined &&
    book.rowIndex !== null &&
    !book.detailLoading
  );
}

function getBookDetailCacheKey_(book) {
  if (!book || book.rowIndex === undefined || book.rowIndex === null) return '';
  return `row:${book.rowIndex}`;
}

function rememberBookDetail_(book, detail) {
  const key = getBookDetailCacheKey_(book);
  if (!key || !detail || typeof detail !== 'object') return;

  bookDetailCache.set(key, detail);
  while (bookDetailCache.size > BOOK_DETAIL_CACHE_LIMIT) {
    const oldestKey = bookDetailCache.keys().next().value;
    bookDetailCache.delete(oldestKey);
  }

  rememberPersistentBookDetail_(key, detail);
}

function touchMemoryBookDetail_(key, detail) {
  if (!key || !detail) return;
  bookDetailCache.delete(key);
  bookDetailCache.set(key, detail);
  while (bookDetailCache.size > BOOK_DETAIL_CACHE_LIMIT) {
    const oldestKey = bookDetailCache.keys().next().value;
    bookDetailCache.delete(oldestKey);
  }
}

function getCachedBookDetail_(book) {
  const key = getBookDetailCacheKey_(book);
  if (!key) return null;

  const memoryDetail = bookDetailCache.get(key);
  if (memoryDetail) {
    touchMemoryBookDetail_(key, memoryDetail);
    return memoryDetail;
  }

  const persistentDetail = getPersistentBookDetail_(book, key);
  if (persistentDetail) {
    touchMemoryBookDetail_(key, persistentDetail);
    return persistentDetail;
  }

  return null;
}

function addBookDetailInFlightCallback_(key, callback) {
  if (!key || typeof callback !== 'function') return;
  const callbacks = bookDetailInFlightCallbacks.get(key) || [];
  callbacks.push(callback);
  bookDetailInFlightCallbacks.set(key, callbacks);
}

function settleBookDetailInFlight_(key, detail, error) {
  const callbacks = key ? bookDetailInFlightCallbacks.get(key) : null;
  if (key) bookDetailInFlightCallbacks.delete(key);
  if (!callbacks || !callbacks.length) return;
  callbacks.forEach(callback => {
    callback(detail, error);
  });
}

function canPrefetchBookDetails_() {
  if (typeof navigator !== 'undefined' && navigator && navigator.onLine === false) return false;

  const connection = typeof navigator !== 'undefined'
    ? (navigator.connection || navigator.mozConnection || navigator.webkitConnection)
    : null;
  if (!connection) return true;
  if (connection.saveData) return false;

  const effectiveType = String(connection.effectiveType || '').toLowerCase();
  return effectiveType !== 'slow-2g' && effectiveType !== '2g';
}

function getBookDetailPrefetchConcurrency_() {
  return canPrefetchBookDetails_() ? BOOK_DETAIL_PREFETCH_CONCURRENCY : 1;
}

function readPersistentBookDetailCache_() {
  if (bookDetailPersistentCachePayload !== undefined) {
    return bookDetailPersistentCachePayload;
  }

  try {
    if (!window.localStorage) {
      bookDetailPersistentCachePayload = null;
      return bookDetailPersistentCachePayload;
    }
    const raw = window.localStorage.getItem(BOOK_DETAIL_PERSISTENT_CACHE_KEY);
    if (!raw) {
      bookDetailPersistentCachePayload = { version: 1, items: {} };
      return bookDetailPersistentCachePayload;
    }
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object' || !parsed.items || typeof parsed.items !== 'object') {
      bookDetailPersistentCachePayload = { version: 1, items: {} };
      return bookDetailPersistentCachePayload;
    }
    bookDetailPersistentCachePayload = parsed;
    return bookDetailPersistentCachePayload;
  } catch (e) {
    bookDetailPersistentCachePayload = null;
    return bookDetailPersistentCachePayload;
  }
}

function writePersistentBookDetailCache_(payload) {
  try {
    if (!window.localStorage || !payload) return;
    bookDetailPersistentCachePayload = payload;
    window.localStorage.setItem(BOOK_DETAIL_PERSISTENT_CACHE_KEY, JSON.stringify(payload));
  } catch (e) {
    // 端末容量やプライベートモードでは失敗しても通常通信へフォールバックする。
  }
}

function rememberPersistentBookDetail_(key, detail) {
  const payload = readPersistentBookDetailCache_();
  if (!payload || !key || !detail || typeof detail !== 'object') return;

  const now = Date.now();
  payload.version = 1;
  payload.items[key] = {
    savedAt: now,
    detail: detail
  };

  const entries = Object.keys(payload.items)
    .map(cacheKey => ({ key: cacheKey, entry: payload.items[cacheKey] }))
    .filter(item => item.entry && now - Number(item.entry.savedAt || 0) <= BOOK_DETAIL_PERSISTENT_CACHE_TTL_MS)
    .sort((a, b) => Number(b.entry.savedAt || 0) - Number(a.entry.savedAt || 0))
    .slice(0, BOOK_DETAIL_PERSISTENT_CACHE_LIMIT);

  payload.items = {};
  entries.forEach(item => {
    payload.items[item.key] = item.entry;
  });
  writePersistentBookDetailCache_(payload);
}

function isPersistentBookDetailMatch_(book, detail) {
  if (!book || !detail) return false;

  const bookTitle = String(book.title || '').trim();
  const detailTitle = String(detail.title || '').trim();
  if (bookTitle && detailTitle && bookTitle !== detailTitle) return false;

  const bookIsbn = String(book.isbn || '').trim();
  const detailIsbn = String(detail.isbn || '').trim();
  if (bookIsbn && detailIsbn && bookIsbn !== detailIsbn) return false;

  return true;
}

function getPersistentBookDetail_(book, key) {
  const payload = readPersistentBookDetailCache_();
  if (!payload || !key || !payload.items) return null;

  const entry = payload.items[key];
  if (!entry || !entry.detail || typeof entry.detail !== 'object') return null;

  if (Date.now() - Number(entry.savedAt || 0) > BOOK_DETAIL_PERSISTENT_CACHE_TTL_MS) {
    delete payload.items[key];
    writePersistentBookDetailCache_(payload);
    return null;
  }

  if (!isPersistentBookDetailMatch_(book, entry.detail)) return null;
  return entry.detail;
}

function mergeDeferredBookDetails_(book, detail) {
  if (!book || !detail || typeof detail !== 'object') return book;

  Object.keys(detail).forEach(key => {
    book[key] = detail[key];
  });
  book.detailLoaded = true;
  book.detailLoading = false;
  book.detailError = '';
  return book;
}

function replaceDeferredBookReference_(book, merged, index, dataArr, seriesContext) {
  if (Array.isArray(dataArr) && dataArr[index] === book) {
    dataArr[index] = merged;
  }

  if (isBookPopupOpen_() && Array.isArray(popupData) && popupData[popupIndex] === book) {
    popupData[popupIndex] = merged;
    showPopup(merged, popupIndex, popupData, popupSeriesContext || seriesContext);
  }
}

function handleDeferredBookDetailResult_(book, index, dataArr, seriesContext, options, detail, error) {
  const opt = options || {};
  book.detailLoading = false;
  book.detailPrefetching = false;

  if (detail) {
    const merged = mergeDeferredBookDetails_(book, detail);
    replaceDeferredBookReference_(book, merged, index, dataArr, seriesContext);
    if (typeof opt.onDone === 'function') opt.onDone(merged);
    return;
  }

  if (!opt.prefetch) {
    if (error) console.warn('getBookDetailByRowIndex failed:', error);
    book.detailError = '詳細データを取得できませんでした。';
  }
  if (typeof opt.onDone === 'function') opt.onDone(null);
}

function fetchDeferredBookDetails_(book, index, dataArr, seriesContext, options) {
  const opt = options || {};
  const cached = getCachedBookDetail_(book);
  if (cached) {
    const mergedFromCache = mergeDeferredBookDetails_(book, cached);
    replaceDeferredBookReference_(book, mergedFromCache, index, dataArr, seriesContext);
    if (typeof opt.onDone === 'function') opt.onDone(mergedFromCache);
    return;
  }

  const key = getBookDetailCacheKey_(book);
  if (key && bookDetailInFlightCallbacks.has(key)) {
    book.detailLoading = true;
    book.detailPrefetching = Boolean(opt.prefetch);
    addBookDetailInFlightCallback_(key, function(detail, error) {
      handleDeferredBookDetailResult_(book, index, dataArr, seriesContext, opt, detail, error);
    });
    return;
  }

  if (!shouldFetchDeferredBookDetails_(book)) {
    if (typeof opt.onDone === 'function') opt.onDone(null);
    return;
  }

  book.detailLoading = true;
  book.detailPrefetching = Boolean(opt.prefetch);
  if (key) {
    addBookDetailInFlightCallback_(key, function(detail, error) {
      handleDeferredBookDetailResult_(book, index, dataArr, seriesContext, opt, detail, error);
    });
  }

  google.script.run
    .withSuccessHandler(function(detail) {
      if (!detail) {
        if (key) {
          settleBookDetailInFlight_(key, null, null);
        } else {
          handleDeferredBookDetailResult_(book, index, dataArr, seriesContext, opt, null, null);
        }
        return;
      }

      rememberBookDetail_(book, detail);
      if (key) {
        settleBookDetailInFlight_(key, detail, null);
      } else {
        handleDeferredBookDetailResult_(book, index, dataArr, seriesContext, opt, detail, null);
      }
    })
    .withFailureHandler(function(err) {
      if (key) {
        settleBookDetailInFlight_(key, null, err);
      } else {
        handleDeferredBookDetailResult_(book, index, dataArr, seriesContext, opt, null, err);
      }
    })
    .getBookDetailByRowIndex(book.rowIndex);
}

function removeBookDetailPrefetchItems_(books) {
  if (!Array.isArray(books) || !books.length || !bookDetailPrefetchQueue.length) return;
  const targets = new Set(books.filter(Boolean));
  if (!targets.size) return;

  bookDetailPrefetchQueue = bookDetailPrefetchQueue.filter(item => {
    if (!targets.has(item)) return true;
    item.detailQueued = false;
    return false;
  });
}

function collectPopupContextDetailTargets_(book, index, dataArr) {
  const targets = [];
  const seen = new Set();
  const baseIndex = Math.floor(Number(index));

  function addTarget_(targetBook, targetIndex, isCurrent) {
    if (!targetBook) return;
    const key = getBookDetailCacheKey_(targetBook);
    const id = key || `idx:${targetIndex}`;
    if (seen.has(id)) return;
    seen.add(id);
    targets.push({
      book: targetBook,
      index: targetIndex,
      options: { prefetch: !isCurrent }
    });
  }

  addTarget_(book, Number.isFinite(baseIndex) ? baseIndex : index, true);
  if (!Array.isArray(dataArr) || !Number.isFinite(baseIndex)) return targets;

  for (let step = 1; step <= POPUP_DETAIL_PREFETCH_RADIUS; step += 1) {
    addTarget_(dataArr[baseIndex + step], baseIndex + step, false);
    addTarget_(dataArr[baseIndex - step], baseIndex - step, false);
  }

  return targets;
}

function fetchPopupContextBookDetails_(book, index, dataArr, seriesContext) {
  const targets = collectPopupContextDetailTargets_(book, index, dataArr);
  if (!targets.length) return;

  const requestTargets = [];

  targets.forEach(target => {
    const targetBook = target.book;
    const cached = getCachedBookDetail_(targetBook);
    if (cached) {
      const mergedFromCache = mergeDeferredBookDetails_(targetBook, cached);
      replaceDeferredBookReference_(targetBook, mergedFromCache, target.index, dataArr, seriesContext);
      return;
    }

    const key = getBookDetailCacheKey_(targetBook);
    if (key && bookDetailInFlightCallbacks.has(key)) {
      targetBook.detailLoading = true;
      targetBook.detailPrefetching = Boolean(target.options.prefetch);
      addBookDetailInFlightCallback_(key, function(detail, error) {
        handleDeferredBookDetailResult_(targetBook, target.index, dataArr, seriesContext, target.options, detail, error);
      });
      return;
    }

    if (!shouldFetchDeferredBookDetails_(targetBook)) return;
    requestTargets.push(target);
  });

  if (!requestTargets.length) return;
  removeBookDetailPrefetchItems_(requestTargets.map(target => target.book));

  requestTargets.forEach(target => {
    target.book.detailLoading = true;
    target.book.detailPrefetching = Boolean(target.options.prefetch);
    const key = getBookDetailCacheKey_(target.book);
    if (key) {
      addBookDetailInFlightCallback_(key, function(detail, error) {
        handleDeferredBookDetailResult_(target.book, target.index, dataArr, seriesContext, target.options, detail, error);
      });
    }
  });

  const rowIndexes = requestTargets
    .map(target => target.book && target.book.rowIndex)
    .filter(value => value !== undefined && value !== null)
    .join(',');

  google.script.run
    .withSuccessHandler(function(details) {
      const detailByRowIndex = new Map();
      (Array.isArray(details) ? details : []).forEach(detail => {
        if (detail && detail.rowIndex !== undefined && detail.rowIndex !== null) {
          detailByRowIndex.set(String(detail.rowIndex), detail);
        }
      });

      requestTargets.forEach(target => {
        const detail = detailByRowIndex.get(String(target.book.rowIndex));
        const key = getBookDetailCacheKey_(target.book);
        if (detail) rememberBookDetail_(target.book, detail);
        if (key) {
          settleBookDetailInFlight_(key, detail || null, null);
        } else {
          handleDeferredBookDetailResult_(target.book, target.index, dataArr, seriesContext, target.options, detail || null, null);
        }
      });
    })
    .withFailureHandler(function(err) {
      requestTargets.forEach(target => {
        const key = getBookDetailCacheKey_(target.book);
        if (key) {
          settleBookDetailInFlight_(key, null, err);
        } else {
          handleDeferredBookDetailResult_(target.book, target.index, dataArr, seriesContext, target.options, null, err);
        }
      });
    })
    .getBookDetailsByRowIndexes(rowIndexes);
}

function processBookDetailPrefetchQueue_() {
  if (!canPrefetchBookDetails_()) return;
  if (bookDetailPrefetchActive >= getBookDetailPrefetchConcurrency_()) return;

  const batch = [];
  while (bookDetailPrefetchQueue.length && batch.length < BOOK_DETAIL_PREFETCH_BATCH_SIZE) {
    const item = bookDetailPrefetchQueue.shift();
    if (!item) continue;
    item.detailQueued = false;
    if (!shouldFetchDeferredBookDetails_(item) || getCachedBookDetail_(item)) continue;
    const inFlightKey = getBookDetailCacheKey_(item);
    if (inFlightKey && bookDetailInFlightCallbacks.has(inFlightKey)) {
      item.detailLoading = true;
      item.detailPrefetching = true;
      addBookDetailInFlightCallback_(inFlightKey, function(detail, error) {
        handleDeferredBookDetailResult_(item, -1, null, null, { prefetch: true }, detail, error);
      });
      continue;
    }
    batch.push(item);
  }

  if (!batch.length) {
    if (bookDetailPrefetchQueue.length) window.setTimeout(processBookDetailPrefetchQueue_, 0);
    return;
  }

  bookDetailPrefetchActive += 1;
  batch.forEach(book => {
    book.detailLoading = true;
    book.detailPrefetching = true;
    const key = getBookDetailCacheKey_(book);
    if (key) {
      addBookDetailInFlightCallback_(key, function(detail, error) {
        handleDeferredBookDetailResult_(book, -1, null, null, { prefetch: true }, detail, error);
      });
    }
  });

  const rowIndexes = batch
    .map(book => book && book.rowIndex)
    .filter(value => value !== undefined && value !== null)
    .join(',');

  google.script.run
    .withSuccessHandler(function(details) {
      const detailByRowIndex = new Map();
      (Array.isArray(details) ? details : []).forEach(detail => {
        if (detail && detail.rowIndex !== undefined && detail.rowIndex !== null) {
          detailByRowIndex.set(String(detail.rowIndex), detail);
        }
      });

      batch.forEach(book => {
        const detail = detailByRowIndex.get(String(book.rowIndex));
        const key = getBookDetailCacheKey_(book);
        if (detail) rememberBookDetail_(book, detail);
        if (key) {
          settleBookDetailInFlight_(key, detail || null, null);
        } else {
          handleDeferredBookDetailResult_(book, -1, null, null, { prefetch: true }, detail || null, null);
        }
      });
    })
    .withFailureHandler(function(err) {
      batch.forEach(book => {
        const key = getBookDetailCacheKey_(book);
        if (key) {
          settleBookDetailInFlight_(key, null, err);
        } else {
          handleDeferredBookDetailResult_(book, -1, null, null, { prefetch: true }, null, err);
        }
      });
    })
    .getBookDetailsByRowIndexes(rowIndexes);

  window.setTimeout(function waitForPrefetchBatch_() {
    const stillLoading = batch.some(book => book && book.detailLoading);
    if (stillLoading) {
      window.setTimeout(waitForPrefetchBatch_, 120);
      return;
    }

    bookDetailPrefetchActive = Math.max(0, bookDetailPrefetchActive - 1);
    if (bookDetailPrefetchQueue.length) {
      window.setTimeout(processBookDetailPrefetchQueue_, 80);
    }
  }, 120);

  if (bookDetailPrefetchQueue.length && bookDetailPrefetchActive < getBookDetailPrefetchConcurrency_()) {
    window.setTimeout(processBookDetailPrefetchQueue_, 80);
  }
}

function queueBookDetailPrefetch_(book, priority) {
  if (!canPrefetchBookDetails_()) return;
  if (!shouldFetchDeferredBookDetails_(book) || getCachedBookDetail_(book)) return;

  if (!book.detailQueued) {
    book.detailQueued = true;
    if (priority) {
      bookDetailPrefetchQueue.unshift(book);
    } else {
      bookDetailPrefetchQueue.push(book);
    }
  } else if (priority) {
    bookDetailPrefetchQueue = bookDetailPrefetchQueue.filter(item => item !== book);
    bookDetailPrefetchQueue.unshift(book);
  }

  if (bookDetailPrefetchQueue.length > BOOK_DETAIL_PREFETCH_QUEUE_LIMIT) {
    const overflow = bookDetailPrefetchQueue.splice(BOOK_DETAIL_PREFETCH_QUEUE_LIMIT);
    overflow.forEach(item => {
      if (item) item.detailQueued = false;
    });
  }

  if (bookDetailPrefetchTimer) window.clearTimeout(bookDetailPrefetchTimer);
  bookDetailPrefetchTimer = window.setTimeout(processBookDetailPrefetchQueue_, priority ? 20 : 320);
}

function warmBookDetailPrefetch_(books, options) {
  if (!Array.isArray(books) || !books.length || !canPrefetchBookDetails_()) return;

  const opt = options || {};
  const limit = Math.max(0, Number(opt.limit || BOOK_DETAIL_PREFETCH_WARM_LIMIT));
  const targets = books
    .filter(book => shouldFetchDeferredBookDetails_(book) && !getCachedBookDetail_(book))
    .slice(0, limit);

  if (!targets.length) return;

  const run = function() {
    targets.forEach((book, index) => {
      queueBookDetailPrefetch_(book, index < 4);
    });
  };

  if ('requestIdleCallback' in window) {
    window.requestIdleCallback(run, { timeout: Math.max(500, Number(opt.timeout || 1000)) });
  } else {
    window.setTimeout(run, Math.max(220, Number(opt.delay || 480)));
  }
}

function warmPopupNeighborDetails_(index, dataArr) {
  if (!Array.isArray(dataArr) || !dataArr.length || !canPrefetchBookDetails_()) return;

  const baseIndex = Math.floor(Number(index));
  if (!Number.isFinite(baseIndex)) return;

  for (let step = 1; step <= POPUP_DETAIL_PREFETCH_RADIUS; step += 1) {
    const nextBook = dataArr[baseIndex + step];
    const prevBook = dataArr[baseIndex - step];
    if (nextBook) queueBookDetailPrefetch_(nextBook, step === 1);
    if (prevBook) queueBookDetailPrefetch_(prevBook, step === 1);
  }
}

function resetBookDetailPrefetchObserver_() {
  if (bookDetailPrefetchObserver && typeof bookDetailPrefetchObserver.disconnect === 'function') {
    bookDetailPrefetchObserver.disconnect();
  }
  bookDetailPrefetchObserver = null;
}

function getBookDetailPrefetchObserver_() {
  if (!('IntersectionObserver' in window)) return null;
  if (bookDetailPrefetchObserver) return bookDetailPrefetchObserver;

  bookDetailPrefetchObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const book = entry.target && entry.target.__bookDetailPrefetchBook;
      if (book) queueBookDetailPrefetch_(book, false);
      if (bookDetailPrefetchObserver) bookDetailPrefetchObserver.unobserve(entry.target);
    });
  }, {
    root: null,
    rootMargin: '360px 80px',
    threshold: 0.01
  });

  return bookDetailPrefetchObserver;
}

function observeBookDetailPrefetch_(element, book) {
  if (!element || !shouldFetchDeferredBookDetails_(book)) return;

  element.__bookDetailPrefetchBook = book;
  const observer = getBookDetailPrefetchObserver_();
  if (observer) observer.observe(element);

  element.addEventListener('pointerenter', function() {
    queueBookDetailPrefetch_(book, true);
  }, { passive: true });
  element.addEventListener('touchstart', function() {
    queueBookDetailPrefetch_(book, true);
  }, { passive: true });
  element.addEventListener('focus', function() {
    queueBookDetailPrefetch_(book, true);
  }, { passive: true });
}

function buildPopupDetailLoadingHtml_(book) {
  if (!book || book.detailLoaded !== false) return '';
  if (book.detailError) {
    return `<div class="popup-detail-state error">${escapeHtml(book.detailError)}</div>`;
  }
  return `
    <div class="popup-detail-loading" aria-live="polite">
      <div class="popup-detail-state loading">詳細を準備中</div>
      <div class="popup-detail-skeleton" aria-hidden="true">
        <span class="popup-detail-skeleton-line wide"></span>
        <span class="popup-detail-skeleton-line"></span>
        <span class="popup-detail-skeleton-chip-row">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </div>
    </div>
  `;
}

function closeCoverFullscreen_() {
  const overlay = document.getElementById('cover-fullscreen-overlay');
  const img = document.getElementById('cover-fullscreen-img');
  const caption = document.getElementById('cover-fullscreen-caption');
  if (!overlay || overlay.style.display === 'none') return;

  overlay.style.display = 'none';
  overlay.setAttribute('aria-hidden', 'true');
  overlay.onclick = null;
  overlay.ontouchstart = null;
  overlay.ontouchmove = null;
  overlay.ontouchend = null;
  overlay.onpointerdown = null;
  overlay.onpointermove = null;
  overlay.onpointerup = null;
  overlay.onpointercancel = null;
  overlay.onmousedown = null;
  overlay.onmousemove = null;
  overlay.onmouseup = null;
  overlay.onmouseleave = null;
  overlay.style.removeProperty('--cover-drag-y');
  overlay.style.removeProperty('--cover-drag-opacity');
  document.body.classList.remove('cover-fullscreen-open');
  if (img) {
    img.removeAttribute('src');
    img.removeAttribute('role');
    img.removeAttribute('tabindex');
    img.removeAttribute('aria-label');
    img.removeAttribute('draggable');
    img.onclick = null;
    img.onkeydown = null;
    img.classList.remove('book-image-loading', 'book-image-loaded');
  }
  if (caption) caption.textContent = '';
  document.onkeydown = coverFullscreenPreviousKeydown || null;
  coverFullscreenPreviousKeydown = null;
}

function openCoverFullscreen_(book) {
  const overlay = document.getElementById('cover-fullscreen-overlay');
  const img = document.getElementById('cover-fullscreen-img');
  const caption = document.getElementById('cover-fullscreen-caption');
  const closeBtn = document.getElementById('cover-fullscreen-close');
  if (!overlay || !img || !closeBtn || !book) return;

  img.alt = `${book.title || '表紙'} の拡大画像`;
  img.setAttribute('role', 'button');
  img.setAttribute('tabindex', '0');
  img.setAttribute('aria-label', '拡大表示を閉じる');
  img.setAttribute('draggable', 'false');
  setupBookImageElement_(img, book, {
    track: false,
    loading: 'eager',
    fetchPriority: 'high'
  });
  if (caption) caption.textContent = book.title || '';

  overlay.style.display = 'flex';
  overlay.setAttribute('aria-hidden', 'false');
  document.body.classList.add('cover-fullscreen-open');

  coverFullscreenPreviousKeydown = document.onkeydown;
  document.onkeydown = function(e) {
    if (e.key === 'Escape') {
      closeCoverFullscreen_();
    }
  };

  overlay.onclick = function(e) {
    if (e.target === overlay) closeCoverFullscreen_();
  };

  let coverPointerStartX = 0;
  let coverPointerStartY = 0;
  let coverPointerDragging = false;
  let coverPointerSource = '';

  function startCoverDrag_(source, x, y) {
    if (coverPointerDragging && coverPointerSource !== source) return false;

    coverPointerStartX = x;
    coverPointerStartY = y;
    coverPointerDragging = true;
    coverPointerSource = source;
    return true;
  }

  function updateCoverDrag_(x, y) {
    const diffY = Math.max(0, y - coverPointerStartY);
    if (diffY < 6) return false;

    const dragY = Math.min(diffY, 150);
    const opacity = Math.max(0.48, 1 - dragY / 260);
    overlay.style.setProperty('--cover-drag-y', `${dragY}px`);
    overlay.style.setProperty('--cover-drag-opacity', String(opacity));
    return true;
  }

  function resetCoverDrag_() {
    coverPointerDragging = false;
    coverPointerSource = '';
    overlay.style.removeProperty('--cover-drag-y');
    overlay.style.removeProperty('--cover-drag-opacity');
  }

  function endCoverDrag_(x, y) {
    const diffX = x - coverPointerStartX;
    const diffY = y - coverPointerStartY;
    resetCoverDrag_();

    if (diffY > 76 && Math.abs(diffY) > Math.abs(diffX) * 1.15) {
      closeCoverFullscreen_();
    }
  }

  overlay.onpointerdown = function(e) {
    if (!e.isPrimary) return;
    if (!startCoverDrag_('pointer', e.clientX, e.clientY)) return;
    if (typeof overlay.setPointerCapture === 'function') {
      overlay.setPointerCapture(e.pointerId);
    }
  };
  overlay.onpointermove = function(e) {
    if (!coverPointerDragging || coverPointerSource !== 'pointer' || !e.isPrimary) return;
    if (updateCoverDrag_(e.clientX, e.clientY)) e.preventDefault();
  };
  overlay.onpointerup = function(e) {
    if (!coverPointerDragging || coverPointerSource !== 'pointer' || !e.isPrimary) return;
    endCoverDrag_(e.clientX, e.clientY);
  };
  overlay.onpointercancel = function() {
    if (coverPointerSource === 'pointer') resetCoverDrag_();
  };
  overlay.onmousedown = function(e) {
    if (e.button !== 0) return;
    startCoverDrag_('mouse', e.clientX, e.clientY);
  };
  overlay.onmousemove = function(e) {
    if (!coverPointerDragging || coverPointerSource !== 'mouse') return;
    if (updateCoverDrag_(e.clientX, e.clientY)) e.preventDefault();
  };
  overlay.onmouseup = function(e) {
    if (!coverPointerDragging || coverPointerSource !== 'mouse') return;
    endCoverDrag_(e.clientX, e.clientY);
  };
  overlay.onmouseleave = function() {
    if (coverPointerSource === 'mouse') resetCoverDrag_();
  };

  img.onclick = function(e) {
    e.stopPropagation();
    closeCoverFullscreen_();
  };
  img.onkeydown = function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      closeCoverFullscreen_();
    }
  };
  closeBtn.onclick = function(e) {
    e.stopPropagation();
    closeCoverFullscreen_();
  };
}

function openSeriesPanel(sourceBook) {
  if (!sourceBook || !sourceBook.seriesKeyAuto) return;

  const overlay = document.getElementById('image-popup-overlay');
  const popupContent = document.getElementById('image-popup-content');
  const img = document.getElementById('image-popup-img');
  const info = document.getElementById('image-popup-info');
  const prevBtn = document.getElementById('popup-prev');
  const nextBtn = document.getElementById('popup-next');
  const returnContext = { index: popupIndex, data: popupData };

  overlay.style.display = 'flex';
  document.body.classList.add('modal-open');
  if (popupContent) popupContent.classList.add('series-mode');
  img.style.display = 'none';
  prevBtn.style.display = 'none';
  nextBtn.style.display = 'none';
  clearPopupTouchHandlers_();

  info.innerHTML = `
    <div class="series-panel">
      <div class="series-panel-title">シリーズ一覧を読み込み中...</div>
      <div class="series-panel-subtitle">${escapeHtml(sourceBook.seriesSearchTitle || sourceBook.title || '')}</div>
    </div>
  `;

  google.script.run
    .withSuccessHandler(function(seriesBooks) {
      showSeriesPanel(sourceBook, Array.isArray(seriesBooks) ? seriesBooks : [], returnContext);
    })
    .withFailureHandler(function(error) {
      info.innerHTML = `
          <div class="series-panel">
            <div class="series-panel-title">シリーズ一覧を取得できませんでした</div>
            <div class="series-panel-subtitle">${escapeHtml(error && error.message ? error.message : '時間を置いて再度お試しください。')}</div>
          <button type="button" id="series-panel-back-detail" class="popup-action-btn primary">${uiIcon_('back', 'ui-icon-inline')}<span>詳細へ戻る</span></button>
        </div>
      `;
      const backBtn = document.getElementById('series-panel-back-detail');
      if (backBtn) backBtn.onclick = function(e) {
        e.stopPropagation();
        showPopup(sourceBook, returnContext.index, returnContext.data);
      };
    })
    .getBooksBySeriesKey(sourceBook.seriesKeyAuto);
}

function showSeriesPanel(sourceBook, seriesBooks, returnContext) {
  const overlay = document.getElementById('image-popup-overlay');
  const popupContent = document.getElementById('image-popup-content');
  const img = document.getElementById('image-popup-img');
  const info = document.getElementById('image-popup-info');
  const closeBtn = document.getElementById('image-popup-close');
  const prevBtn = document.getElementById('popup-prev');
  const nextBtn = document.getElementById('popup-next');

  const items = Array.isArray(seriesBooks) ? seriesBooks : [];
  const sourceTitle = sourceBook && (sourceBook.seriesSearchTitle || sourceBook.title) || 'シリーズ';
  const linksHtml = buildExternalLinksHtml(sourceBook);

  img.style.display = 'none';
  if (popupContent) popupContent.classList.add('series-mode');
  prevBtn.style.display = 'none';
  nextBtn.style.display = 'none';
  clearPopupTouchHandlers_();

  const listHtml = items.length
    ? items.map((item, idx) => `
        <button type="button" class="series-list-item" data-series-index="${idx}">
          <span class="series-list-title">${escapeHtml(item.title || '(タイトルなし)')}</span>
          <span class="series-list-meta">
            発: ${escapeHtml(item.released || '-')} ／ 棚: ${escapeHtml(item.shelf || '-')}-${escapeHtml(item.location || '')}
          </span>
        </button>
      `).join('')
    : '<div class="series-empty">同じシリーズの本が見つかりませんでした。</div>';

  info.innerHTML = `
    <div class="series-panel">
      <div class="series-panel-title">${escapeHtml(sourceTitle)} シリーズ一覧（${items.length}冊）</div>
      ${linksHtml ? `<div class="series-panel-actions">${linksHtml}</div>` : ''}
      <div class="series-list">${listHtml}</div>
      <button type="button" id="series-panel-back-detail" class="popup-action-btn">${uiIcon_('back', 'ui-icon-inline')}<span>詳細へ戻る</span></button>
    </div>
  `;

  const backBtn = document.getElementById('series-panel-back-detail');
  if (backBtn) {
    backBtn.onclick = function(e) {
      e.stopPropagation();
      const targetIndex = returnContext && typeof returnContext.index === 'number' ? returnContext.index : popupIndex;
      const targetData = returnContext && Array.isArray(returnContext.data) ? returnContext.data : popupData;
      showPopup(sourceBook, targetIndex, targetData);
    };
  }

  info.querySelectorAll('.series-list-item').forEach(btn => {
    btn.onclick = function(e) {
      e.stopPropagation();
      const idx = Number(btn.getAttribute('data-series-index'));
      const book = items[idx];
      if (!book) return;
      showPopup(book, idx, items, { sourceBook, items, returnContext });
    };
  });

  overlay.onclick = function(e) {
    if (e.target === overlay) {
      overlay.style.display = 'none';
      document.body.classList.remove('modal-open');
      document.onkeydown = null;
    }
  };

  closeBtn.onclick = function() {
    overlay.style.display = 'none';
    document.body.classList.remove('modal-open');
    document.onkeydown = null;
  };

  document.onkeydown = function(e) {
    if (e.key === 'Escape') {
      overlay.style.display = 'none';
      document.body.classList.remove('modal-open');
      document.onkeydown = null;
    }
  };
}

function showPopup(book, index, dataArr, seriesContext) {
  const wasPopupOpen = document.body.classList.contains('modal-open');
  if (!wasPopupOpen) {
    popupReturnScrollY = window.scrollY || 0;
  }

  const cachedDetail = getCachedBookDetail_(book);
  if (cachedDetail && book && book.detailLoaded === false) {
    const originalBook = book;
    book = mergeDeferredBookDetails_(book, cachedDetail);
    if (Array.isArray(dataArr) && dataArr[index] === originalBook) {
      dataArr[index] = book;
    }
  }

  popupIndex = index;
  popupData = dataArr;
  popupSeriesContext = seriesContext || null;

  const overlay = document.getElementById('image-popup-overlay');
  const popupContent = document.getElementById('image-popup-content');
  const img = document.getElementById('image-popup-img');
  const info = document.getElementById('image-popup-info');
  const closeBtn = document.getElementById('image-popup-close');
  const prevBtn = document.getElementById('popup-prev');
  const nextBtn = document.getElementById('popup-next');

  img.style.display = '';
  if (popupContent) popupContent.classList.remove('series-mode');
  img.alt = book.title || '表紙';
  img.setAttribute('role', 'button');
  img.setAttribute('tabindex', '0');
  img.setAttribute('aria-label', '表紙を全画面で表示');
  setupBookImageElement_(img, book, {
    track: false,
    loading: 'eager',
    fetchPriority: 'high',
    onSettled: updatePopupNavPlacement_
  });
  updatePopupNavPlacement_();
  img.onclick = function(e) {
    e.stopPropagation();
    if (popupDragSuppressNextClick) {
      e.preventDefault();
      popupDragSuppressNextClick = false;
      return;
    }
    openCoverFullscreen_(book);
  };
  img.onkeydown = function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openCoverFullscreen_(book);
    }
  };

  const actionsHtml = buildPopupActionsHtml(book, popupSeriesContext);
  info.innerHTML = `
    <div class="popup-book-detail">
      <div class="popup-book-head">
        <div class="popup-book-title">${escapeHtml(book.title || '(タイトルなし)')}</div>
        ${buildPopupBookLeadHtml_(book)}
        ${buildPopupDetailLoadingHtml_(book)}
      </div>
      <div class="genre-chip-wrap popup">${buildGenreChips(book)}</div>
      <div class="popup-book-primary-meta">
        ${buildBookMetaPillsHtml_(book, { includeIsbn: true })}
        ${buildBookMemoHtml_(book)}
      </div>
      ${actionsHtml}
      <div class="popup-position">${popupIndex + 1} / ${popupData.length}</div>
    </div>
  `;

  appendPopupSummaryAccordion_(info.querySelector('.genre-chip-wrap.popup'), book);
  attachPopupActionHandlers(book, popupSeriesContext);
  fetchPopupContextBookDetails_(book, index, dataArr, popupSeriesContext);

  overlay.style.display = 'flex';
  document.body.classList.add('modal-open');

  clearPopupMotionState_(popupContent);

  function hide() {
    closeCoverFullscreen_();
    clearPopupTouchHandlers_();
    overlay.style.display = 'none';
    document.body.classList.remove('modal-open');
    document.onkeydown = null;
    window.requestAnimationFrame(function() {
      window.scrollTo({ top: popupReturnScrollY || 0, behavior: 'auto' });
    });
  }

  overlay.onclick = function(e) {
    if (e.target === overlay) hide();
  };
  closeBtn.onclick = hide;

  document.onkeydown = function(e) {
    if (e.key === 'Escape') hide();
    if (e.key === 'ArrowLeft') popupMove(-1);
    if (e.key === 'ArrowRight') popupMove(1);
  };

  prevBtn.style.display = (popupIndex > 0) ? 'block' : 'none';
  nextBtn.style.display = (popupIndex < popupData.length - 1) ? 'block' : 'none';
  setupPopupNavButton_(prevBtn, popupIndex - 1, '前へ');
  setupPopupNavButton_(nextBtn, popupIndex + 1, '次へ');
  prevBtn.onclick = function(e) { e.stopPropagation(); popupMove(-1); };
  nextBtn.onclick = function(e) { e.stopPropagation(); popupMove(1); };

  let popupDragStartX = 0;
  let popupDragStartY = 0;
  let popupDragging = false;
  let popupDragSource = '';
  let popupDragScrollTarget = false;

  function startPopupDrag_(source, x, y, target) {
    if (popupDragging && popupDragSource !== source) return false;

    popupDragStartX = x;
    popupDragStartY = y;
    popupDragging = true;
    popupDragSource = source;
    popupDragScrollTarget = isPopupSummaryScrollTarget_(target);
    popupContent.classList.add('is-dragging');
    return true;
  }

  function updatePopupDrag_(x, y) {
    if (popupDragScrollTarget) return false;

    const diffX = x - popupDragStartX;
    const diffYRaw = y - popupDragStartY;
    const absX = Math.abs(diffX);
    const absY = Math.abs(diffYRaw);

    if (absX > 8 && absX > absY * 0.82) {
      const maxDragX = Math.min(178, Math.max(96, window.innerWidth * 0.42));
      const dragX = Math.max(-maxDragX, Math.min(maxDragX, diffX));
      const opacity = Math.max(0.66, 1 - Math.abs(dragX) / 360);
      popupContent.style.setProperty('--popup-drag-x', `${dragX}px`);
      popupContent.style.setProperty('--popup-drag-y', '0px');
      popupContent.style.setProperty('--popup-drag-opacity', String(opacity));
      return true;
    }

    const diffY = Math.max(0, diffYRaw);
    if (diffY < 8) return false;

    const dragY = Math.min(diffY, 130);
    const opacity = Math.max(0.56, 1 - dragY / 260);
    popupContent.style.setProperty('--popup-drag-x', '0px');
    popupContent.style.setProperty('--popup-drag-y', `${dragY}px`);
    popupContent.style.setProperty('--popup-drag-opacity', String(opacity));
    return true;
  }

  function resetPopupDrag_() {
    popupDragging = false;
    popupDragSource = '';
    popupDragScrollTarget = false;
    clearPopupMotionState_(popupContent);
  }

  function endPopupDrag_(x, y) {
    const diffX = x - popupDragStartX;
    const diffY = y - popupDragStartY;
    const shouldClose = !popupDragScrollTarget && diffY > 92 && Math.abs(diffY) > Math.abs(diffX) * 1.12;
    const shouldMove = !popupDragScrollTarget && Math.abs(diffX) > 48 && Math.abs(diffX) > Math.abs(diffY);
    const moveDiff = diffX > 0 ? -1 : 1;

    if (shouldClose) {
      popupDragSuppressNextClick = true;
      resetPopupDrag_();
      hide();
      window.setTimeout(function() {
        popupDragSuppressNextClick = false;
      }, 260);
    } else if (shouldMove) {
      const targetIndex = popupIndex + moveDiff;
      if (targetIndex < 0 || targetIndex >= popupData.length) {
        resetPopupDrag_();
        return;
      }

      popupDragging = false;
      popupDragSource = '';
      popupDragScrollTarget = false;
      popupDragSuppressNextClick = true;
      popupContent.classList.remove('is-dragging');
      popupContent.classList.add(moveDiff > 0 ? 'popup-commit-next' : 'popup-commit-prev');
      window.setTimeout(function() {
        clearPopupMotionState_(popupContent);
        popupMove(moveDiff);
        window.setTimeout(function() {
          popupDragSuppressNextClick = false;
        }, 260);
      }, 135);
    } else {
      resetPopupDrag_();
    }
  }

  overlay.ontouchstart = function(e) {
    if (e.touches.length === 1) {
      startPopupDrag_('touch', e.touches[0].clientX, e.touches[0].clientY, e.target);
    }
  };
  overlay.ontouchmove = function(e) {
    if (!popupDragging || popupDragSource !== 'touch' || !e.touches || e.touches.length !== 1) return;
    if (popupDragScrollTarget) return;
    e.preventDefault();
    updatePopupDrag_(e.touches[0].clientX, e.touches[0].clientY);
  };
  overlay.ontouchend = function(e) {
    if (!popupDragging || popupDragSource !== 'touch') return;
    if (e.changedTouches && e.changedTouches.length === 1) {
      endPopupDrag_(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    } else {
      resetPopupDrag_();
    }
  };
  overlay.onmousedown = function(e) {
    if (e.button !== 0) return;
    startPopupDrag_('mouse', e.clientX, e.clientY, e.target);
  };
  overlay.onmousemove = function(e) {
    if (!popupDragging || popupDragSource !== 'mouse') return;
    if (updatePopupDrag_(e.clientX, e.clientY)) e.preventDefault();
  };
  overlay.onmouseup = function(e) {
    if (!popupDragging || popupDragSource !== 'mouse') return;
    endPopupDrag_(e.clientX, e.clientY);
  };
  overlay.onmouseleave = function() {
    if (popupDragSource === 'mouse') resetPopupDrag_();
  };
}

function popupMove(diff) {
  const newIndex = popupIndex + diff;
  if (newIndex < 0 || newIndex >= popupData.length) return;

  popupIndex = newIndex;
  queueBookDetailPrefetch_(popupData[popupIndex], true);
  warmPopupNeighborDetails_(popupIndex, popupData);

  const slideClass = diff > 0 ? 'popup-slide-next' : 'popup-slide-prev';
  showPopup(popupData[popupIndex], popupIndex, popupData, popupSeriesContext);

  const popupContent = document.getElementById('image-popup-content');
  if (!popupContent) return;
  clearPopupMotionState_(popupContent);
  void popupContent.offsetWidth;
  popupContent.classList.add(slideClass);

  window.setTimeout(function() {
    popupContent.classList.remove('popup-slide-next', 'popup-slide-prev');
  }, 200);
}
