<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(ellipse at 60% 30%, #222842 60%, #161925 100%);
  color: #ddd;
}

.search-container {
  position: sticky;
  top: 0;
  background: rgba(16,20,32,0.85);
  text-align: center;
  padding: 3em 1em 2em 1em;
  z-index: 1000;
  transition: all 0.4s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 4px 24px 0 rgba(34, 57, 134, 0.12);
  border-bottom: 1.5px solid #22263e;
  overflow: visible;
}
.search-container.centered {
  position: relative;
  top: 18vh;
}
.logo {
  height: 200px;
  margin-bottom: 1em;
  transition: height 0.22s ease, margin 0.22s ease, opacity 0.18s ease;;
  cursor: pointer;
}
.search-container.shrink .logo {
  height: 80px;
  margin-bottom: 0.3em;
}
.search-form {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1em;
  font-size: 1.3em;
  transition: all 0.3s ease;
}
.search-container.shrink .search-form {
  font-size: 1em;
  gap: 0.6em;
}

.search-container.shrink.compact {
  padding: 0.85em 0.8em 0.7em 0.8em;
  background: rgba(16,20,32,0.76);
  backdrop-filter: blur(8px);
}

.search-container.shrink.compact .logo {
  opacity: 0;
  height: 0;
  margin: 0;
  overflow: hidden;
  pointer-events: none;
}

.search-container.shrink.compact .search-form {
  font-size: 0.95em;
  gap: 0.35em;
}

.search-container.shrink.compact .bookshelf-cta-wrap {
  display: none;
}

.search-container.shrink.compact .search-status-area {
  top: 8px;
  left: 10px;
  width: min(210px, calc(100vw - 120px));
  padding: 6px 8px;
  border-radius: 12px;
}

.search-container.shrink.compact .search-status-count {
  font-size: 0.82em;
  margin-bottom: 5px;
}

.search-container.shrink.compact .search-status-chips {
  gap: 4px;
}

.search-container.shrink.compact .search-status-chip {
  font-size: 0.68em;
  padding: 0.26em 0.5em;
}

.search-container.shrink.compact .search-status-chip-remove {
  min-width: 24px;
  min-height: 24px;
  padding: 4px;
  margin: -4px -2px -4px 0;
}

.search-container.shrink.shelf-view-active {
  padding: 1.05em 0.8em 0.85em 0.8em;
  background: rgba(16,20,32,0.80);
  backdrop-filter: blur(7px);
}

.search-container.shrink.shelf-view-active .logo {
  height: 54px;
  margin-bottom: 0.18em;
  opacity: 0.88;
}

.search-container.shrink.shelf-view-active .search-form {
  font-size: 0.94em;
  gap: 0.42em;
}

.search-container.shrink.shelf-view-active .button-group {
  gap: 8px;
}

.search-container.shrink.shelf-view-active .button-group button {
  padding: 0.48em 1.05em;
  font-size: 0.92em;
}


/* トップの「本棚を見る」から入った没入表示の時だけ、検索ヘッダーと表示切替を隠す */
body.shelf-immersive-active #searchContainer,
body.shelf-immersive-active #viewToggle {
  display: none !important;
}

.search-status-area {
  position: absolute;
  left: 18px;
  top: 18px;
  width: min(240px, calc(100vw - 140px));
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(22, 34, 58, 0.74);
  border: 1px solid rgba(76, 188, 255, 0.34);
  box-shadow: 0 2px 14px rgba(19, 55, 124, 0.25);
  backdrop-filter: blur(8px);
  text-align: left;
  box-sizing: border-box;
}

.search-status-area[hidden] {
  display: none !important;
}

.search-status-count {
  font-size: 0.98em;
  font-weight: 700;
  color: #dff8ff;
  margin-bottom: 8px;
  line-height: 1.4;
  text-shadow: 0 0 6px rgba(40, 201, 255, 0.12);
}

.search-status-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.search-status-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.38em;
  padding: 0.38em 0.72em;
  border-radius: 999px;
  border: 1px solid rgba(83, 211, 255, 0.32);
  background: rgba(34, 48, 76, 0.88);
  color: #d7f8ff;
  font-size: 0.82em;
  line-height: 1.2;
  white-space: normal;
  word-break: break-word;
  text-align: left;
  cursor: default;
  box-shadow: 0 1px 8px rgba(17, 161, 187, 0.08);
}

.search-status-chip-label {
  display: inline-flex;
  align-items: center;
  gap: 0.34em;
  min-width: 0;
}

.search-status-chip-key {
  flex: 0 0 auto;
  padding: 0.08em 0.42em;
  border-radius: 999px;
  background: rgba(214, 164, 95, 0.16);
  color: #f3d5a4;
  font-size: 0.82em;
  font-weight: 760;
}

.search-status-chip-value {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.search-status-chip.removable {
  cursor: pointer;
}

.search-status-chip-remove {
  appearance: none;
  -webkit-appearance: none;
  border: none;
  background: transparent;
  color: #c9f5ff;
  font-size: 1.05em;
  line-height: 1;
  padding: 6px;
  margin: -6px -2px -6px 0;
  min-width: 28px;
  min-height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: 700;
  opacity: 0.9;
}

.search-status-chip-remove:hover {
  opacity: 1;
  color: #ffffff;
}

.search-status-chip-remove:focus-visible {
  outline: 1px solid rgba(110, 228, 255, 0.9);
  outline-offset: 2px;
  border-radius: 4px;
}

.search-status-chip.random {
  background: rgba(44, 78, 126, 0.92);
}

.search-status-chip.is-removing {
  opacity: 0;
  transform: scale(0.92);
  pointer-events: none;
  transition: opacity 180ms ease, transform 180ms ease;
}

.search-status-chip.is-removing .search-status-chip-remove {
  pointer-events: none;
}


.search-container.shrink .search-status-area {
  top: 12px;
  left: 14px;
  width: min(230px, calc(100vw - 128px));
  padding: 8px 10px;
}

.search-container.centered .search-status-area {
  top: 24px;
}

@media (max-width: 900px) {
  .search-status-area {
    left: 10px;
    top: 10px;
    width: min(180px, calc(100vw - 104px));
    padding: 8px 9px;
    border-radius: 12px;
  }

  .search-status-count {
    font-size: 0.84em;
    margin-bottom: 6px;
  }

  .search-status-chip {
    font-size: 0.72em;
    padding: 0.34em 0.6em;
  }
}

@media (max-width: 640px) {
  .search-status-area {
    width: min(150px, calc(100vw - 96px));
  }

  .search-status-count {
    font-size: 0.78em;
  }

  .search-status-chip {
    font-size: 0.68em;
    gap: 0.5em;
  }

  .search-status-chip-remove {
    font-size: 1.12em;
    min-width: 32px;
    min-height: 32px;
    padding: 7px;
  }
}
.input-group {
  display: flex;
  flex-direction: column;
  width: 90%;
  max-width: 480px;
}
.input-group label {
  margin-bottom: 0.1em;
  font-size: 0.98em;
  color: #9beefb;
  letter-spacing: 0.02em;
}
.input-group input {
  padding: 0.7em;
  font-size: 1em;
  border: 1px solid #3cc6e3;
  border-radius: 6px;
  background-color: #202436;
  color: #eee;
  outline: none;
}
.input-group input:focus {
  border: 1.5px solid #69f5f3;
}
.input-group select {
  padding: 0.7em;
  font-size: 1em;
  border: 1px solid #3cc6e3;
  border-radius: 6px;
  background-color: #202436;
  color: #eee;
  outline: none;
}
.input-group select:focus {
  border: 1.5px solid #69f5f3;
}
.button-group {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 14px;    /* ← ここでボタン間隔を調整！お好みで8～20pxくらい */
}

.bookshelf-cta-wrap {
  display: flex;
  justify-content: center;
  width: 100%;
  margin-top: 0.15em;
}

.bookshelf-cta-card.top-shelf-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.28em;
  width: min(520px, 92vw);
  min-height: 74px;
  padding: 0.85em 1.25em;
  border: 1px solid rgba(119, 231, 255, 0.34);
  border-radius: 12px;
  background:
    linear-gradient(135deg, rgba(123, 92, 255, 0.95) 0%, rgba(30, 160, 255, 0.92) 54%, rgba(31, 230, 222, 0.86) 100%);
  box-shadow: 0 14px 34px rgba(39, 122, 255, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.18);
  text-align: center;
}

.bookshelf-cta-card.top-shelf-btn:hover,
.bookshelf-cta-card.top-shelf-btn:focus-visible {
  background:
    linear-gradient(135deg, rgba(145, 112, 255, 0.98) 0%, rgba(35, 179, 255, 0.95) 54%, rgba(47, 255, 221, 0.9) 100%);
  box-shadow: 0 18px 42px rgba(39, 122, 255, 0.24), 0 0 18px rgba(39, 196, 255, 0.22);
  transform: translateY(-1px);
}

.bookshelf-cta-title {
  font-size: 1.12em;
  line-height: 1.25;
}

.bookshelf-cta-subtitle {
  font-size: 0.82em;
  line-height: 1.35;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.86);
}

.advanced-search-area {
  width: 100%;
  max-width: 1020px;
  margin-top: 0.3em;
  padding: 1em 1em 0.5em 1em;
  border: 1px solid #27445f;
  border-radius: 12px;
  background: rgba(24, 34, 58, 0.78);
  box-sizing: border-box;
}

.advanced-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(240px, 1fr));
  gap: 0.9em 1.2em;
  align-items: start;
}

.advanced-grid .input-group {
  width: 100%;
  max-width: none;
}
.released-range-row {
  display: flex;
  align-items: flex-end;
  gap: 0.9em;
  margin-top: 0.95em;
  width: 100%;
}

.released-range-row > label {
  flex: 0 0 auto;
  margin-bottom: 0.55em;
  font-size: 0.98em;
  color: #9beefb;
  letter-spacing: 0.02em;
}

.released-range-controls {
  display: flex;
  align-items: center;
  gap: 0.55em;
  flex-wrap: wrap;
  width: 100%;
}

.released-range-controls select {
  padding: 0.7em;
  font-size: 1em;
  border: 1px solid #3cc6e3;
  border-radius: 6px;
  background-color: #202436;
  color: #eee;
  outline: none;
  min-width: 92px;
}

.released-range-controls select:focus {
  border: 1.5px solid #69f5f3;
}

.released-range-controls select:disabled {
  opacity: 0.48;
  cursor: not-allowed;
}

.released-range-separator {
  color: #9beefb;
  font-size: 1em;
  padding: 0 0.15em 0.08em;
}

@media (max-width: 900px) {
  .released-range-row {
    flex-direction: column;
    align-items: stretch;
    gap: 0.4em;
  }

  .released-range-row > label {
    margin-bottom: 0;
  }
}
.advanced-actions {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 1em;
  flex-wrap: wrap;
}

.clear-btn {
  background: linear-gradient(90deg, #44516d 20%, #5f7694 100%);
}

.clear-btn:hover {
  background: linear-gradient(90deg, #5a6783 20%, #7490b2 100%);
}

.sub-btn {
  background: linear-gradient(90deg, #2b3650 20%, #415372 100%);
}

.sub-btn:hover {
  background: linear-gradient(90deg, #36415b 20%, #52688d 100%);
}

#advancedToggleBtn.active {
  background: linear-gradient(90deg, #2f74ff 20%, #24d7ff 100%);
}
button {
  padding: 0.6em 1.5em;
  font-size: 1em;
  background: linear-gradient(90deg, #16d4f6 30%, #3d9afd 70%);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 8px 0 rgba(44, 200, 255, 0.07);
}
button:hover {
  background: linear-gradient(90deg, #1e7fff 40%, #32ffd8 100%);
  box-shadow: 0 0 8px #27c4ff44;
}

.top-shelf-btn {
  background: linear-gradient(90deg, #7b5cff 20%, #27d7ff 100%);
}

.top-shelf-btn:hover {
  background: linear-gradient(90deg, #936fff 20%, #32ffd8 100%);
}
.view-toggle {
  position: fixed;
  top: 28px;
  right: 32px;
  z-index: 2000;
  display: none;
  gap: 14px;
  align-items: flex-end;
  justify-content: flex-end;
  margin: 0;
  background: rgba(22, 34, 58, 0.92);
  border-radius: 12px;
  padding: 0.35em 0.7em 0.35em 0.7em;
  box-shadow: 0 2px 16px #19377c38;
}
.toggle-btn {
  background: #232a39;
  border: 2px solid transparent;
  border-radius: 6px;
  padding: 0.35em 0.8em 0.2em 0.8em;
  font-size: 1.32em;
  color: #9beefb;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: border 0.2s, background 0.2s, color 0.2s;
  min-width: 3.5em;
  user-select: none;
}
.toggle-btn.active {
  background: #2cc0f8cc;
  color: #fff;
  border: 2px solid #00d7ef;
  box-shadow: 0 2px 12px #1ccbe966;
}
.toggle-label {
  font-size: 0.75em;
  margin-top: 2px;
  opacity: 0.82;
  letter-spacing: 0.08em;
  font-weight: 500;
}
.toggle-btn:focus {
  outline: none;
  border-color: #1be9d9;
}
.card-view {
  margin-top: 3em;
  padding: 1em;
  display: grid;
  grid-template-columns: repeat(3, minmax(280px, 1fr));
  gap: 1.5em;
  max-width: 1200px;
  margin-left: auto;
  margin-right: auto;
}
.list-view {
  margin-top: 3em;
  padding: 1em;
  display: flex;
  flex-direction: column;
  gap: 0.7em;
  max-width: 1100px;
  margin-left: auto;
  margin-right: auto;
}
.book-card {
  background: linear-gradient(135deg, #1a2241 80%, #223245 100%);
  padding: 1em 1.3em;
  border-radius: 13px;
  box-shadow: 0 2px 8px rgba(24, 225, 235, 0.07);
  border: 1px solid #245e8c55;
  transition: box-shadow 0.2s;
  font-size: 1em;
  color: #ddf6ff;
  position: relative;
}
.book-card:hover {
  box-shadow: 0 0 16px #11a1bbaa;
  border: 1.5px solid #47f5ff85;
}
.book-title {
  font-weight: bold;
  font-size: 1.09em;
  margin-bottom: 0.4em;
  color: #38d0fc;
  letter-spacing: 0.04em;
  text-shadow: 0 0 5px #19468760;
  white-space: normal;
  word-break: break-all;
  overflow: visible;
  text-overflow: unset;
}
.genre-chip-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 0.38em;
  margin: 0.35em 0 0.55em 0;
}

.genre-chip-wrap.compact {
  margin-top: 0.22em;
  margin-bottom: 0;
}

.genre-chip-wrap.popup {
  justify-content: center;
  margin-bottom: 0.7em;
}

.genre-chip {
  display: inline-flex;
  align-items: center;
  min-height: 0;
  padding: 0.18em 0.72em;
  border-radius: 999px;
  background: rgba(46, 194, 248, 0.16);
  border: 1px solid rgba(89, 231, 255, 0.42);
  color: #dffbff;
  font-size: 0.82em;
  line-height: 1.35;
  white-space: nowrap;
  box-shadow: none;
}

.genre-chip.status {
  background: rgba(255, 183, 70, 0.13);
  border: 1px solid rgba(255, 199, 100, 0.42);
  color: #ffe7b2;
}

button.genre-chip {
  cursor: pointer;
  font-weight: 750;
}

button.genre-chip:hover,
button.genre-chip:focus-visible {
  border-color: rgba(146, 220, 236, 0.54);
  background: rgba(104, 191, 215, 0.16);
  color: #ffffff;
  box-shadow: none;
}

button.genre-chip.status:hover,
button.genre-chip.status:focus-visible {
  border-color: rgba(240, 195, 122, 0.56);
  background: rgba(214, 164, 95, 0.18);
}

.summary-chip-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.38em;
  min-height: 30px;
  padding: 0.28em 0.9em;
  border-radius: 999px;
  background: linear-gradient(135deg, rgba(177, 102, 255, 0.82) 0%, rgba(86, 91, 255, 0.72) 100%);
  border: 1px solid rgba(236, 210, 255, 0.76);
  color: #ffffff;
  font-size: 0.82em;
  line-height: 1.35;
  white-space: nowrap;
  cursor: pointer;
  font-weight: 800;
  text-shadow: 0 1px 1px rgba(26, 18, 52, 0.34);
  box-shadow:
    0 5px 14px rgba(93, 70, 255, 0.26),
    inset 0 1px 0 rgba(255, 255, 255, 0.28);
  transform: translateY(0);
  transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, border-color 0.16s ease;
}

.summary-chip-toggle::before {
  content: "+";
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.2em;
  height: 1.2em;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.18);
  font-size: 0.88em;
  line-height: 1;
}

.summary-chip-toggle:hover {
  background: linear-gradient(135deg, rgba(199, 128, 255, 0.94) 0%, rgba(78, 178, 255, 0.84) 100%);
  border-color: rgba(255, 240, 255, 0.94);
  color: #ffffff;
  box-shadow:
    0 8px 20px rgba(93, 70, 255, 0.34),
    0 0 14px rgba(211, 138, 255, 0.25),
    inset 0 1px 0 rgba(255, 255, 255, 0.35);
  transform: translateY(-1px);
}

.summary-chip-toggle:active {
  transform: translateY(1px);
  box-shadow:
    0 2px 8px rgba(93, 70, 255, 0.22),
    inset 0 2px 5px rgba(20, 16, 46, 0.28);
}

.summary-chip-toggle:focus-visible {
  outline: 2px solid rgba(225, 190, 255, 0.9);
  outline-offset: 2px;
}

.summary-chip-toggle[aria-expanded="true"] {
  background: linear-gradient(135deg, rgba(116, 89, 166, 0.92) 0%, rgba(60, 128, 180, 0.82) 100%);
  border-color: rgba(230, 200, 255, 0.86);
  color: #ffffff;
}

.summary-chip-toggle[aria-expanded="true"]::before {
  content: "-";
}

.book-summary {
  font-size: 0.97em;
  color: #bbf3ff;
  margin: 0.1em 0 0.05em 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.book-details {
  display: none;
  font-size: 0.96em;
  color: #d3f9fd;
  margin-top: 0.25em;
  padding-top: 0.5em;
  border-top: 1px solid #2f455c;
  letter-spacing: 0.02em;
}

.summary-text {
  display: none;
  margin: 0.45em 0 0.55em 0;
  padding: 0.65em 0.8em;
  font-size: 0.9em;
  line-height: 1.55;
  color: #eafaff;
  white-space: pre-wrap;
  word-break: break-word;
  background: rgba(14, 24, 40, 0.58);
  border: 1px solid rgba(120, 220, 255, 0.16);
  border-radius: 10px;
}

.popup-summary-text {
  width: min(620px, 82vw);
  max-height: min(34vh, 260px);
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  box-sizing: border-box;
  margin: 0.25em auto 0.75em auto;
  text-align: left;
  word-break: break-word;
}

.popup-summary-toggle {
  margin-left: 0.12em;
}


.book-card.open .book-details {
  display: block;
}
.book-cover {
  width: 100%;
  max-width: 220px;
  max-height: 300px;
  margin: 0 auto 1em auto;
  display: block;
  object-fit: contain;
  border-radius: 7px;
  box-shadow: 0 2px 12px #19468730;
  background: #191f29;
}
.card-view .book-card {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.card-info {
  width: 100%;
  margin: 0;
  display: block;
}
.list-thumb {
  width: 48px;
  height: 48px;
  object-fit: cover;
  border-radius: 6px;
  margin-right: 15px;
  background: #1a2333;
  box-shadow: 0 1px 4px #29d1f622;
}
.list-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1em;
}
.list-title-row {
  display: flex;
  align-items: center;
  gap: 0.8em;
  flex-wrap: wrap;
}
.list-title-block {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.list-title-author {
  font-size: 0.97em;
  color: #92f7fc;
  margin-left: 0.2em;
  font-weight: normal;
  opacity: 0.84;
}
.accordion-toggle {
  background: none;
  border: none;
  outline: none;
  cursor: pointer;
  float: right;
  margin-left: 10px;
  margin-right: 3px;
  margin-top: 2px;
  padding: 0;
  position: relative;
  z-index: 2;
  -webkit-tap-highlight-color: transparent;
}
.accordion-toggle,
.accordion-toggle:focus,
.accordion-toggle:active,
.accordion-toggle:hover {
  background: none !important;
  border: none !important;
  outline: none !important;
  box-shadow: none !important;
}
.accordion-toggle .arrow {
  display: inline-block;
  border: solid #4ee0fc;
  border-width: 0 4px 4px 0;
  padding: 5px;
  margin-left: 12px;
  transition: transform 0.2s;
  transform: rotate(45deg);
  background: none !important;
}
.accordion-toggle[aria-expanded="true"] .arrow {
  transform: rotate(135deg);
  background: none !important;
}

#spinner-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(26,30,46,0.65);
  z-index: 1999;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.spinner {
  border: 8px solid #e5f7fd38;
  border-top: 8px solid #4ee0fc;
  border-radius: 50%;
  width: 70px; height: 70px;
  animation: spin 1s linear infinite;
  margin-bottom: 10px;
}
@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}
.spinner-label {
  color: #4ee0fc;
  font-size: 1.22em;
  letter-spacing: 0.05em;
  margin-top: 4px;
}

/* --- ポップアップ／ライトボックス --- */
#image-popup-overlay {
  position: fixed;
  z-index: 9999;
  left: 0; top: 0; right: 0; bottom: 0;
  width: 100vw; height: 100vh;
  background: rgba(30,32,38,0.82);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.25s;
}
#image-popup-content {
  background: #181d2b;
  border-radius: 16px;
  padding: 1.5em 2em;
  max-width: 95vw;
  max-height: 90vh;
  box-shadow: 0 2px 32px #16d4f6aa;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: visible !important;
}
#image-popup-img {
  max-width: 320px;
  max-height: 60vh;
  margin-bottom: 1em;
  border-radius: 10px;
  box-shadow: 0 2px 24px #2a4c95bb;
  background: #222;
  object-fit: contain;
  transition: transform 0.18s;
}
#image-popup-close {
  position: absolute;
  right: 18px; top: 12px;
  font-size: 2.2em;
  color: #4ee0fc;
  cursor: pointer;
  opacity: 0.65;
  font-weight: bold;
  user-select: none;
  transition: opacity 0.18s;
  z-index: 100000;
}
#image-popup-close:hover { opacity: 1; }
#image-popup-info {
  color: #bcf7fd;
  font-size: 1.08em;
  text-align: center;
  line-height: 1.5;
  word-break: break-all;
}
/* ポップアップ全体のスライドアニメーション */
#image-popup-content.popup-slide-next {
  animation: popup-slide-next 0.22s cubic-bezier(.4,0,.2,1);
}
#image-popup-content.popup-slide-prev {
  animation: popup-slide-prev 0.22s cubic-bezier(.4,0,.2,1);
}
@keyframes popup-slide-next {
  from { opacity: 0; transform: translateX(80vw);}
  to   { opacity: 1; transform: translateX(0);}
}
@keyframes popup-slide-prev {
  from { opacity: 0; transform: translateX(-80vw);}
  to   { opacity: 1; transform: translateX(0);}
}

/* シンプル矢印ボタン */
.popup-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 3.6em;
  color: #4ee0fc;
  background: none;
  border: none;
  border-radius: 0;
  padding: 0;
  z-index: 9999;
  opacity: 0.85;
  box-shadow: none;
  transition: opacity 0.18s, color 0.18s;
  pointer-events: auto;
  display: block;
}
#popup-next { right: 18px; left: auto; }
#popup-prev { left: 18px; right: auto; }
.popup-arrow:hover {
  opacity: 1;
  color: #21f7ff;
  background: none;
}

.input-group {
  position: relative;
}
.suggest-box {
  position: absolute;
  left: 0;
  top: 100%;
  background: #212844;
  border: 1.5px solid #69f5f3bb;
  border-top: none;
  z-index: 3000;
  max-height: 220px;
  overflow-y: auto;
  font-size: 1em;
  border-radius: 0 0 7px 7px;
  display: none;
  box-shadow: 0 4px 12px #1ccbe926;
  min-width: 100%;
  margin-top: 2px;
}
.suggest-item {
  padding: 0.6em 1em;
  cursor: pointer;
  color: #9beefb;
  white-space: normal;
  transition: background 0.15s;
}
.suggest-item.active {
  background: #12aaffcc;
  color: #fff;
}
.suggest-item:hover {
  background: #1e5e70b0;
  color: #fff;
}
.highlight-match {
  background: #22e6ff44;
  color: #fffdc0;
  border-radius: 2px;
  padding: 0 2px;
  font-weight: bold;
}

/* ===== 確認中アニメーション ===== */
.loading-dots::after {
  content: '';
  display: inline-block;
  width: 1.5em;
  text-align: left;
  animation: dots 1.2s steps(3, end) infinite;
}

@keyframes dots {
  0% { content: ''; }
  33% { content: '.'; }
  66% { content: '..'; }
  100% { content: '...'; }
}


/* 検索結果フェードイン */

.result-fade {
  opacity: 0;
  transform: translateY(12px);
}

.result-fade.show {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.result-fade.show .book-card,
.result-fade.show .shelf-book {
  animation: book-result-settle 240ms ease-out both;
  animation-delay: calc(var(--book-reveal-index, 0) * 22ms);
}

@keyframes book-result-settle {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

  }

  .button-group button {
    width: 100%;
    min-height: 52px;
    padding: 0.68em 0.55em;
    font-size: 0.95em;
    line-height: 1.25;
    white-space: normal;
    word-break: keep-all;
    overflow-wrap: normal;
  }

  .button-group button:nth-child(3):last-child {
    grid-column: 1 / -1;
  }

  .bookshelf-cta-wrap {
    margin-top: 0;
  }

  .bookshelf-cta-card.top-shelf-btn {
    width: min(360px, calc(100vw - 28px));
    min-height: 68px;
    padding: 0.72em 0.85em;
    border-radius: 10px;
  }

  .bookshelf-cta-title {
    font-size: 1em;
  }

  .bookshelf-cta-subtitle {
    font-size: 0.78em;
  }

  .search-container.shrink.shelf-view-active .button-group button {
    padding: 0.62em 0.5em;
    font-size: 0.9em;
  }

  .advanced-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    width: 100%;
    gap: 10px;
  }

  .advanced-actions button {
    width: 100%;
    min-height: 48px;
    padding: 0.62em 0.5em;
    line-height: 1.25;
    word-break: keep-all;
  }

  .advanced-actions .sub-btn {
    grid-column: 1 / -1;
  }
}


/* ===== Modern Dark Library Refresh 2026-05-20 ===== */
:root {
  --lib-bg: #10141b;
  --lib-bg-2: #151a23;
  --lib-panel: rgba(29, 36, 48, 0.86);
  --lib-panel-strong: rgba(35, 43, 56, 0.94);
  --lib-panel-soft: rgba(255, 255, 255, 0.035);
  --lib-line: rgba(255, 255, 255, 0.09);
  --lib-line-strong: rgba(255, 255, 255, 0.16);
  --lib-text: #eef4f7;
  --lib-muted: #aab7c2;
  --lib-subtle: #74828f;
  --lib-accent: #68bfd7;
  --lib-accent-2: #7fb7ff;
  --lib-amber: #d6a45f;
  --lib-amber-2: #f0c37a;
  --lib-mint: #69c6a3;
  --lib-danger: #d9886f;
  --lib-radius-sm: 8px;
  --lib-radius-md: 12px;
  --lib-radius-lg: 18px;
  --lib-shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.22);
  --lib-shadow-md: 0 18px 46px rgba(0, 0, 0, 0.32);
  --lib-ease: 160ms ease;
}

* {
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", "Yu Gothic", "Hiragino Sans", sans-serif;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 18px),
    linear-gradient(180deg, #171c25 0%, var(--lib-bg) 42%, #0c1016 100%);
  color: var(--lib-text);
  letter-spacing: 0;
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(104, 191, 215, 0.055), transparent 28%, transparent 72%, rgba(214, 164, 95, 0.05)),
    linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 34%);
  z-index: -1;
}

.ui-icon {
  display: inline-flex;
  width: 1.12em;
  height: 1.12em;
  flex: 0 0 auto;
  align-items: center;
  justify-content: center;
}

.ui-icon svg {
  width: 100%;
  height: 100%;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.ui-icon-inline {
  margin-right: 0.42em;
}

.search-container {
  padding: clamp(1.5rem, 4vw, 3.5rem) 1rem 1.45rem;
  background: rgba(15, 19, 27, 0.78);
  border-bottom: 1px solid var(--lib-line);
  box-shadow: var(--lib-shadow-sm);
  backdrop-filter: blur(18px) saturate(128%);
}

.search-container.centered {
  top: 12vh;
}

.sensitive-toggle {
  position: absolute;
  top: 1.1rem;
  right: clamp(1rem, 5vw, 4.5rem);
  z-index: 2;
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.42rem 0.5rem 0.42rem 0.72rem;
  border: 1px solid rgba(148, 163, 184, 0.20);
  border-radius: 999px;
  background: rgba(15, 19, 27, 0.56);
  color: rgba(220, 232, 238, 0.78);
  box-shadow: none;
  backdrop-filter: blur(12px);
  cursor: pointer;
  user-select: none;
}

.sensitive-toggle-label {
  font-size: 0.78rem;
  font-weight: 750;
  line-height: 1;
  letter-spacing: 0;
}

.sensitive-toggle-input {
  position: absolute;
  inset: 0;
  z-index: 1;
  width: 100%;
  height: 100%;
  margin: 0;
  opacity: 0;
  cursor: pointer;
}

.sensitive-toggle-switch {
  position: relative;
  display: inline-flex;
  width: 2.25rem;
  height: 1.22rem;
  flex: 0 0 auto;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.09);
  border: 1px solid rgba(255, 255, 255, 0.10);
  transition: background var(--lib-ease), border-color var(--lib-ease);
}

.sensitive-toggle-switch::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 0.16rem;
  width: 0.84rem;
  height: 0.84rem;
  border-radius: 50%;
  background: rgba(220, 232, 238, 0.82);
  transform: translateY(-50%);
  transition: transform var(--lib-ease), background var(--lib-ease);
}

.sensitive-toggle-input:checked + .sensitive-toggle-switch {
  background: rgba(214, 164, 95, 0.34);
  border-color: rgba(214, 164, 95, 0.48);
}

.sensitive-toggle-input:checked + .sensitive-toggle-switch::before {
  background: #f7dfba;
  transform: translate(1.02rem, -50%);
}

.sensitive-toggle:focus-within {
  outline: 2px solid rgba(104, 191, 215, 0.70);
  outline-offset: 2px;
}

.search-container.shrink .sensitive-toggle,
.search-container.shrink.compact .sensitive-toggle,
.search-container.shrink.shelf-view-active .sensitive-toggle {
  right: clamp(14rem, 24vw, 18rem);
}

.search-container.shrink,
.search-container.shrink.compact,
.search-container.shrink.shelf-view-active {
  background: rgba(15, 19, 27, 0.86);
  border-bottom-color: var(--lib-line);
  box-shadow: 0 10px 34px rgba(0, 0, 0, 0.30);
  backdrop-filter: blur(18px) saturate(128%);
}

.logo {
  height: clamp(116px, 18vw, 176px);
  margin-bottom: 1.15rem;
  opacity: 0.94;
  filter: drop-shadow(0 14px 28px rgba(0, 0, 0, 0.30));
}

.search-container.shrink .logo {
  height: 64px;
}

.search-container.shrink.shelf-view-active .logo {
  height: 48px;
}

.search-form {
  width: min(860px, 94vw);
  margin: 0 auto;
  gap: 0.85rem;
  font-size: 1rem;
}

.search-container.shrink .search-form,
.search-container.shrink.compact .search-form,
.search-container.shrink.shelf-view-active .search-form {
  gap: 0.5rem;
}

.search-status-area,
.search-container.shrink .search-status-area,
.search-container.shrink.compact .search-status-area,
.search-container.centered .search-status-area {
  position: relative;
  inset: auto;
  width: fit-content;
  max-width: min(520px, 92vw);
  margin: 0 auto 1.35rem;
  padding: 0.46rem 0.72rem;
  border-radius: 999px;
  background: rgba(24, 31, 42, 0.48);
  border: 1px solid rgba(148, 163, 184, 0.18);
  box-shadow: none;
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.48rem;
  text-align: left;
  overflow: hidden;
}

.search-status-area::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  background: rgba(104, 191, 215, 0.48);
  opacity: 0.58;
}

.search-container .search-status-area.is-random {
  border-color: rgba(214, 164, 95, 0.32);
  background:
    linear-gradient(135deg, rgba(214, 164, 95, 0.105), rgba(104, 191, 215, 0.045)),
    rgba(24, 31, 42, 0.48);
}

.search-status-area.is-random::before {
  background:
    linear-gradient(
      to bottom,
      rgba(214, 164, 95, 0.82) 0 28%,
      rgba(104, 191, 215, 0.68) 28% 56%,
      rgba(105, 198, 163, 0.70) 56% 100%
    );
  opacity: 0.82;
}

.search-status-area.is-notice::before {
  background: rgba(214, 164, 95, 0.68);
}

.search-status-count {
  color: var(--lib-text);
  text-shadow: none;
  font-size: 0.82rem;
  line-height: 1.25;
  margin: 0;
  white-space: nowrap;
}

.search-status-chips {
  min-width: 0;
  gap: 0.38rem;
}

.search-status-chip {
  padding: 0.28rem 0.56rem;
  background: rgba(255, 255, 255, 0.045);
  border-color: var(--lib-line);
  color: #dce8ee;
  box-shadow: none;
  font-size: 0.74rem;
}

.search-status-chip.random {
  background: rgba(214, 164, 95, 0.12);
  border-color: rgba(214, 164, 95, 0.28);
  color: #f7dfba;
}

.search-status-reroll {
  min-height: 0;
  padding: 0.28rem 0.62rem;

  font-size: 0.74rem;
  font-weight: 760;
  line-height: 1.35;

}

.search-status-reroll:hover,
.search-status-reroll:focus-visible {
  border-color: rgba(146, 220, 236, 0.60);
  background: rgba(104, 191, 215, 0.20);

  border-color: rgba(214, 164, 95, 0.34);
  background: rgba(214, 164, 95, 0.10);
  color: #f7dfba;
}

.search-status-area.is-random .search-status-reroll:hover,
.search-status-area.is-random .search-status-reroll:focus-visible {
  border-color: rgba(240, 195, 122, 0.60);

.search-status-reroll:disabled {

  border-color: rgba(104, 191, 215, 0.20);
  background: rgba(104, 191, 215, 0.08);

.search-status-chip-remove {

.input-group {
  width: 100%;
  max-width: 760px;
}

.input-group label,
.released-range-row > label {

.input-group input,

.input-group select option,

.input-group input::placeholder {

.input-group input:focus,

.button-group,

button,

button:hover,

button.primary-action,

#advancedToggleBtn.active {

.bookshelf-cta-wrap {

.bookshelf-cta-card.top-shelf-btn:hover,

    linear-gradient(135deg, rgba(214, 164, 95, 0.25), rgba(104, 191, 215, 0.10)),

.bookshelf-cta-title {

.bookshelf-cta-subtitle {

.advanced-search-area {

.advanced-grid {

.released-range-separator {

.view-toggle {
  top: 24px;
  right: 24px;
  gap: 0;
  padding: 0.25rem;
  border: 1px solid var(--lib-line);
  border-radius: 999px;
  background: rgba(15, 19, 27, 0.78);

  backdrop-filter: blur(14px);

.toggle-btn {

.toggle-btn::after {
