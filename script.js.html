function uiIcon_(name, extraClass) {

}

// 画像取得率の計測はデバッグ用。
// 通常時はOFF。URLに ?debugImageStats=1 を付けるか、
// localStorage.setItem('shumiLibrary.debugImageStats', '1') 後に再読み込みでON。
const IMAGE_LOAD_STATS_QUERY_KEY = 'debugImageStats';
const IMAGE_LOAD_STATS_STORAGE_KEY = 'shumiLibrary.debugImageStats';

let IMAGE_LOAD_STATS = null;
let IMAGE_LOAD_STATS_RUN_ID = 0;


function normalizeImageCandidateUrl_(url) {
  const value = String(url || '').trim();
  if (!value) return '';

  if (/^http:\/\//i.test(value)) {
    return value.replace(/^http:/i, 'https:');
  }

  return /^https:\/\//i.test(value) ? value : '';
}

function isSensitiveCoverVisible_() {
  try {
    return localStorage.getItem(SENSITIVE_COVER_STORAGE_KEY) === '1';
  } catch (e) {
    return false;
  }
}

function setSensitiveCoverVisible_(visible) {
  try {
    localStorage.setItem(SENSITIVE_COVER_STORAGE_KEY, visible ? '1' : '0');
  } catch (e) {
    // localStorageが使えない環境では、その場の表示だけ切り替える。
  }
}

function normalizeResultViewMode_(mode) {
  return RESULT_VIEW_MODES.includes(mode) ? mode : 'card';
}

function loadPreferredResultViewMode_() {
  if (RESULT_VIEW_MODES.includes(preferredResultViewMode)) {
    return preferredResultViewMode;
  }

  try {
    return normalizeResultViewMode_(localStorage.getItem(RESULT_VIEW_MODE_STORAGE_KEY));
  } catch (e) {
    return 'card';
  }
}

function hydratePreferredResultViewMode_(mode) {
  const normalized = normalizeResultViewMode_(mode);
  preferredResultViewMode = normalized;
  try {
    localStorage.setItem(RESULT_VIEW_MODE_STORAGE_KEY, normalized);
  } catch (e) {
    // localStorageが使えない環境では、その場の表示だけ切り替える。
  }
  return normalized;
}

function savePreferredResultViewModeToServer_(mode) {
  if (!window.google || !google.script || !google.script.run) return;

  google.script.run
    .withFailureHandler(function(err) {
      console.warn('saveWebAppUserPreferences failed:', err);
    })
    .saveWebAppUserPreferences({
      resultViewMode: normalizeResultViewMode_(mode)
    });
}

function savePreferredResultViewMode_(mode) {
  const normalized = hydratePreferredResultViewMode_(mode);
  resultViewModeChangedLocally = true;
  savePreferredResultViewModeToServer_(normalized);
  return normalized;
}

function isSensitiveBook_(book) {
  if (!book) return false;

  const themes = book.genres && Array.isArray(book.genres.theme)
    ? book.genres.theme
    : [];
  if (themes.includes(SENSITIVE_THEME_NAME)) return true;

  const meta = Array.isArray(book.genreMeta) ? book.genreMeta : [];
  return meta.some(item => item && item.category === 'theme' && item.name === SENSITIVE_THEME_NAME);
}

function syncSensitiveToggleUi_() {
  const toggle = document.getElementById('sensitiveToggle');
  if (!toggle) return;
  toggle.checked = isSensitiveCoverVisible_();
}

function refreshSensitiveCoverVisibility_() {
  if (Array.isArray(lastResult) && lastResult.length) {
    showResult(lastResult);
  }

  const overlay = document.getElementById('image-popup-overlay');
  const popupOpen = overlay && overlay.style.display !== 'none';
  if (popupOpen && Array.isArray(popupData) && popupData[popupIndex]) {
    showPopup(popupData[popupIndex], popupIndex, popupData, popupSeriesContext);
  }
}

function bindSensitiveToggle_() {
  const toggle = document.getElementById('sensitiveToggle');
  if (!toggle) return;
  const wrapper = toggle.closest('.sensitive-toggle');

  syncSensitiveToggleUi_();

  function applySensitiveToggleState_(visible) {
    toggle.checked = Boolean(visible);
    setSensitiveCoverVisible_(toggle.checked);
    refreshSensitiveCoverVisibility_();
  }

  if (wrapper) {
    wrapper.addEventListener('click', function(event) {
      if (event.target === toggle) {
        setSensitiveCoverVisible_(toggle.checked);
        refreshSensitiveCoverVisibility_();
        return;
      }

      event.preventDefault();
      applySensitiveToggleState_(!toggle.checked);
    });
  }

  toggle.addEventListener('change', function() {
    setSensitiveCoverVisible_(toggle.checked);
    refreshSensitiveCoverVisibility_();
  });

  toggle.addEventListener('keydown', function(event) {
    if (event.key !== ' ' && event.key !== 'Enter') return;
    event.preventDefault();
    applySensitiveToggleState_(!toggle.checked);
  });
}

function isImageLoadStatsEnabled_() {
  try {
    const params = new URLSearchParams(window.location.search || '');
    if (params.get(IMAGE_LOAD_STATS_QUERY_KEY) === '1') return true;
    if (params.get(IMAGE_LOAD_STATS_QUERY_KEY) === 'true') return true;
  } catch (e) {
    // URLSearchParamsが使えない環境ではlocalStorage判定だけに落とす。
  }

  try {
    return localStorage.getItem(IMAGE_LOAD_STATS_STORAGE_KEY) === '1';
  } catch (e) {
    return false;
  }
}

function resetImageLoadStats_(books) {
  IMAGE_LOAD_STATS_RUN_ID++;

  if (!isImageLoadStatsEnabled_()) {
    IMAGE_LOAD_STATS = null;
    return;
  }

  IMAGE_LOAD_STATS = {
    runId: IMAGE_LOAD_STATS_RUN_ID,
    total: Array.isArray(books) ? books.length : 0,
    settledKeys: new Set(),
    loaded: 0,
    noImage: 0,
    bySource: {
      Manual: 0,
      Hanmoto600: 0,
      Hanmoto400: 0,
      Fallback: 0,
      NO_IMAGE: 0
    },
    fallbackBySource: {},
    startedAt: Date.now(),
    lastUpdatedAt: null
  };
}

function getBookImageTrackKey_(book, index) {
  return [
    String(book && book.isbn || ''),
    String(book && book.title || ''),
    String(index || '')
  ].join('|');
}

function recordImageLoadResult_(key, candidate, runId) {
  if (!IMAGE_LOAD_STATS || !key) return;
  if (runId !== IMAGE_LOAD_STATS.runId) return;
  if (IMAGE_LOAD_STATS.settledKeys.has(key)) return;

  IMAGE_LOAD_STATS.settledKeys.add(key);

  const sourceLabel = candidate && candidate.label ? candidate.label : 'NO_IMAGE';
  const sourceDetail = candidate && candidate.detail ? candidate.detail : '';

  if (sourceLabel === 'NO_IMAGE') {
    IMAGE_LOAD_STATS.noImage++;
  } else {
    IMAGE_LOAD_STATS.loaded++;
  }

  if (!Object.prototype.hasOwnProperty.call(IMAGE_LOAD_STATS.bySource, sourceLabel)) {
    IMAGE_LOAD_STATS.bySource[sourceLabel] = 0;
  }
  IMAGE_LOAD_STATS.bySource[sourceLabel]++;

  if (sourceLabel === 'Fallback') {
    const detailKey = sourceDetail || 'Unknown';
    if (!Object.prototype.hasOwnProperty.call(IMAGE_LOAD_STATS.fallbackBySource, detailKey)) {
      IMAGE_LOAD_STATS.fallbackBySource[detailKey] = 0;
    }
    IMAGE_LOAD_STATS.fallbackBySource[detailKey]++;
  }

  IMAGE_LOAD_STATS.lastUpdatedAt = Date.now();

  if (IMAGE_LOAD_STATS.settledKeys.size >= IMAGE_LOAD_STATS.total) {
    logImageLoadStats_();
  }
}

function logImageLoadStats_() {
  if (!IMAGE_LOAD_STATS) return;

  const total = IMAGE_LOAD_STATS.total || 0;
  const loaded = IMAGE_LOAD_STATS.loaded || 0;
  const noImage = IMAGE_LOAD_STATS.noImage || 0;
  const settled = IMAGE_LOAD_STATS.settledKeys ? IMAGE_LOAD_STATS.settledKeys.size : 0;
  const elapsedMs = (IMAGE_LOAD_STATS.lastUpdatedAt || Date.now()) - IMAGE_LOAD_STATS.startedAt;

  const output = {
    total,
    settled,
    pending: Math.max(total - settled, 0),
    loaded,
    noImage,
    rate: total ? ((loaded / total) * 100).toFixed(1) + '%' : '0.0%',
    elapsedMs,
    bySource: IMAGE_LOAD_STATS.bySource,
    fallbackBySource: IMAGE_LOAD_STATS.fallbackBySource
  };

  console.log('[IMAGE_LOAD_STATS]', JSON.stringify(output, null, 2));
  return output;
}

function buildBookImageCandidates_(book) {
  if (isSensitiveBook_(book) && !isSensitiveCoverVisible_()) {
    return [{
      url: NO_IMAGE_URL,
      label: 'NO_IMAGE',
      detail: 'SensitiveHidden'
    }];
  }

  const candidates = [];
  const fallback = normalizeImageCandidateUrl_(book && book.fallbackImg);
  const source = String(book && book.fallbackImageSource || '').trim();

  // Manualだけはユーザー指定画像として最優先。
  if (source === 'Manual' && fallback) {
    candidates.push({
      url: fallback,
      label: 'Manual',
      detail: 'Manual'
    });
  }

  // 通常はHanmotoをブラウザで直接試す。GAS側で存在確認しない。
  candidates.push({
    url: normalizeImageCandidateUrl_(book && book.img), // Hanmoto 600
    label: 'Hanmoto600',
    detail: 'Hanmoto'
  });

//  candidates.push({
//    url: normalizeImageCandidateUrl_(book && book.img400), // Hanmoto 400
//    label: 'Hanmoto400',
//    detail: 'Hanmoto'
//  });

  // 自動取得fallbackはHanmoto失敗時だけ使う。
  if (source !== 'Manual' && fallback) {
    candidates.push({
      url: fallback,
      label: 'Fallback',
      detail: source || 'Unknown'
    });
  }

  candidates.push({
    url: NO_IMAGE_URL,
    label: 'NO_IMAGE',
    detail: 'NO_IMAGE'
  });

  const seen = {};
  return candidates.filter(item => {
    if (!item || !item.url) return false;
    if (seen[item.url]) return false;
    seen[item.url] = true;
    return true;
  });
}

function setupBookImageElement_(img, book, options) {
  const opt = options || {};
  const candidates = buildBookImageCandidates_(book);
  const track = Boolean(opt.track);
  const trackKey = opt.trackKey || '';
  const trackRunId = IMAGE_LOAD_STATS_RUN_ID;
  const loading = opt.loading || 'lazy';
  const fetchPriority = opt.fetchPriority || (loading === 'eager' ? 'high' : 'low');

  let currentIndex = -1;
  let settled = false;

  img.classList.remove('book-image-loaded');
  img.classList.add('book-image-loading');
  img.loading = loading;
  img.decoding = 'async';
  img.setAttribute('fetchpriority', fetchPriority);

  function setCandidate(index) {
    if (index < 0 || index >= candidates.length) return;
    currentIndex = index;
    img.src = candidates[currentIndex].url;
  }

  function settleCurrentCandidate() {
    if (settled) return;
    settled = true;
    img.classList.remove('book-image-loading');
    img.classList.add('book-image-loaded');

    if (track) {
      recordImageLoadResult_(trackKey, candidates[currentIndex], trackRunId);
    }
  }

  function moveNextCandidate() {
    const nextIndex = currentIndex + 1;
    if (nextIndex < candidates.length) {
      setCandidate(nextIndex);
      return;
    }

    settleCurrentCandidate();
  }

  img.onerror = function() {
    moveNextCandidate();
  };

  img.onload = function() {
    const current = candidates[currentIndex];

    if (!current) {
      settleCurrentCandidate();
      return;
    }

    // Hanmoto等が返す小さいダミー画像対策。NO_IMAGE自身ではループさせない。
    if (
      img.naturalWidth === 50 &&
      img.naturalHeight === 71 &&
      current.label !== 'NO_IMAGE'
    ) {
      moveNextCandidate();
      return;
    }

    settleCurrentCandidate();
  };

  setCandidate(0);
}

function hiraToKana(str) {
  return (str || '').replace(/[\u3041-\u3096]/g, function(match) {
    return String.fromCharCode(match.charCodeAt(0) + 0x60);
  });
}

function normalizeKana(str) {
  return (str || '').toLowerCase().normalize("NFKC")
    .replace(/[\u30a1-\u30f6]/g, function(match) {
      return String.fromCharCode(match.charCodeAt(0) - 0x60);
    })
    .replace(/[\s　]/g, '');
}

function titleYomiMixedMatch_(query, title, yomi) {
  const q = normalizeKana(query || '');
  if (!q) return true;

  const t = normalizeKana(title || '');
  const y = normalizeKana(yomi || '');

  if ((t && t.includes(q)) || (y && y.includes(q))) return true;
  if (!t || !y) return false;

  const chunks = splitMixedSearchQuery_(q);
  if (chunks.length <= 1) return false;

  let progress = 0;

  for (let i = 0; i < chunks.length; i++) {
    const chunk = chunks[i];
    const target = chunk.type === 'kana' ? y : t;
    const match = findChunkMixedMatch_(chunk.text, target, progress);

    if (!match) return false;

    progress = match.progress;
  }

  return true;
}

function splitMixedSearchQuery_(query) {
  const q = normalizeKana(query || '');
  if (!q) return [];

  const chunks = [];
  let currentType = '';
  let currentText = '';

  for (let i = 0; i < q.length; i++) {
    const char = q[i];
    const type = isKanaChar_(char) ? 'kana' : 'title';

    if (currentText && type !== currentType) {
      chunks.push({ type: currentType, text: currentText });
      currentText = '';
    }

    currentType = type;
    currentText += char;
  }

  if (currentText) {
    chunks.push({ type: currentType, text: currentText });
  }

  return chunks;
}

function isKanaChar_(char) {
  return /^[\u3041-\u3096\u30fc]$/.test(char || '');
}

function findChunkMixedMatch_(chunk, text, minProgress) {
  if (!chunk || !text) return null;

  const step = 1 / Math.max(text.length, 1);

  for (let index = text.indexOf(chunk); index >= 0; index = text.indexOf(chunk, index + 1)) {
    const progress = index * step;
    if (progress + 0.000001 < minProgress) continue;

    return {
      index,
      progress,
      progressAfter: (index + chunk.length) * step
    };
  }

  return null;
}

function keywordMixedMatch_(query, idx) {
  const q = normalizeKana(query || '');
  if (!q) return true;
  if (idx && idx.searchKey && idx.searchKey.includes(q)) return true;
  return titleYomiMixedMatch_(q, idx && idx.title, idx && idx.yomi);
}

function getEmptySuggestData_() {
  return {
    titles: [],
    yomis: [],
    authors: [],
    genres: []
  };
}

function getEmptyAdvancedOptions_() {
  return {
    publishers: [],
    storyGenres: [],
    themeGenres: [],
    moodGenres: [],
    statusGenres: [],
    releaseYears: []
  };
}

function applyInitialSearchData_(data) {
  const payload = data || {};

  SUGGEST_DATA = payload.suggest || getEmptySuggestData_();
  ADVANCED_OPTIONS = payload.advancedOptions || getEmptyAdvancedOptions_();
  PREVIEW_INDEX = Array.isArray(payload.previewIndex) ? payload.previewIndex : [];
  PREVIEW_INDEX_READY = true;

  if (!resultViewModeChangedLocally && payload.userPreferences) {
    const initialViewMode = hydratePreferredResultViewMode_(payload.userPreferences.resultViewMode);
    currentViewMode = initialViewMode;
    isCardView = initialViewMode === 'card';
    updateViewToggleButtons_();
  }

  populateAdvancedOptions();
  syncSearchStatusPreviewFromForm_();
}

function fetchInitialSearchData() {
  google.script.run
    .withSuccessHandler(function(data) {
      applyInitialSearchData_(data);
    })
    .withFailureHandler(function(err) {
      console.error('getInitialSearchData failed:', err);

      // 統合API側で失敗した場合だけ、旧3APIにフォールバックする。
      // 既存関数を残す理由はここにもある。
      fetchSuggestData();
      fetchAdvancedOptions();
      fetchPreviewIndex();
    })
    .getInitialSearchData();
}

function fetchSuggestData() {
  google.script.run
    .withSuccessHandler(function(data) {
      SUGGEST_DATA = data || getEmptySuggestData_();
    })
    .withFailureHandler(function(err) {
      console.error('getSuggestData failed:', err);
      SUGGEST_DATA = getEmptySuggestData_();
    })
    .getSuggestData();
}

function fetchAdvancedOptions() {
  google.script.run
    .withSuccessHandler(function(data) {
      ADVANCED_OPTIONS = data || getEmptyAdvancedOptions_();
      populateAdvancedOptions();
    })
    .withFailureHandler(function(err) {
      console.error('getAdvancedSearchOptions failed:', err);
      ADVANCED_OPTIONS = getEmptyAdvancedOptions_();
      populateAdvancedOptions();
    })
    .getAdvancedSearchOptions();
}

function fetchPreviewIndex() {
  google.script.run
    .withSuccessHandler(function(data) {
      PREVIEW_INDEX = Array.isArray(data) ? data : [];
      PREVIEW_INDEX_READY = true;
      syncSearchStatusPreviewFromForm_();
    })
    .withFailureHandler(function(err) {
      console.error('getPreviewIndex failed:', err);
      PREVIEW_INDEX = [];
      PREVIEW_INDEX_READY = false;
      syncSearchStatusPreviewFromForm_();
    })
    .getPreviewIndex();
}

function populateSelect(selectId, values) {
  const select = document.getElementById(selectId);
  if (!select) return;

  const current = select.value;
  select.innerHTML = '<option value="">すべて</option>';

  (values || []).forEach(value => {
    const option = document.createElement('option');
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  });

  select.value = current || '';
}

function populateReleaseSelect_(selectId, values, placeholder, formatter) {
  const select = document.getElementById(selectId);
  if (!select) return;

  const current = String(select.value || '');
  select.innerHTML = `<option value="">${placeholder}</option>`;

  (values || []).forEach(value => {
    const normalized = String(value);
    const option = document.createElement('option');
    option.value = normalized;
    option.textContent = typeof formatter === 'function'
      ? formatter(normalized)
      : normalized;
    select.appendChild(option);
  });

  select.value = current;
  if (String(select.value || '') !== current) {
    select.value = '';
  }
}

function getReleaseMonthValues_() {
  return ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12'];
}

function syncReleasedRangeOptions_() {
  const fromYearEl = document.getElementById('detailReleasedFromYear');
  const fromMonthEl = document.getElementById('detailReleasedFromMonth');
  const toYearEl = document.getElementById('detailReleasedToYear');
  const toMonthEl = document.getElementById('detailReleasedToMonth');

  if (!fromYearEl || !fromMonthEl || !toYearEl || !toMonthEl) return;

  const allYears = Array.isArray(ADVANCED_OPTIONS.releaseYears)
    ? ADVANCED_OPTIONS.releaseYears.map(String)
    : [];
  const allMonths = getReleaseMonthValues_();

  toggleMonthEnabled_('detailReleasedFromYear', 'detailReleasedFromMonth');

  const fromYear = String(fromYearEl.value || '');
  const fromMonth = String(fromMonthEl.value || '');

  const filteredToYears = allYears.filter(year => {
    return !fromYear || Number(year) >= Number(fromYear);
  });

  populateReleaseSelect_('detailReleasedToYear', filteredToYears, '年');

  const currentToYear = String(toYearEl.value || '');
  const filteredToMonths = allMonths.filter(month => {
    if (!currentToYear) return true;
    if (!fromYear) return true;
    if (Number(currentToYear) !== Number(fromYear)) return true;
    if (!fromMonth) return true;
    return Number(month) >= Number(fromMonth);
  });

  populateReleaseSelect_(
    'detailReleasedToMonth',
    filteredToMonths,
    '月',
    value => `${Number(value)}月`
  );

  toggleMonthEnabled_('detailReleasedToYear', 'detailReleasedToMonth');

  if (!toYearEl.value) {
    toMonthEl.value = '';
  }
}

function populateAdvancedOptions() {
  populateSelect('detailPublisher', ADVANCED_OPTIONS.publishers);
  populateSelect('detailStory', ADVANCED_OPTIONS.storyGenres);
  populateSelect('detailTheme', ADVANCED_OPTIONS.themeGenres);
  populateSelect('detailMood', ADVANCED_OPTIONS.moodGenres);
  populateSelect('detailStatus', ADVANCED_OPTIONS.statusGenres);

  populateReleaseSelect_('detailReleasedFromYear', ADVANCED_OPTIONS.releaseYears, '年');
  populateReleaseSelect_('detailReleasedToYear', ADVANCED_OPTIONS.releaseYears, '年');

}

function suggest(input, type) {
  if (!input || input.length < 1) return [];
  const nInput = normalizeKana(input);

  let arr = [];
  if (type === 'keyword') {
    arr = Array.from(new Set([
      ...(SUGGEST_DATA.titles || []),
      ...(SUGGEST_DATA.yomis || []),
      ...(SUGGEST_DATA.authors || [])
    ]));
  } else if (type === 'detailTitle') {
    arr = SUGGEST_DATA.titles || [];
  }

  return arr.filter(v => normalizeKana(v).includes(nInput)).slice(0, 20);
}

function showSuggestList(inputId, suggestId, type) {
  const input = document.getElementById(inputId);
  const suggestBox = document.getElementById(suggestId);
  const value = input.value;
  const list = suggest(value, type);

  currentSuggestList[type] = list;
  currentSuggestIndex[type] = -1;
  suggestBox.innerHTML = '';

  if (list.length === 0 || !value) {
    suggestBox.style.display = 'none';
    return;
  }

  suggestBox.style.display = 'block';
  list.forEach(item => {
    const div = document.createElement('div');
    div.className = 'suggest-item';
    div.innerHTML = highlightMatch(item, value);
    div.onclick = function() {
      input.value = item;
      suggestBox.style.display = 'none';
      input.focus();
    };
    suggestBox.appendChild(div);
  });
}

function updateSuggestActive(suggestId, type) {
  const suggestBox = document.getElementById(suggestId);
  const items = suggestBox.querySelectorAll('.suggest-item');
  items.forEach((el, idx) => {
    if (idx === currentSuggestIndex[type]) {
      el.classList.add('active');
    } else {
      el.classList.remove('active');
    }
  });
}

function addSuggestKeyHandler(inputId, suggestId, type) {
  const input = document.getElementById(inputId);
  input.addEventListener('keydown', function(event) {
    const suggestBox = document.getElementById(suggestId);
    if (suggestBox.style.display === 'block') {
      if (event.key === 'ArrowDown') {
        event.preventDefault();
        if (currentSuggestIndex[type] < currentSuggestList[type].length - 1) {
          currentSuggestIndex[type]++;
        } else {
          currentSuggestIndex[type] = 0;
        }
        updateSuggestActive(suggestId, type);
      } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        if (currentSuggestIndex[type] > 0) {
          currentSuggestIndex[type]--;
        } else {
          currentSuggestIndex[type] = currentSuggestList[type].length - 1;
        }
        updateSuggestActive(suggestId, type);
      } else if (event.key === 'Enter') {
        if (currentSuggestIndex[type] >= 0 && currentSuggestList[type][currentSuggestIndex[type]]) {
          event.preventDefault();
          input.value = currentSuggestList[type][currentSuggestIndex[type]];
          suggestBox.style.display = 'none';
          input.focus();
        }
      } else if (event.key === 'Escape') {
        suggestBox.style.display = 'none';
      }
    }
  });
}

function highlightMatch(text, input) {
  if (!input) return text;

  const nText = normalizeKana(text);
  const nInput = normalizeKana(input);
  const index = nText.indexOf(nInput);
  if (index === -1) return text;

  let origStart = 0;
  let origLen = 0;
  let normCount = 0;

  for (let i = 0; i < text.length; i++) {
    const cNorm = normalizeKana(text[i]);
    if (normCount === index) origStart = i;
    normCount += cNorm.length;
    if (normCount >= index + nInput.length) {
      origLen = i - origStart + 1;
      break;
    }
  }

  if (origLen <= 0) return text;

  const before = text.slice(0, origStart);
  const match = text.slice(origStart, origStart + origLen);
  const after = text.slice(origStart + origLen);
  return `${before}<span class="highlight-match">${match}</span>${after}`;
}

  const fromYear = params.detailReleasedFromYear || '';
  const fromMonth = params.detailReleasedFromMonth || '';
  const toYear = params.detailReleasedToYear || '';

  if (!fromYear && !toYear) return '';

  const fromLabel = formatReleasedChipPart_(fromYear, fromMonth);
  const toLabel = formatReleasedChipPart_(toYear, toMonth);

  if (fromYear && toYear) {
    return `${fromLabel}〜${toLabel}`;

  return `${toLabel}以前`;

function getSearchStatusCountText_() {
  const hasConditions = searchStatusState.chips.length > 0;

  if (searchStatusState.message) {
    return searchStatusState.message;
  }

  if (searchStatusState.mode === 'random') {
    return `${searchStatusState.resultCount}件見つかりました`;
  }

  if (searchStatusState.mode === 'result') {
    return `${searchStatusState.resultCount}件見つかりました`;
  }

  if (!hasConditions) {
    return '未検索';
  }

  if (searchStatusState.previewPending) {
    return '確認中';
  }

  if (searchStatusState.previewReady && Number.isFinite(searchStatusState.previewCount)) {
    return `未検索 / 対象${searchStatusState.previewCount}件`;
  }

  return '未検索';
}

function renderSearchStatus_() {
  const els = getSearchStatusElements_();
  if (!els.area || !els.count || !els.chips) return;

  if (!searchStatusState.visible) {
    els.area.hidden = true;
    els.count.textContent = '';
    els.count.classList.remove('loading-dots');
    els.chips.innerHTML = '';
    return;
  }

  els.area.hidden = false;
  els.count.textContent = getSearchStatusCountText_();
  els.count.classList.toggle('loading-dots', searchStatusState.previewPending);

  const removableChipCount = searchStatusState.chips.filter(chip => chip && chip.removable).length;

  els.chips.innerHTML = searchStatusState.chips.map(chip => {
    const canRemoveChip = chip.removable && removableChipCount > 1;
    const classNames = ['search-status-chip'];
    if (chip.className) classNames.push(chip.className);
    if (canRemoveChip) classNames.push('removable');
    if (chip.key && chip.key === searchStatusState.removingChipKey) classNames.push('is-removing');

    const visibleLabel = chip.labelPrefix
      ? `${chip.labelPrefix}: ${chip.label || ''}`
      : (chip.label || '');
    const chipLabelHtml = chip.labelPrefix ? `
        <span class="search-status-chip-key">${escapeHtml(chip.labelPrefix)}</span>
        <span class="search-status-chip-value">${escapeHtml(chip.label || '')}</span>
      ` : `<span class="search-status-chip-value">${escapeHtml(chip.label || '')}</span>`;

    const removeButton = canRemoveChip ? `
      <button
        type="button"
        class="search-status-chip-remove"
        data-action="remove-chip"
        data-key="${escapeHtml(chip.key || '')}"
        aria-label="${escapeHtml(visibleLabel + ' を削除')}"
        title="この条件を削除"
      >×</button>
    ` : '';

    return `
      <span
        class="${classNames.join(' ')}"
        data-key="${escapeHtml(chip.key || '')}"
        data-value="${escapeHtml(chip.value || '')}"
      >
        <span class="search-status-chip-label">${chipLabelHtml}</span>
        ${removeButton}
      </span>
    `;
  }).join('');

  if (searchStatusState.mode === 'random') {
    els.chips.insertAdjacentHTML('beforeend', `
      <button
        type="button"
        class="search-status-reroll"
        data-action="random-reroll"
        aria-label="ランダムで別の10冊を表示"
        title="別の10冊を表示"
      >もう一度ひく</button>
    `);
  }
}

function countPreviewMatches_(params) {
  if (!Array.isArray(PREVIEW_INDEX) || !PREVIEW_INDEX.length) {
    return null;
  }

  const nKeyword = normalizeKana(params.keyword || '');
  const nTitle = normalizeKana(params.detailTitle || '');
  const nYomi = normalizeKana(params.detailYomi || '');
  const nAuthor = normalizeKana(params.detailAuthor || '');
  const selectedPublisher = String(params.detailPublisher || '').trim();
  const selectedStory = String(params.detailStory || '').trim();
  const selectedTheme = String(params.detailTheme || '').trim();
  const selectedMood = String(params.detailMood || '').trim();
  const selectedStatus = String(params.detailStatus || '').trim();

  const fromYm = normalizeReleasedYmClient_(
    params.detailReleasedFromYear,
    params.detailReleasedFromMonth,
    true
  );
  const toYm = normalizeReleasedYmClient_(
    params.detailReleasedToYear,
    params.detailReleasedToMonth,
    false
  );

  let count = 0;

  for (let i = 0; i < PREVIEW_INDEX.length; i++) {
    const idx = PREVIEW_INDEX[i] || {
      title: '',
      yomi: '',
      author: '',
      searchKey: '',
      publisher: '',
      releasedYm: 0,
      genres: { story: [], theme: [], mood: [], status: [] }
    };

    const keywordMatch = !nKeyword || keywordMixedMatch_(nKeyword, idx);
    const titleMatch = !nTitle || titleYomiMixedMatch_(nTitle, idx.title, idx.yomi);
    const yomiMatch = !nYomi || titleYomiMixedMatch_(nYomi, idx.title, idx.yomi);
    const authorMatch = !nAuthor || (idx.author && idx.author.includes(nAuthor));
    const publisherMatch = !selectedPublisher || idx.publisher === selectedPublisher;
    const storyMatch = !selectedStory || (idx.genres.story || []).includes(selectedStory);
    const themeMatch = !selectedTheme || (idx.genres.theme || []).includes(selectedTheme);
    const moodMatch = !selectedMood || (idx.genres.mood || []).includes(selectedMood);
    const statusMatch = !selectedStatus || (idx.genres.status || []).includes(selectedStatus);

    const releasedYm = Number(idx.releasedYm || 0);
    const releasedFromMatch = !fromYm || (releasedYm && releasedYm >= fromYm);
    const releasedToMatch = !toYm || (releasedYm && releasedYm <= toYm);

    if (
      keywordMatch &&
      titleMatch &&
      yomiMatch &&
      authorMatch &&
      publisherMatch &&
      storyMatch &&
      themeMatch &&
      moodMatch &&
      statusMatch &&
      releasedFromMatch &&
      releasedToMatch
    ) {
      count++;
    }
  }

  return count;
}


function buildPreviewCountRequestKey_(params, mode) {
  return JSON.stringify({ mode: mode || '', params: params || {} });
}

function requestAuthoritativePreviewCount_(mode, params) {
  if (PREVIEW_COUNT_DEBOUNCE_TIMER) {
    clearTimeout(PREVIEW_COUNT_DEBOUNCE_TIMER);
  }

  const requestSeq = ++PREVIEW_COUNT_REQUEST_SEQ;
  const requestKey = buildPreviewCountRequestKey_(params, mode);

  searchStatusState.previewPending = true;
  searchStatusState.previewReady = false;
  renderSearchStatus_();

  PREVIEW_COUNT_DEBOUNCE_TIMER = setTimeout(function() {
    google.script.run
      .withSuccessHandler(function(count) {
        if (requestSeq !== PREVIEW_COUNT_REQUEST_SEQ) return;

        const currentParams = getEffectiveSearchParams_();
        const currentMode = isAdvancedOpen() ? 'advanced' : 'normal';
        const currentKey = buildPreviewCountRequestKey_(currentParams, currentMode);
        if (currentKey !== requestKey) return;

        showSearchStatusPreview_(currentMode, currentParams, Number(count) || 0, true);
      })
      .withFailureHandler(function(err) {
        if (requestSeq !== PREVIEW_COUNT_REQUEST_SEQ) return;
        console.error('countPreviewMatchesAuthoritative failed:', err);
      })
      .countPreviewMatchesAuthoritative(
        params.keyword,
        params.detailTitle,
        params.detailYomi,
        params.detailAuthor,
        params.detailPublisher,
        params.detailStory,
        params.detailTheme,
        params.detailMood,
        params.detailStatus,
        params.detailReleasedFromYear,
        params.detailReleasedFromMonth,
        params.detailReleasedToYear,
        params.detailReleasedToMonth
      );
  }, 120);
}

function syncSearchStatusPreviewFromForm_() {
  const params = getEffectiveSearchParams_();
  const mode = isAdvancedOpen() ? 'advanced' : 'normal';

  if (!hasAnySearchCondition_(params)) {
    PREVIEW_COUNT_REQUEST_SEQ++;
    if (PREVIEW_COUNT_DEBOUNCE_TIMER) {
      clearTimeout(PREVIEW_COUNT_DEBOUNCE_TIMER);
      PREVIEW_COUNT_DEBOUNCE_TIMER = null;
    }
    showSearchStatusPreview_('normal', {}, null, false);
    return;
  }

  if (!PREVIEW_INDEX_READY) {
    showSearchStatusPreview_(mode, params, null, false);
    return;
  }

  const count = countPreviewMatches_(params);
  showSearchStatusPreview_(mode, params, count, Number.isFinite(count));

  const hasTextCondition = Boolean(
    params.keyword ||
    params.detailTitle ||
    params.detailYomi ||
    params.detailAuthor
  );

  if (hasTextCondition) {
    requestAuthoritativePreviewCount_(mode, params);
  }
}

function rerunSearchWithParams_(params) {
  if (!hasAnySearchCondition_(params)) {
    hideSpinner();
    syncSearchStatusPreviewFromForm_();
    return;

  resetViewModeForNewResults_();

  const container = document.getElementById('searchContainer');

function removeSearchCondition_(key) {
  if (searchStatusState.removingChipKey) {
    return;
  }

  const currentChips = Array.isArray(searchStatusState.chips) ? searchStatusState.chips.slice() : [];
  const targetChip = currentChips.find(chip => chip && chip.key === key && chip.removable);
  if (!targetChip) {
    return;
  }

  hideAllSuggest();

  const remainingChipCount = currentChips.filter(chip => chip && chip.removable && chip.key !== key).length;

  searchStatusState.removingChipKey = key;
  if (remainingChipCount > 0 && (searchStatusState.mode === 'result' || searchStatusState.mode === 'random')) {
    showSpinner();
  }
  renderSearchStatus_();

  window.setTimeout(function() {
    switch (key) {
      case 'keyword':
        document.getElementById('keyword').value = '';
        break;
      case 'detailTitle':
        document.getElementById('detailTitle').value = '';
        break;
      case 'detailYomi':
        document.getElementById('detailYomi').value = '';
        break;
      case 'detailAuthor':
        document.getElementById('detailAuthor').value = '';
        break;
      case 'detailPublisher':
        document.getElementById('detailPublisher').value = '';
        break;
      case 'detailStory':
        document.getElementById('detailStory').value = '';
        break;
      case 'detailTheme':
        document.getElementById('detailTheme').value = '';
        break;
      case 'detailMood':
        document.getElementById('detailMood').value = '';
        break;
      case 'detailStatus':
        document.getElementById('detailStatus').value = '';
        break;
      case 'detailReleased':
        document.getElementById('detailReleasedFromYear').value = '';
        document.getElementById('detailReleasedFromMonth').value = '';
        document.getElementById('detailReleasedToYear').value = '';
        document.getElementById('detailReleasedToMonth').value = '';
        syncReleasedRangeOptions_();
        break;
      default:
        searchStatusState.removingChipKey = '';
        hideSpinner();
        renderSearchStatus_();
        return;
    }

    searchStatusState.removingChipKey = '';

    const nextParams = getStickyActionSearchParams_();
    const nextMode = hasAnyAdvancedCondition_(nextParams) ? 'advanced' : 'normal';
    const nextChipCount = buildSearchStatusChips_(nextMode, nextParams).length;

    if (nextChipCount <= 0) {
      hideSpinner();
      syncSearchStatusPreviewFromForm_();
      return;
    }

    rerunSearchWithParams_(nextParams);
  }, 180);
}

function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function hasDisplayValue_(value) {
  const text = String(value == null ? '' : value).trim();
  return Boolean(text && text !== '-');
}

function formatShelfLabel_(book) {
  const shelf = hasDisplayValue_(book && book.shelf) ? String(book.shelf).trim() : '';
  const location = hasDisplayValue_(book && book.location) ? String(book.location).trim() : '';
  if (shelf && location) return `${shelf}-${location}`;
  return shelf || location || '';
}

function buildBookMetaPillsHtml_(book, options) {
  const opt = options || {};
  const items = [];
  const shelfLabel = formatShelfLabel_(book);

  if (shelfLabel) items.push({ label: '棚', value: shelfLabel });
  if (hasDisplayValue_(book && book.released)) items.push({ label: '発売', value: book.released });
  if (hasDisplayValue_(book && book.price)) items.push({ label: '値', value: book.price });
  if (hasDisplayValue_(book && book.brand)) items.push({ label: 'レーベル', value: book.brand });
  if (opt.includeIsbn && hasDisplayValue_(book && book.isbn)) items.push({ label: 'ISBN', value: book.isbn });

  if (!items.length) return '';

  return `
    <div class="book-meta-pills${opt.compact ? ' compact' : ''}">
      ${items.map(item => `
        <span class="book-meta-pill">
          <span class="book-meta-pill-label">${escapeHtml(item.label)}</span>
          <span class="book-meta-pill-value">${escapeHtml(item.value)}</span>
        </span>
      `).join('')}
    </div>
  `;
}

function buildBookMemoHtml_(book) {
  if (!hasDisplayValue_(book && book.memo)) return '';
  return `<div class="book-note">備考: ${escapeHtml(book.memo)}</div>`;
}

function buildPopupBookLeadHtml_(book) {
  const parts = [];
  if (hasDisplayValue_(book && book.author)) parts.push(escapeHtml(book.author));
  if (hasDisplayValue_(book && book.publisher)) parts.push(escapeHtml(book.publisher));
  if (!parts.length) return '';

  return `<div class="popup-book-lead">${parts.join('<span></span>')}</div>`;
}

function buildBookDetailsHtml_(book) {
  const rows = [
    ['著者', book && book.author],
    ['出版社', book && book.publisher],
    ['ISBN', book && book.isbn],
    ['棚', formatShelfLabel_(book)],
    ['発売日', book && book.released],
    ['価格', book && book.price],
    ['レーベル', book && book.brand],
    ['備考', book && book.memo]
  ];

  return rows.map(([label, value]) => `
    <div><span>${escapeHtml(label)}</span>${escapeHtml(hasDisplayValue_(value) ? value : '-')}</div>
  `).join('');
}

  return isCardView ? 'card' : 'list';

function applyResultViewMode_(mode) {
  const nextMode = normalizeResultViewMode_(mode);
  currentViewMode = nextMode;
  isCardView = nextMode === 'card';
  isShelfImmersiveMode = false;
  currentShelfRoomMapGroups = [];
  closeShelfRoomMapOverlay_();
  updateViewToggleButtons_();
  syncShelfViewUiState_(nextMode);
}

function setViewMode_(mode) {
  const nextMode = savePreferredResultViewMode_(mode);
  applyResultViewMode_(nextMode);

  if (lastResult) {
    showResult(lastResult);

}

function updateViewToggleButtons_() {
  const mode = getCurrentViewMode_();
  const buttonMap = {
    card: document.getElementById('tileViewBtn'),
    list: document.getElementById('listViewBtn'),
    shelf: document.getElementById('shelfViewBtn')
  };

  Object.keys(buttonMap).forEach(key => {
    const btn = buttonMap[key];
    if (!btn) return;
    const active = key === mode;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    btn.setAttribute('data-state', active ? 'active' : 'idle');
  });
}

function syncShelfViewUiState_(mode) {
  const isShelf = mode === 'shelf';
  const isImmersive = isShelf && Boolean(isShelfImmersiveMode);
  const body = document.body;
  const searchContainer = document.getElementById('searchContainer');
  const viewToggle = document.getElementById('viewToggle');

  if (body) {
    body.classList.toggle('shelf-view-active', isShelf);
    body.classList.toggle('shelf-immersive-active', isImmersive);
  }
  if (searchContainer) {
    searchContainer.classList.toggle('shelf-view-active', isShelf && !isImmersive);
    searchContainer.classList.toggle('shelf-immersive-active', isImmersive);
  }
  if (viewToggle) {
    viewToggle.classList.toggle('shelf-view-active', isShelf && !isImmersive);
    viewToggle.classList.toggle('shelf-immersive-active', isImmersive);
  }

  if (!isImmersive) {
    unmountShelfRoomMapPortal_();
  }
}

function getShelfGroupBookCount_(group) {
  return (group && group.sections ? group.sections : []).reduce((groupTotal, section) => {
    return groupTotal + (section.levels || []).reduce((sectionTotal, level) => {
      return sectionTotal + ((level.books || []).length);
    }, 0);
  }, 0);
}

function normalizeBookshelfText_(value) {
  // ①〜⑳は本棚ラベルとして表示に残したいため、ここではNFKC正規化しない。
  return String(value || '')
    .replace(/\u00A0/g, ' ')
    .replace(/\u200B/g, '')
    .replace(/\uFEFF/g, '')
    .trim();
}

function getBookshelfNumber_(label) {
  const value = normalizeBookshelfText_(label);
  const circled = {
    '①': 1, '②': 2, '③': 3, '④': 4, '⑤': 5,
    '⑥': 6, '⑦': 7, '⑧': 8, '⑨': 9, '⑩': 10,
    '⑪': 11, '⑫': 12, '⑬': 13, '⑭': 14, '⑮': 15,
    '⑯': 16, '⑰': 17, '⑱': 18, '⑲': 19, '⑳': 20
  };

  if (Object.prototype.hasOwnProperty.call(circled, value)) {
    return circled[value];
  }

  const numeric = value.match(/[0-9０-９]+/);
  return numeric ? Number(numeric[0].normalize('NFKC')) : 999;
}

function getBookshelfLevelNumber_(value) {
  const normalized = normalizeBookshelfText_(value);
  if (!normalized || normalized === '-') return 999;

  const numeric = normalized.match(/[0-9０-９]+/);
  return numeric ? Number(numeric[0].normalize('NFKC')) : 999;
}

function parseBookshelfPosition_(book) {
  const shelf = normalizeBookshelfText_(book && book.shelf);
  const location = normalizeBookshelfText_(book && book.location);
  const unresolvedValues = ['', '-', '未定', '不明', '未分類'];

  if (unresolvedValues.includes(shelf)) {
    return {
      type: 'unknown',
      groupKey: '__unknown__',
      groupLabel: '未分類・未定',
      sectionKey: '__unknown__',
      sectionLabel: '配置未定',
      levelKey: '__unknown__',
      levelLabel: '段未定',
      groupSort: 9999,
      sectionSort: 0,
      levelSort: 999
    };
  }

  if (shelf === 'PC横') {
    return {
      type: 'pcside',
      groupKey: '__pcside__',
      groupLabel: 'PC横',
      sectionKey: '__pcside__',
      sectionLabel: 'PC横',
      levelKey: location && location !== '-' ? location : '__unknown__',
      levelLabel: location && location !== '-' ? `${location}段` : '段未定',
      groupSort: 8500,
      sectionSort: 0,
      levelSort: getBookshelfLevelNumber_(location)
    };
  }

  if (shelf === '茨城') {
    return {
      type: 'ibaraki',
      groupKey: '__ibaraki__',
      groupLabel: '茨城 本棚',
      sectionKey: '__ibaraki__',
      sectionLabel: '茨城',
      levelKey: location && location !== '-' ? location : '__unknown__',
      levelLabel: location && location !== '-' ? `${location}段` : '段未定',
      groupSort: 9000,
      sectionSort: 0,
      levelSort: getBookshelfLevelNumber_(location)
    };
  }

  const match = shelf.match(/^([①-⑳0-9０-９]+)\s*[-－ー―]\s*(上|下)$/);
  if (match) {
    const bookcaseLabel = match[1];
    const sectionLabel = match[2];
    const bookcaseNumber = getBookshelfNumber_(bookcaseLabel);
    const sectionSort = sectionLabel === '上' ? 1 : 2;
    const levelKnown = Boolean(location && location !== '-');

    return {
      type: 'normal',
      groupKey: `normal:${bookcaseLabel}`,
      groupLabel: `${bookcaseLabel} 本棚`,
      sectionKey: `normal:${bookcaseLabel}:${sectionLabel}`,
      sectionLabel: `${bookcaseLabel}-${sectionLabel}`,
      levelKey: levelKnown ? location : '__unknown__',
      levelLabel: levelKnown ? `${location}段` : '段未定',
      groupSort: bookcaseNumber,
      sectionSort,
      levelSort: getBookshelfLevelNumber_(location)
    };
  }

  return {
    type: 'unknown',
    groupKey: '__unknown__',
    groupLabel: '未分類・未定',
    sectionKey: `unknown:${shelf || '-'}`,
    sectionLabel: shelf ? `解析不能：${shelf}` : '配置未定',
    levelKey: location && location !== '-' ? location : '__unknown__',
    levelLabel: location && location !== '-' ? `${location}段` : '段未定',
    groupSort: 9999,
    sectionSort: 0,
    levelSort: getBookshelfLevelNumber_(location)
  };
}

function groupBooksByShelf_(data) {
  const groupMap = new Map();

  (data || []).forEach((book, originalIndex) => {
    const pos = parseBookshelfPosition_(book);

    if (!groupMap.has(pos.groupKey)) {
      groupMap.set(pos.groupKey, {
        key: pos.groupKey,
        label: pos.groupLabel,
        sort: pos.groupSort,
        count: 0,
        sections: new Map()
      });
    }

    const group = groupMap.get(pos.groupKey);
    if (!group.sections.has(pos.sectionKey)) {
      group.sections.set(pos.sectionKey, {
        key: pos.sectionKey,
        label: pos.sectionLabel,
        sort: pos.sectionSort,
        count: 0,
        levels: new Map()
      });
    }

    const section = group.sections.get(pos.sectionKey);
    if (!section.levels.has(pos.levelKey)) {
      section.levels.set(pos.levelKey, {
        key: pos.levelKey,
        label: pos.levelLabel,
        sort: pos.levelSort,
        books: []
      });
    }

    group.count++;
    section.count++;
    section.levels.get(pos.levelKey).books.push({
      book,
      originalIndex
    });
  });

  return Array.from(groupMap.values())
    .sort((a, b) => a.sort - b.sort || String(a.label).localeCompare(String(b.label), 'ja'))
    .map(group => ({
      key: group.key,
      label: group.label,
      sort: group.sort,
      count: group.count || 0,
      sections: Array.from(group.sections.values())
        .sort((a, b) => a.sort - b.sort || String(a.label).localeCompare(String(b.label), 'ja'))
        .map(section => ({
          key: section.key,
          label: section.label,
          sort: section.sort,
          count: section.count || 0,
          levels: Array.from(section.levels.values())
            .sort((a, b) => a.sort - b.sort || String(a.label).localeCompare(String(b.label), 'ja'))
        }))
    }));
}

function flattenShelfBooksForPopup_(groups) {
  const orderedItems = [];
  (groups || []).forEach(group => {
    (group.sections || []).forEach(section => {
      (section.levels || []).forEach(level => {
        (level.books || []).forEach(item => {
          orderedItems.push(item);
        });
      });
    });
  });
  return orderedItems;
}

function renderShelfView_(data) {
  const groups = groupBooksByShelf_(data);
  const shelfPopupItems = flattenShelfBooksForPopup_(groups);
  const shelfPopupData = shelfPopupItems.map(item => item.book);
  const shelfPopupIndexByOriginalIndex = new Map();
  shelfPopupItems.forEach((item, popupIndex) => {
    if (!shelfPopupIndexByOriginalIndex.has(item.originalIndex)) {
      shelfPopupIndexByOriginalIndex.set(item.originalIndex, popupIndex);
    }
  });

  const container = document.createElement('div');
  container.className = 'shelf-view';

  if (groups.length > 1) {
    container.appendChild(renderShelfJumpNav_(groups, data.length, isShelfImmersiveMode));
  }

  if (isShelfImmersiveMode) {
    currentShelfRoomMapGroups = groups;
  }

  const summary = document.createElement('div');
  summary.className = 'shelf-view-summary';
  summary.textContent = `本棚ビュー：${data.length}件を配置中 / ${groups.length}グループ`;
  container.appendChild(summary);

  groups.forEach((group, groupIndex) => {
    const groupSection = document.createElement('section');
    groupSection.className = 'bookshelf-group';
    groupSection.id = getShelfNavTargetId_(groupIndex);

    const groupTitle = document.createElement('h2');
    groupTitle.className = 'bookshelf-group-title';
    groupTitle.textContent = `${group.label} / ${group.count || getShelfGroupBookCount_(group)}冊`;
    groupSection.appendChild(groupTitle);

    group.sections.forEach(section => {
      const sectionWrap = document.createElement('div');
      sectionWrap.className = 'bookshelf-section';

      const sectionTitle = document.createElement('h3');
      sectionTitle.className = 'bookshelf-section-title';
      sectionTitle.textContent = section.label;
      sectionWrap.appendChild(sectionTitle);

      section.levels.forEach(level => {
        const levelWrap = document.createElement('div');
        levelWrap.className = 'bookshelf-level';

        const levelTitle = document.createElement('div');
        levelTitle.className = 'bookshelf-level-title';
        levelTitle.textContent = `${level.label} / ${level.books.length}冊`;
        levelWrap.appendChild(levelTitle);

        const strip = document.createElement('div');
        strip.className = 'bookshelf-strip';
        level.books.forEach(item => {
          const popupIndex = shelfPopupIndexByOriginalIndex.has(item.originalIndex)
            ? shelfPopupIndexByOriginalIndex.get(item.originalIndex)
            : item.originalIndex;
          strip.appendChild(createShelfBookElement_(item.book, popupIndex, shelfPopupData));
        });

        levelWrap.appendChild(strip);
        sectionWrap.appendChild(levelWrap);
      });

      groupSection.appendChild(sectionWrap);
    });

    container.appendChild(groupSection);
  });

  return container;
}

function showResult(data) {
  hideSpinner();

  const result = document.getElementById('result');
  result.innerHTML = '';

  if (!data || !Array.isArray(data) || data.length === 0) {
    renderEmptyResult_(result);
    resetImageLoadStats_([]);
    return;
  }

  updateViewToggleButtons_();

  const viewMode = getCurrentViewMode_();
  syncShelfViewUiState_(viewMode);

  // 本棚ビューは小型表紙を大量に並べるため、画像取得率デバッグ集計には含めない。
  // カード/リストの既存集計だけを維持する。
  resetImageLoadStats_(viewMode === 'shelf' ? [] : data);

  if (viewMode === 'shelf') {
    result.appendChild(renderShelfView_(data));
    if (isShelfImmersiveMode) {
      mountShelfRoomMapPortal_(currentShelfRoomMapGroups);
    } else {
      unmountShelfRoomMapPortal_();
    }
  } else if (viewMode === 'card') {
    unmountShelfRoomMapPortal_();
    const container = document.createElement('div');
    container.className = 'card-view';

    data.forEach((book, idx) => {
      const card = document.createElement('div');
      card.className = 'book-card';
      setupBookOpenSurface_(card, book, idx, data);

      const img = document.createElement('img');
      img.className = 'book-cover';
      img.alt = book.title || '表紙';
      img.style.cursor = 'zoom-in';
      img.onclick = function(e) {
        e.stopPropagation();
        showPopup(book, idx, data);
      };

      setupBookImageElement_(img, book, {
        track: true,
        trackKey: getBookImageTrackKey_(book, idx),
        loading: idx < 4 ? 'eager' : 'lazy',
        fetchPriority: idx < 4 ? 'high' : 'low'
      });

      card.appendChild(img);

      const info = document.createElement('div');
      info.className = 'card-info';
      info.innerHTML = `
        <div class="book-title">${escapeHtml(book.title || '(タイトルなし)')}</div>
        <div class="book-author-line">${escapeHtml(book.author || '-')}<span>${escapeHtml(book.publisher || '-')}</span></div>
        <div class="genre-chip-wrap">${buildGenreChips(book)}</div>
        ${buildBookMetaPillsHtml_(book, { includeIsbn: true })}
        ${buildBookMemoHtml_(book)}
      `;

      appendSummaryAccordion_(info.querySelector('.genre-chip-wrap'), book);
      setupBookKeyboardOpenSurface_(info.querySelector('.book-title'), book, idx, data);

      card.appendChild(info);
      container.appendChild(card);
    });

    result.appendChild(container);
  } else {
    unmountShelfRoomMapPortal_();
    const container = document.createElement('div');
    container.className = 'list-view';

    data.forEach((book, idx) => {
      const card = document.createElement('div');
      card.className = 'book-card list';

      const thumb = document.createElement('img');
      thumb.alt = '表紙';
      thumb.className = 'list-thumb';
      thumb.style.cursor = 'zoom-in';
      thumb.onclick = function(e) {
        e.stopPropagation();
        showPopup(book, idx, data);
      };

      setupBookImageElement_(thumb, book, {
        track: true,
        trackKey: getBookImageTrackKey_(book, idx),
        loading: idx < 8 ? 'eager' : 'lazy',
        fetchPriority: idx < 8 ? 'high' : 'low'
      });

      const row = document.createElement('div');
      row.className = 'list-row';
      setupBookOpenSurface_(row, book, idx, data);

      const titleRow = document.createElement('div');
      titleRow.className = 'list-title-row';

      const titleBlock = document.createElement('div');
      titleBlock.className = 'list-title-block';
      titleBlock.innerHTML = `
        <div class="book-title">${escapeHtml(book.title || '(タイトルなし)')}</div>
        <div class="list-book-meta">${escapeHtml(book.publisher || '-')} / ${escapeHtml(formatShelfLabel_(book) || '棚未定')}</div>
        <div class="genre-chip-wrap compact">${buildGenreChips(book)}</div>
        ${buildBookMetaPillsHtml_(book, { compact: true })}
      `;

      appendSummaryAccordion_(titleBlock.querySelector('.genre-chip-wrap'), book);
      setupBookKeyboardOpenSurface_(titleBlock.querySelector('.book-title'), book, idx, data);

      const authorDiv = document.createElement('div');
      authorDiv.className = 'list-title-author';
      authorDiv.textContent = `著: ${book.author || '-'}`;

      titleRow.appendChild(titleBlock);
      titleRow.appendChild(authorDiv);

      row.appendChild(thumb);
      row.appendChild(titleRow);

      const btn = document.createElement('button');
      btn.className = 'accordion-toggle';
      btn.setAttribute('aria-expanded', 'false');
      btn.innerHTML = uiIcon_('chevronDown', 'arrow');
      row.appendChild(btn);

      card.appendChild(row);

      const details = document.createElement('div');
      details.className = 'book-details';
      details.style.display = 'none';
      details.innerHTML = `
        ${buildBookDetailsHtml_(book)}
      `;

      card.appendChild(details);

      btn.onclick = function(e) {
        e.stopPropagation();

        const expanded = card.classList.toggle('open');
        btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        details.style.display = expanded ? 'block' : 'none';
      };

      container.appendChild(card);
    });

    result.appendChild(container);
  }

  result.classList.remove('show');
  result.classList.add('result-fade');

  setTimeout(() => {
    result.classList.add('show');
  }, 40);
}

function shouldIgnoreBookOpenSurfaceClick_(target) {
  return !!(
    target &&
    typeof target.closest === 'function' &&
    target.closest('button, a, input, select, textarea, label, .summary-text')
  );
}

function setupBookOpenSurface_(element, book, idx, data) {
  if (!element) return;
  element.classList.add('book-open-surface');
  element.title = '詳細を開く';
  element.onclick = function(e) {
    if (shouldIgnoreBookOpenSurfaceClick_(e.target)) return;
    showPopup(book, idx, data);
  };
}

function setupBookKeyboardOpenSurface_(element, book, idx, data) {
  if (!element) return;
  element.classList.add('book-open-keyboard-surface');
  element.tabIndex = 0;
  element.setAttribute('role', 'button');
  element.setAttribute('aria-label', `${book && book.title ? book.title : 'この本'} の詳細を開く`);
  element.title = '詳細を開く';
  element.onkeydown = function(e) {
    if (shouldIgnoreBookOpenSurfaceClick_(e.target)) return;
    if (e.key !== 'Enter' && e.key !== ' ') return;

    e.preventDefault();
    showPopup(book, idx, data);
  };
}


function shouldShowSeriesButton(book) {

  const googleUrl = escapeHtml(book.links.googleUrl || '');

      <a href="${bellUrl}" target="_blank" rel="noopener noreferrer" class="popup-link-btn">${uiIcon_('bell', 'ui-icon-inline')}<span>BellAlert</span></a>
      <a href="${amazonUrl}" target="_blank" rel="noopener noreferrer" class="popup-link-btn">${uiIcon_('store', 'ui-icon-inline')}<span>Amazon</span></a>
    </div>

function buildPopupActionsHtml(book, seriesContext) {

    parts.push(`
      <button type="button" id="popup-series-back-btn" class="popup-action-btn">
        ${uiIcon_('back', 'ui-icon-inline')}<span>シリーズ一覧へ戻る</span>
      </button>
    `);
  }

  if (shouldShowSeriesButton(book)) {
    parts.push(`
      <button type="button" id="popup-series-btn" class="popup-action-btn primary">
        ${uiIcon_('collection', 'ui-icon-inline')}<span>このシリーズを見る（${Number(book.seriesCount || 0)}冊）</span>
      </button>
    `);
  }

  const linksHtml = buildExternalLinksHtml(book);
  if (linksHtml) parts.push(linksHtml);

  if (!parts.length) return '';

  return `
    <div class="popup-action-area">
      ${parts.join('')}
    </div>
  `;
}

function attachPopupActionHandlers(book, seriesContext) {
  const seriesBtn = document.getElementById('popup-series-btn');
  if (seriesBtn) {
    seriesBtn.onclick = function(e) {
      e.stopPropagation();
      openSeriesPanel(book);
    };
  }

  const backBtn = document.getElementById('popup-series-back-btn');
  if (backBtn && seriesContext && Array.isArray(seriesContext.items)) {
    backBtn.onclick = function(e) {
      e.stopPropagation();
      showSeriesPanel(seriesContext.sourceBook || book, seriesContext.items, seriesContext.returnContext || null);
    };
  }
}

function getPopupNavBookLabel_(targetIndex) {
  if (!Array.isArray(popupData) || targetIndex < 0 || targetIndex >= popupData.length) return '';
  const targetBook = popupData[targetIndex];
  return targetBook && targetBook.title ? String(targetBook.title) : '';
}

function setupPopupNavButton_(button, targetIndex, directionLabel) {
  if (!button) return;

  const targetTitle = getPopupNavBookLabel_(targetIndex);
  const accessibleLabel = targetTitle ? `${directionLabel}: ${targetTitle}` : directionLabel;
  button.setAttribute('aria-label', accessibleLabel);
  button.title = accessibleLabel;

  if (targetTitle) {
    button.classList.add('has-nav-label');
    button.setAttribute('data-nav-label', targetTitle);
  } else {
    button.classList.remove('has-nav-label');
    button.removeAttribute('data-nav-label');
  }
}

function clearPopupTouchHandlers_() {
  const overlay = document.getElementById('image-popup-overlay');
  if (!overlay) return;
  overlay.ontouchstart = null;
  overlay.ontouchmove = null;
  overlay.ontouchend = null;
}

function closeCoverFullscreen_() {
  const overlay = document.getElementById('cover-fullscreen-overlay');
  const img = document.getElementById('cover-fullscreen-img');
  if (!overlay || overlay.style.display === 'none') return;

  overlay.style.display = 'none';
  overlay.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('cover-fullscreen-open');
  if (img) {
    img.removeAttribute('src');
    img.classList.remove('book-image-loading', 'book-image-loaded');
  }
  document.onkeydown = coverFullscreenPreviousKeydown || null;
  coverFullscreenPreviousKeydown = null;
}

function openCoverFullscreen_(book) {
  const overlay = document.getElementById('cover-fullscreen-overlay');
  const img = document.getElementById('cover-fullscreen-img');
  const caption = document.getElementById('cover-fullscreen-caption');
  const closeBtn = document.getElementById('cover-fullscreen-close');
  if (!overlay || !img || !closeBtn || !book) return;

  img.alt = `${book.title || '表紙'} の拡大画像`;
  setupBookImageElement_(img, book, {
    track: false,
    loading: 'eager',
    fetchPriority: 'high'
  });
  if (caption) caption.textContent = book.title || '';

  overlay.style.display = 'flex';
  overlay.setAttribute('aria-hidden', 'false');
  document.body.classList.add('cover-fullscreen-open');

  coverFullscreenPreviousKeydown = document.onkeydown;
  document.onkeydown = function(e) {
    if (e.key === 'Escape') {
      closeCoverFullscreen_();
    }
  };

  overlay.onclick = function(e) {
    if (e.target === overlay) closeCoverFullscreen_();
  };
  closeBtn.onclick = function(e) {
    e.stopPropagation();
    closeCoverFullscreen_();
  };
}

function openSeriesPanel(sourceBook) {
  if (!sourceBook || !sourceBook.seriesKeyAuto) return;

  const overlay = document.getElementById('image-popup-overlay');
  const popupContent = document.getElementById('image-popup-content');
  const img = document.getElementById('image-popup-img');
  const info = document.getElementById('image-popup-info');
  const prevBtn = document.getElementById('popup-prev');
  const nextBtn = document.getElementById('popup-next');
  const returnContext = { index: popupIndex, data: popupData };

  overlay.style.display = 'flex';
  document.body.classList.add('modal-open');
  if (popupContent) popupContent.classList.add('series-mode');
  img.style.display = 'none';
  prevBtn.style.display = 'none';
  nextBtn.style.display = 'none';
  clearPopupTouchHandlers_();

  info.innerHTML = `
    <div class="series-panel">
      <div class="series-panel-title">シリーズ一覧を読み込み中...</div>
      <div class="series-panel-subtitle">${escapeHtml(sourceBook.seriesSearchTitle || sourceBook.title || '')}</div>
    </div>
  `;

  google.script.run
    .withSuccessHandler(function(seriesBooks) {
      showSeriesPanel(sourceBook, Array.isArray(seriesBooks) ? seriesBooks : [], returnContext);
    })
    .withFailureHandler(function(error) {
      info.innerHTML = `
          <div class="series-panel">
            <div class="series-panel-title">シリーズ一覧を取得できませんでした</div>
            <div class="series-panel-subtitle">${escapeHtml(error && error.message ? error.message : '時間を置いて再度お試しください。')}</div>
          <button type="button" id="series-panel-back-detail" class="popup-action-btn primary">${uiIcon_('back', 'ui-icon-inline')}<span>詳細へ戻る</span></button>
        </div>
      `;
      const backBtn = document.getElementById('series-panel-back-detail');
      if (backBtn) backBtn.onclick = function(e) {
        e.stopPropagation();
        showPopup(sourceBook, returnContext.index, returnContext.data);
      };
    })
    .getBooksBySeriesKey(sourceBook.seriesKeyAuto);
}

function showSeriesPanel(sourceBook, seriesBooks, returnContext) {
  const overlay = document.getElementById('image-popup-overlay');
  const popupContent = document.getElementById('image-popup-content');
  const img = document.getElementById('image-popup-img');
  const info = document.getElementById('image-popup-info');
  const closeBtn = document.getElementById('image-popup-close');
  const prevBtn = document.getElementById('popup-prev');
  const nextBtn = document.getElementById('popup-next');

  const items = Array.isArray(seriesBooks) ? seriesBooks : [];
  const sourceTitle = sourceBook && (sourceBook.seriesSearchTitle || sourceBook.title) || 'シリーズ';
  const linksHtml = buildExternalLinksHtml(sourceBook);

  img.style.display = 'none';
  if (popupContent) popupContent.classList.add('series-mode');
  prevBtn.style.display = 'none';
  nextBtn.style.display = 'none';
  clearPopupTouchHandlers_();

  const listHtml = items.length
    ? items.map((item, idx) => `
        <button type="button" class="series-list-item" data-series-index="${idx}">
          <span class="series-list-title">${escapeHtml(item.title || '(タイトルなし)')}</span>
          <span class="series-list-meta">
            発: ${escapeHtml(item.released || '-')} ／ 棚: ${escapeHtml(item.shelf || '-')}-${escapeHtml(item.location || '')}
          </span>
        </button>
      `).join('')
    : '<div class="series-empty">同じシリーズの本が見つかりませんでした。</div>';

  info.innerHTML = `
    <div class="series-panel">
      <div class="series-panel-title">${escapeHtml(sourceTitle)} シリーズ一覧（${items.length}冊）</div>
      ${linksHtml ? `<div class="series-panel-actions">${linksHtml}</div>` : ''}
      <div class="series-list">${listHtml}</div>
      <button type="button" id="series-panel-back-detail" class="popup-action-btn">${uiIcon_('back', 'ui-icon-inline')}<span>詳細へ戻る</span></button>
    </div>
  `;

  const backBtn = document.getElementById('series-panel-back-detail');
  if (backBtn) {
    backBtn.onclick = function(e) {
      e.stopPropagation();
      const targetIndex = returnContext && typeof returnContext.index === 'number' ? returnContext.index : popupIndex;
      const targetData = returnContext && Array.isArray(returnContext.data) ? returnContext.data : popupData;
      showPopup(sourceBook, targetIndex, targetData);
    };
  }

  info.querySelectorAll('.series-list-item').forEach(btn => {
    btn.onclick = function(e) {
      e.stopPropagation();
      const idx = Number(btn.getAttribute('data-series-index'));
      const book = items[idx];
      if (!book) return;
      showPopup(book, idx, items, { sourceBook, items, returnContext });
    };
  });

  overlay.onclick = function(e) {
    if (e.target === overlay) {
      overlay.style.display = 'none';
      document.body.classList.remove('modal-open');
      document.onkeydown = null;
    }
  };

  closeBtn.onclick = function() {
    overlay.style.display = 'none';
    document.body.classList.remove('modal-open');
    document.onkeydown = null;
  };

  document.onkeydown = function(e) {
    if (e.key === 'Escape') {
      overlay.style.display = 'none';
      document.body.classList.remove('modal-open');
      document.onkeydown = null;
    }
  };
}

function showPopup(book, index, dataArr, seriesContext) {
  popupIndex = index;
  popupData = dataArr;
  popupSeriesContext = seriesContext || null;

  const overlay = document.getElementById('image-popup-overlay');
  const popupContent = document.getElementById('image-popup-content');
  const img = document.getElementById('image-popup-img');
  const info = document.getElementById('image-popup-info');
  const closeBtn = document.getElementById('image-popup-close');
  const prevBtn = document.getElementById('popup-prev');
  const nextBtn = document.getElementById('popup-next');

  img.style.display = '';
  if (popupContent) popupContent.classList.remove('series-mode');
  img.alt = book.title || '表紙';
  img.setAttribute('role', 'button');
  img.setAttribute('tabindex', '0');
  img.setAttribute('aria-label', '表紙を全画面で表示');
  setupBookImageElement_(img, book, {
    track: false,
    loading: 'eager',
    fetchPriority: 'high'
  });
  img.onclick = function(e) {
    e.stopPropagation();
    openCoverFullscreen_(book);
  };
  img.onkeydown = function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openCoverFullscreen_(book);
    }
  };

  const actionsHtml = buildPopupActionsHtml(book, popupSeriesContext);
info.innerHTML = `
  <div class="popup-book-detail">
    <div class="popup-book-title">${escapeHtml(book.title || '(タイトルなし)')}</div>
    ${buildPopupBookLeadHtml_(book)}
    <div class="genre-chip-wrap popup">${buildGenreChips(book)}</div>
    ${buildBookMetaPillsHtml_(book, { includeIsbn: true })}
    ${buildBookMemoHtml_(book)}
    ${actionsHtml}
    <div class="popup-position">${popupIndex + 1} / ${popupData.length}</div>
  </div>
`;

  appendPopupSummaryAccordion_(info.querySelector('.genre-chip-wrap.popup'), book);
  attachPopupActionHandlers(book, popupSeriesContext);

  overlay.style.display = 'flex';
  document.body.classList.add('modal-open');

  popupContent.classList.remove('popup-slide-next', 'popup-slide-prev');

  function hide() {
    closeCoverFullscreen_();
    overlay.style.display = 'none';
    document.body.classList.remove('modal-open');
    document.onkeydown = null;
  }

  overlay.onclick = function(e) {
    if (e.target === overlay) hide();
  };
  closeBtn.onclick = hide;

  document.onkeydown = function(e) {
    if (e.key === 'Escape') hide();
    if (e.key === 'ArrowLeft') popupMove(-1);
    if (e.key === 'ArrowRight') popupMove(1);
  };

  prevBtn.style.display = (popupIndex > 0) ? 'block' : 'none';
  nextBtn.style.display = (popupIndex < popupData.length - 1) ? 'block' : 'none';
  setupPopupNavButton_(prevBtn, popupIndex - 1, '前へ');
  setupPopupNavButton_(nextBtn, popupIndex + 1, '次へ');
  prevBtn.onclick = function(e) { e.stopPropagation(); popupMove(-1); };
  nextBtn.onclick = function(e) { e.stopPropagation(); popupMove(1); };

  let touchStartX = 0;
  let touchStartY = 0;

  overlay.ontouchstart = function(e) {
    if (e.touches.length === 1) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
  };
  overlay.ontouchmove = function(e) {
    if (isPopupSummaryScrollTarget_(e.target)) return;
    e.preventDefault();
  };
  overlay.ontouchend = function(e) {
    if (e.changedTouches && e.changedTouches.length === 1) {
      const diffX = e.changedTouches[0].clientX - touchStartX;
      const diffY = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(diffX) > 48 && Math.abs(diffX) > Math.abs(diffY)) {
        popupMove(diffX > 0 ? -1 : 1);
      }
    }
  };
}

function popupMove(diff) {
  const newIndex = popupIndex + diff;
  if (newIndex < 0 || newIndex >= popupData.length) return;

  popupIndex = newIndex;
  const popupContent = document.getElementById('image-popup-content');
  popupContent.classList.remove('popup-slide-next', 'popup-slide-prev');
  void popupContent.offsetWidth;

  if (diff > 0) {
    popupContent.classList.add('popup-slide-next');
  } else {
    popupContent.classList.add('popup-slide-prev');
  }

  setTimeout(() => {
    popupContent.classList.remove('popup-slide-next', 'popup-slide-prev');
    showPopup(popupData[popupIndex], popupIndex, popupData, popupSeriesContext);
  }, 220);
}

});


let lastScrollY = window.scrollY || 0;
let compactLocked = false;
let compactRafId = 0;
let compactLastToggleAt = 0;

const COMPACT_ON_Y = 260;
const COMPACT_OFF_Y = 32;
const COMPACT_TOGGLE_COOLDOWN_MS = 220;

/**
 * 検索ヘッダーのcompact状態を同期する。
 *
 * 方針:
 * - スクロール方向ではなく絶対位置で判定
 * - compact化と解除の境界を大きく離す
 * - 切替直後のscroll揺れを一定時間無視する
 * - 上端付近以外ではcompact解除しない
 */
function syncSearchContainerCompact_() {
  const container = document.getElementById('searchContainer');
  if (!container) return;

  const currentY = window.scrollY || 0;
  const now = Date.now();

  // 初期表示・リセット後・検索前はcompactを使わない
  if (!container.classList.contains('shrink')) {
    container.classList.remove('compact');
    compactLocked = false;
    lastScrollY = currentY;
    return;
  }

  // 切替直後は、stickyや高さ変化によるscroll揺れを無視する
  if (now - compactLastToggleAt < COMPACT_TOGGLE_COOLDOWN_MS) {
    lastScrollY = currentY;
    return;
  }

  // 上端付近まで戻った時だけcompact解除
  if (compactLocked && currentY <= COMPACT_OFF_Y) {
    container.classList.remove('compact');
    compactLocked = false;
    compactLastToggleAt = now;
    lastScrollY = currentY;
    return;
  }

  // 十分下までスクロールした時だけcompact化
  if (!compactLocked && currentY >= COMPACT_ON_Y) {
    container.classList.add('compact');
    compactLocked = true;
    compactLastToggleAt = now;
    lastScrollY = currentY;
    return;
  }

  lastScrollY = currentY;
}

window.addEventListener('scroll', function() {
  if (compactRafId) return;

  compactRafId = requestAnimationFrame(function() {
    compactRafId = 0;
    syncSearchContainerCompact_();
  });
}, { passive: true });
